<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎨 像素画板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#ffd700;margin-bottom:6px}
#info{display:flex;gap:12px;margin-bottom:8px;align-items:center;flex-wrap:wrap;justify-content:center}
#colors{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
.color-btn{width:24px;height:24px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.color-btn:hover,.color-btn.active{border-color:#fff;transform:scale(1.15)}
canvas{border:2px solid #2a2a3e;border-radius:8px;box-shadow:0 0 30px rgba(255,215,0,0.1);cursor:crosshair}
#tools{display:flex;gap:6px;margin-top:8px}
.tool{padding:4px 10px;background:#1a1a2e;border:1px solid #2a2a3e;border-radius:4px;cursor:pointer;font-size:11px;color:#888}
.tool.active{border-color:#ffd700;color:#ffd700}
#controls{margin-top:8px;display:flex;gap:8px}
#controls button{padding:6px 14px;background:#1a1a2e;color:#ffd700;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:12px}
#controls select{padding:4px 8px;background:#1a1a2e;color:#ffd700;border:1px solid #2a2a3e;border-radius:4px;font-size:12px}
</style>
</head>
<body>
<h1>🎨 像素画板</h1>
<div id="info">
  <div id="colors"></div>
  <div><input type="color" id="customColor" value="#ffd700" onchange="currentColor=this.value;updateActive()"></div>
</div>
<canvas id="game"></canvas>
<div id="tools">
  <div class="tool active" data-tool="pen" onclick="setTool('pen')">✏️ 画笔</div>
  <div class="tool" data-tool="fill" onclick="setTool('fill')">🪣 填充</div>
  <div class="tool" data-tool="eraser" onclick="setTool('eraser')">🧹 橡皮</div>
  <div class="tool" data-tool="line" onclick="setTool('line')">📏 直线</div>
  <div class="tool" data-tool="rect" onclick="setTool('rect')">⬜ 矩形</div>
  <div class="tool" data-tool="circle" onclick="setTool('circle')">⭕ 圆形</div>
</div>
<div id="controls">
  <select id="gridSize" onchange="initCanvas()"><option value="16">16×16</option><option value="32" selected>32×32</option><option value="48">48×48</option><option value="64">64×64</option></select>
  <button onclick="clearCanvas()">🗑️ 清空</button>
  <button onclick="downloadArt()">💾 保存</button>
  <button onclick="undoAction()">↩ 撤销</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const PALETTE=['#000','#fff','#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#1abc9c','#e91e63','#795548','#607d8b','#ff5722','#00bcd4','#8bc34a','#ffc107','#673ab7','#ff9800','#009688','#cddc39'];

let gridSize,cellSize,pixels,currentColor,tool,drawing,startPos,history;

function initCanvas(){
  gridSize=parseInt(document.getElementById('gridSize').value);
  cellSize=Math.min(12,Math.floor(400/gridSize));
  canvas.width=gridSize*cellSize;canvas.height=gridSize*cellSize;
  pixels=Array.from({length:gridSize},()=>Array(gridSize).fill('#0a0a14'));
  history=[];tool='pen';currentColor='#e74c3c';
  renderColors();render();
}

function renderColors(){
  const el=document.getElementById('colors');
  el.innerHTML=PALETTE.map(c=>`<div class="color-btn${c===currentColor?' active':''}" style="background:${c}" onclick="currentColor='${c}';updateActive()"></div>`).join('');
}

function updateActive(){
  document.querySelectorAll('.color-btn').forEach(b=>b.classList.toggle('active',b.style.background===currentColor||rgbToHex(b.style.backgroundColor)===currentColor));
}

function rgbToHex(rgb){
  if(rgb.startsWith('#'))return rgb;
  const m=rgb.match(/\d+/g);if(!m)return'#000';
  return'#'+m.slice(0,3).map(n=>parseInt(n).toString(16).padStart(2,'0')).join('');
}

function setTool(t){
  tool=t;
  document.querySelectorAll('.tool').forEach(b=>b.classList.toggle('active',b.dataset.tool===t));
}

function saveHistory(){
  history.push(pixels.map(r=>[...r]));
  if(history.length>50)history.shift();
}

function undoAction(){
  if(!history.length)return;
  pixels=history.pop();render();
}

function getGridPos(e){
  const rect=canvas.getBoundingClientRect();
  const x=Math.floor((e.clientX-rect.left)/cellSize);
  const y=Math.floor((e.clientY-rect.top)/cellSize);
  return{x,y};
}

function setPixel(x,y,color){
  if(x>=0&&x<gridSize&&y>=0&&y<gridSize)pixels[y][x]=color;
}

function floodFill(sx,sy,targetColor,fillColor){
  if(targetColor===fillColor)return;
  const stack=[[sx,sy]];
  while(stack.length){
    const[x,y]=stack.pop();
    if(x<0||x>=gridSize||y<0||y>=gridSize||pixels[y][x]!==targetColor)continue;
    pixels[y][x]=fillColor;
    stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
}

canvas.addEventListener('mousedown',e=>{
  drawing=true;
  const{x,y}=getGridPos(e);
  startPos={x,y};
  saveHistory();
  if(tool==='pen'){setPixel(x,y,currentColor);render()}
  else if(tool==='eraser'){setPixel(x,y,'#0a0a14');render()}
  else if(tool==='fill'){floodFill(x,y,pixels[y][x],currentColor);render()}
});

canvas.addEventListener('mousemove',e=>{
  if(!drawing)return;
  const{x,y}=getGridPos(e);
  if(tool==='pen'){setPixel(x,y,currentColor);render()}
  else if(tool==='eraser'){setPixel(x,y,'#0a0a14');render()}
});

canvas.addEventListener('mouseup',e=>{
  if(!drawing)return;drawing=false;
  const{x,y}=getGridPos(e);
  if(tool==='line'){drawLine(startPos.x,startPos.y,x,y,currentColor);render()}
  else if(tool==='rect'){drawRect(startPos.x,startPos.y,x,y,currentColor);render()}
  else if(tool==='circle'){drawCircle(startPos.x,startPos.y,x,y,currentColor);render()}
});

function drawLine(x0,y0,x1,y1,color){
  const dx=Math.abs(x1-x0),dy=Math.abs(y1-y0);
  const sx=x0<x1?1:-1,sy=y0<y1?1:-1;
  let err=dx-dy;
  while(true){
    setPixel(x0,y0,color);
    if(x0===x1&&y0===y1)break;
    const e2=2*err;
    if(e2>-dy){err-=dy;x0+=sx}
    if(e2<dx){err+=dx;y0+=sy}
  }
}

function drawRect(x0,y0,x1,y1,color){
  drawLine(x0,y0,x1,y0,color);drawLine(x1,y0,x1,y1,color);
  drawLine(x1,y1,x0,y1,color);drawLine(x0,y1,x0,y0,color);
}

function drawCircle(cx,cy,x,y,color){
  const r=Math.round(Math.sqrt((x-cx)**2+(y-cy)**2));
  let px=r,py=0,err=0;
  while(px>=py){
    setPixel(cx+px,cy+py,color);setPixel(cx+py,cy+px,color);
    setPixel(cx-py,cy+px,color);setPixel(cx-px,cy+py,color);
    setPixel(cx-px,cy-py,color);setPixel(cx-py,cy-px,color);
    setPixel(cx+py,cy-px,color);setPixel(cx+px,cy-py,color);
    py++;err+=1+2*py;
    if(2*(err-px)+1>0){px--;err+=1-2*px}
  }
}

function clearCanvas(){saveHistory();pixels=Array.from({length:gridSize},()=>Array(gridSize).fill('#0a0a14'));render()}

function downloadArt(){
  const exportCanvas=document.createElement('canvas');
  exportCanvas.width=gridSize*8;exportCanvas.height=gridSize*8;
  const ectx=exportCanvas.getContext('2d');
  for(let y=0;y<gridSize;y++)for(let x=0;x<gridSize;x++){
    ectx.fillStyle=pixels[y][x];
    ectx.fillRect(x*8,y*8,8,8);
  }
  const link=document.createElement('a');
  link.download='pixel-art.png';
  link.href=exportCanvas.toDataURL();
  link.click();
}

function render(){
  ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let y=0;y<gridSize;y++)for(let x=0;x<gridSize;x++){
    ctx.fillStyle=pixels[y][x];
    ctx.fillRect(x*cellSize,y*cellSize,cellSize,cellSize);
  }
  // grid lines
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=0.5;
  for(let i=0;i<=gridSize;i++){
    ctx.beginPath();ctx.moveTo(i*cellSize,0);ctx.lineTo(i*cellSize,gridSize*cellSize);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*cellSize);ctx.lineTo(gridSize*cellSize,i*cellSize);ctx.stroke();
  }
}

renderColors();initCanvas();
</script>
</body>
</html>

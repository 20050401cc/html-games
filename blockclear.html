<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎪 俄罗斯方块变体</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#5bf;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #2a2a3e;border-radius:8px;box-shadow:0 0 30px rgba(90,130,255,0.1)}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a1a2e;color:#5bf;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:12px}
</style>
</head>
<body>
<h1>🎪 块消除</h1>
<div id="info">
  <div>分数: <span class="val" id="score">0</span></div>
  <div>行数: <span class="val" id="lines">0</span></div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <button onclick="newGame()">新游戏</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const COLS=10,ROWS=20,CELL=24;
canvas.width=COLS*CELL;canvas.height=ROWS*CELL;

const SHAPES=[
  {blocks:[[0,0],[1,0],[2,0],[3,0]],color:'#0ff'}, // I
  {blocks:[[0,0],[1,0],[0,1],[1,1]],color:'#ff0'}, // O
  {blocks:[[0,0],[1,0],[2,0],[1,1]],color:'#a0f'}, // T
  {blocks:[[1,0],[2,0],[0,1],[1,1]],color:'#0f0'}, // S
  {blocks:[[0,0],[1,0],[1,1],[2,1]],color:'#f00'}, // Z
  {blocks:[[0,0],[0,1],[1,1],[2,1]],color:'#55f'}, // J
  {blocks:[[2,0],[0,1],[1,1],[2,1]],color:'#f80'}, // L
];

let board,piece,nextPiece,score,lines,alive,timer,dropInterval;

function newGame(){
  board=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  score=0;lines=0;alive=true;dropInterval=800;
  nextPiece=randomPiece();spawnPiece();
  clearInterval(timer);timer=setInterval(tick,dropInterval);
  render();updateInfo();
}

function randomPiece(){
  const s=SHAPES[Math.floor(Math.random()*SHAPES.length)];
  return{blocks:s.blocks.map(b=>[...b]),color:s.color,x:3,y:0};
}

function spawnPiece(){
  piece=nextPiece;piece.x=3;piece.y=0;
  nextPiece=randomPiece();
  if(collides(piece.blocks,piece.x,piece.y)){alive=false;clearInterval(timer)}
}

function collides(blocks,px,py){
  for(const[bx,by]of blocks){
    const nx=px+bx,ny=py+by;
    if(nx<0||nx>=COLS||ny>=ROWS)return true;
    if(ny>=0&&board[ny][nx])return true;
  }
  return false;
}

function move(dx,dy){
  if(!alive)return false;
  if(!collides(piece.blocks,piece.x+dx,piece.y+dy)){piece.x+=dx;piece.y+=dy;render();return true}
  return false;
}

function rotate(){
  if(!alive||!piece)return;
  const rotated=piece.blocks.map(([x,y])=>[-y+1,x]);
  const kicks=[0,-1,1,-2,2];
  for(const kick of kicks){
    if(!collides(rotated,piece.x+kick,piece.y)){piece.blocks=rotated;piece.x+=kick;render();return}}
}

function hardDrop(){
  if(!alive)return;
  while(move(0,1)){}
  lockPiece();
}

function lockPiece(){
  for(const[bx,by]of piece.blocks){
    const ny=piece.y+by;
    if(ny>=0)board[ny][piece.x+bx]=piece.color;
  }
  clearLines();spawnPiece();render();
}

function clearLines(){
  let cleared=0;
  for(let y=ROWS-1;y>=0;y--){
    if(board[y].every(c=>c)){board.splice(y,1);board.unshift(Array(COLS).fill(null));cleared++;y++}
  }
  if(cleared>0){
    score+=[0,100,300,500,800][cleared]||800;
    lines+=cleared;
    dropInterval=Math.max(100,800-lines*20);
    clearInterval(timer);timer=setInterval(tick,dropInterval);
  }
}

function tick(){if(alive&&!move(0,1))lockPiece()}

function render(){
  ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,canvas.width,canvas.height);
  // grid
  ctx.strokeStyle='#15151f';ctx.lineWidth=0.5;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,ROWS*CELL);ctx.stroke()}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(COLS*CELL,y*CELL);ctx.stroke()}
  // board
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    if(board[y][x]){ctx.fillStyle=board[y][x];ctx.fillRect(x*CELL+1,y*CELL+1,CELL-2,CELL-2)}
  }
  // ghost
  if(piece&&alive){
    let gy=piece.y;
    while(!collides(piece.blocks,piece.x,gy+1))gy++;
    ctx.globalAlpha=0.2;
    for(const[bx,by]of piece.blocks){ctx.fillStyle=piece.color;ctx.fillRect((piece.x+bx)*CELL+1,(gy+by)*CELL+1,CELL-2,CELL-2)}
    ctx.globalAlpha=1;
  }
  // piece
  if(piece&&alive){
    for(const[bx,by]of piece.blocks){
      ctx.fillStyle=piece.color;ctx.fillRect((piece.x+bx)*CELL+1,(piece.y+by)*CELL+1,CELL-2,CELL-2);
      ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect((piece.x+bx)*CELL+1,(piece.y+by)*CELL+1,CELL-2,4);
    }
  }
  updateInfo();
}

document.addEventListener('keydown',e=>{
  if(!alive)return;
  switch(e.key){
    case'ArrowLeft':e.preventDefault();move(-1,0);break;
    case'ArrowRight':e.preventDefault();move(1,0);break;
    case'ArrowDown':e.preventDefault();if(move(0,1))score+=1;break;
    case'ArrowUp':case'x':e.preventDefault();rotate();break;
    case' ':e.preventDefault();hardDrop();break;
  }
});

function updateInfo(){
  document.getElementById('score').textContent=score;
  document.getElementById('lines').textContent=lines;
}

newGame();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎨 像素动画</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#ffd700;margin-bottom:6px}
#frames{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;max-width:600px;padding:8px}
.frame-thumb{width:48px;height:48px;border:2px solid #2a2a3e;border-radius:4px;cursor:pointer;image-rendering:pixelated}
.frame-thumb.active{border-color:#ffd700}
.frame-thumb.add{background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:24px;color:#666}
canvas{border:2px solid #2a2a3e;border-radius:8px;box-shadow:0 0 30px rgba(255,215,0,0.1);cursor:crosshair;image-rendering:pixelated}
#tools{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;justify-content:center}
.tool{padding:4px 10px;background:#1a1a2e;border:1px solid #2a2a3e;border-radius:4px;cursor:pointer;font-size:11px;color:#888}
.tool.active{border-color:#ffd700;color:#ffd700}
#colors{display:flex;gap:3px;margin-top:6px}
.cbtn{width:18px;height:18px;border-radius:3px;cursor:pointer;border:2px solid transparent}
.cbtn.active{border-color:#fff}
#controls{margin-top:8px;display:flex;gap:8px}
#controls button{padding:6px 14px;background:#1a1a2e;color:#ffd700;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:12px}
</style>
</head>
<body>
<h1>🎨 像素动画</h1>
<div id="frames"></div>
<canvas id="game"></canvas>
<div id="tools">
  <div class="tool active" data-tool="pen" onclick="setTool('pen')">✏️</div>
  <div class="tool" data-tool="eraser" onclick="setTool('eraser')">🧹</div>
  <div class="tool" data-tool="fill" onclick="setTool('fill')">🪣</div>
  <div class="tool" data-tool="line" onclick="setTool('line')">📏</div>
</div>
<div id="colors"></div>
<div id="controls">
  <button onclick="playAnim()">▶ 播放</button>
  <button onclick="stopAnim()">⏹ 停止</button>
  <button onclick="addFrame()">➕ 帧</button>
  <button onclick="delFrame()">🗑️ 删帧</button>
  <button onclick="dupFrame()">📋 复制</button>
  <button onclick="exportGif()">💾 导出</button>
  <button onclick="clearFrame()">清空帧</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const GRID=16,CELL=24;
canvas.width=GRID*CELL;canvas.height=GRID*CELL;

const PALETTE=['#000','#fff','#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#1abc9c','#e91e63','#795548','#607d8b','#ff5722','#00bcd4','#8bc34a','#ffc107','#673ab7','#ff9800','#009688','#cddc39'];

let frames,currentFrame,currentColor,tool,animating,animInterval,startPos;

function init(){
  frames=[createEmptyFrame()];currentFrame=0;
  currentColor='#e74c3c';tool='pen';animating=false;
  renderColors();renderFrames();render();
}

function createEmptyFrame(){return Array.from({length:GRID},()=>Array(GRID).fill('#0a0a14'))}

function renderColors(){
  document.getElementById('colors').innerHTML=PALETTE.map(c=>`<div class="cbtn${c===currentColor?' active':''}" style="background:${c}" onclick="currentColor='${c}';renderColors()"></div>`).join('');
}

function renderFrames(){
  const el=document.getElementById('frames');
  el.innerHTML=frames.map((f,i)=>{
    const c=document.createElement('canvas');c.width=GRID;c.height=GRID;
    const cx=c.getContext('2d');
    for(let y=0;y<GRID;y++)for(let x=0;x<GRID;x++){cx.fillStyle=f[y][x];cx.fillRect(x,y,1,1)}
    return`<img class="frame-thumb${i===currentFrame?' active':''}" src="${c.toDataURL()}" onclick="selectFrame(${i})">`;
  }).join('')+`<div class="frame-thumb add" onclick="addFrame()">+</div>`;
}

function selectFrame(i){currentFrame=i;render();renderFrames()}

function addFrame(){
  frames.splice(currentFrame+1,0,createEmptyFrame());
  currentFrame++;renderFrames();render();
}

function delFrame(){
  if(frames.length<=1)return;
  frames.splice(currentFrame,1);
  currentFrame=Math.min(currentFrame,frames.length-1);
  renderFrames();render();
}

function dupFrame(){
  frames.splice(currentFrame+1,0,frames[currentFrame].map(r=>[...r]));
  currentFrame++;renderFrames();render();
}

function clearFrame(){
  frames[currentFrame]=createEmptyFrame();render();renderFrames();
}

function setTool(t){tool=t;document.querySelectorAll('.tool').forEach(b=>b.classList.toggle('active',b.dataset.tool===t))}

function getPos(e){
  const rect=canvas.getBoundingClientRect();
  return{x:Math.floor((e.clientX-rect.left)/CELL),y:Math.floor((e.clientY-rect.top)/CELL)};
}

function setPixel(x,y){
  if(x>=0&&x<GRID&&y>=0&&y<GRID){frames[currentFrame][y][x]=tool==='eraser'?'#0a0a14':currentColor;render();renderFrames()}
}

function floodFill(sx,sy,target,fill){
  if(target===fill)return;
  const stack=[[sx,sy]];const f=frames[currentFrame];
  while(stack.length){
    const[x,y]=stack.pop();
    if(x<0||x>=GRID||y<0||y>=GRID||f[y][x]!==target)continue;
    f[y][x]=fill;stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
}

canvas.addEventListener('mousedown',e=>{
  const{x,y}=getPos(e);startPos={x,y};
  if(tool==='pen'||tool==='eraser')setPixel(x,y);
  else if(tool==='fill')floodFill(x,y,frames[currentFrame][y][x],currentColor);
});
canvas.addEventListener('mousemove',e=>{
  if(e.buttons!==1)return;const{x,y}=getPos(e);
  if(tool==='pen'||tool==='eraser')setPixel(x,y);
});
canvas.addEventListener('mouseup',e=>{
  if(!startPos)return;
  if(tool==='line'){const{x,y}=getPos(e);drawLine(startPos.x,startPos.y,x,y);render();renderFrames()}
  startPos=null;
});

function drawLine(x0,y1,x1,y2){
  const dx=Math.abs(x1-x0),dy=Math.abs(y2-y1);
  const sx=x0<x1?1:-1,sy=y1<y2?1:-1;
  let err=dx-dy;
  while(true){
    setPixel(x0,y1);
    if(x0===x1&&y1===y2)break;
    const e2=2*err;
    if(e2>-dy){err-=dy;x0+=sx}
    if(e2<dx){err+=dx;y1+=sy}
  }
}

function playAnim(){
  if(animating)return;animating=true;
  let fi=0;
  animInterval=setInterval(()=>{
    currentFrame=fi%frames.length;render();renderFrames();fi++;
  },200);
}
function stopAnim(){animating=false;clearInterval(animInterval)}

function exportGif(){
  // export as individual PNGs (simplified)
  const link=document.createElement('a');
  const c=document.createElement('canvas');c.width=GRID*8;c.height=GRID*8;
  const cx=c.getContext('2d');
  for(let y=0;y<GRID;y++)for(let x=0;x<GRID;x++){
    cx.fillStyle=frames[currentFrame][y][x];cx.fillRect(x*8,y*8,8,8);
  }
  link.download='pixel-frame.png';link.href=c.toDataURL();link.click();
}

function render(){
  ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,canvas.width,canvas.height);
  const frame=frames[currentFrame];
  for(let y=0;y<GRID;y++)for(let x=0;x<GRID;x++){
    ctx.fillStyle=frame[y][x];ctx.fillRect(x*CELL,y*CELL,CELL,CELL);
  }
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=0.5;
  for(let i=0;i<=GRID;i++){
    ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,GRID*CELL);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*CELL);ctx.lineTo(GRID*CELL,i*CELL);ctx.stroke();
  }
}

init();
</script>
</body>
</html>

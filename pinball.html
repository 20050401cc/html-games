<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 弹球机</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#ffd700;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #3a3a2a;border-radius:8px;box-shadow:0 0 30px rgba(255,215,0,0.15)}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a1a2e;color:#ffd700;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:12px}
#msg{margin-top:8px;font-size:12px;color:#888}
</style>
</head>
<body>
<h1>🎰 弹球机</h1>
<div id="info">
  <div>分数: <span class="val" id="score">0</span></div>
  <div>球数: <span class="val" id="balls">5</span></div>
  <div>最高: <span class="val" id="best">0</span></div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <button onclick="launchBall()">发射 (空格)</button>
  <button onclick="resetGame()">重置</button>
</div>
<div id="msg">← → 控制挡板 · 空格发射</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=360,H=600;
canvas.width=W;canvas.height=H;

let ball,flippers,bumpers,slingshots,score,ballsLeft,launched,particles;
let best=parseInt(localStorage.getItem('pinball_best')||'0');
document.getElementById('best').textContent=best;

const GRAVITY=0.15,DAMPING=0.98;

function init(){
  score=0;ballsLeft=5;launched=false;
  ball={x:W-20,y:H-80,vx:0,vy:0,r:8};
  particles=[];
  // bumpers
  bumpers=[
    {x:W/2,y:150,r:25,pts:100,color:'#f55'},
    {x:W/2-70,y:200,r:20,pts:50,color:'#5f5'},
    {x:W/2+70,y:200,r:20,pts:50,color:'#55f'},
    {x:W/2,y:280,r:22,pts:75,color:'#ff5'},
    {x:W/2-50,y:350,r:18,pts:50,color:'#f5f'},
    {x:W/2+50,y:350,r:18,pts:50,color:'#5ff'},
  ];
  // flippers
  flippers={
    left:{x:W/2-60,y:H-60,len:60,angle:0.4,targetAngle:0.4,active:false},
    right:{x:W/2+60,y:H-60,len:60,angle:Math.PI-0.4,targetAngle:Math.PI-0.4,active:false},
  };
  // slingshots
  slingshots=[
    {x1:40,y1:H-150,x2:40,y2:H-80,pts:10},
    {x1:W-40,y1:H-150,x2:W-40,y2:H-80,pts:10},
  ];
  updateInfo();render();
}

function launchBall(){
  if(launched)return;
  ball.x=W-20;ball.y=H-80;ball.vx=-2+Math.random()*2;ball.vy=-8-Math.random()*3;
  launched=true;
}

function update(){
  if(!launched)return;
  // physics
  ball.vy+=GRAVITY;
  ball.vx*=DAMPING;ball.vy*=DAMPING;
  ball.x+=ball.vx;ball.y+=ball.vy;
  // wall bounce
  if(ball.x-ball.r<10){ball.x=10+ball.r;ball.vx=Math.abs(ball.vx)*0.8}
  if(ball.x+ball.r>W-10){ball.x=W-10-ball.r;ball.vx=-Math.abs(ball.vx)*0.8}
  if(ball.y-ball.r<10){ball.y=10+ball.r;ball.vy=Math.abs(ball.vy)*0.8}
  // bottom - lose ball
  if(ball.y+ball.r>H+20){
    launched=false;ballsLeft--;
    if(ballsLeft<=0)gameOver();
    else{ball.x=W-20;ball.y=H-80}
    updateInfo();return;
  }
  // bumper collision
  for(const b of bumpers){
    const dx=ball.x-b.x,dy=ball.y-b.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<ball.r+b.r){
      const nx=dx/dist,ny=dy/dist;
      ball.x=b.x+nx*(ball.r+b.r);ball.y=b.y+ny*(ball.r+b.r);
      const dot=ball.vx*nx+ball.vy*ny;
      ball.vx-=2*dot*nx*1.2;ball.vy-=2*dot*ny*1.2;
      score+=b.pts;
      spawnParticles(b.x,b.y,b.color,8);
    }
  }
  // flipper collision
  for(const side of['left','right']){
    const f=flippers[side];
    const endX=f.x+Math.cos(f.angle)*f.len;
    const endY=f.y+Math.sin(f.angle)*f.len;
    // line segment collision
    const dx=endX-f.x,dy=endY-f.y;
    const len=Math.sqrt(dx*dx+dy*dy);
    const nx=-dy/len,ny=dx/len;
    const px=ball.x-f.x,py=ball.y-f.y;
    const proj=px*dx/len+py*dy/len;
    const dist=px*nx+py*ny;
    if(proj>=0&&proj<=len&&Math.abs(dist)<ball.r+4){
      ball.x+=nx*(ball.r+4-Math.abs(dist))*(dist>0?1:-1);
      ball.y+=ny*(ball.r+4-Math.abs(dist))*(dist>0?1:-1);
      if(f.active){
        ball.vx+=nx*8;ball.vy+=ny*8-3;
      }else{
        const dot=ball.vx*nx+ball.vy*ny;
        ball.vx-=2*dot*nx*0.6;ball.vy-=2*dot*ny*0.6;
      }
    }
  }
  // slingshot
  for(const s of slingshots){
    const dx=ball.x-Math.min(s.x1,s.x2),dy=ball.y-Math.min(s.y1,s.y2);
    if(Math.abs(ball.x-s.x1)<ball.r+5&&ball.y>s.y1&&ball.y<s.y2){
      ball.vx+=ball.x<s.x1?-3:3;
      score+=s.pts;
      spawnParticles(s.x1,(s.y1+s.y2)/2,'#ffd700',5);
    }
  }
  // flipper animation
  for(const side of['left','right']){
    const f=flippers[side];
    const target=f.active?(side==='left'?-0.4:Math.PI+0.4):(side==='left'?0.4:Math.PI-0.4);
    f.angle+=(target-f.angle)*0.3;
  }
  // particles
  for(let i=particles.length-1;i>=0;i--){
    particles[i].x+=particles[i].dx;particles[i].y+=particles[i].dy;particles[i].life--;
    if(particles[i].life<=0)particles.splice(i,1);
  }
  updateInfo();
}

function render(){
  // background
  ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,W,H);
  // playfield border
  ctx.strokeStyle='#3a3a2a';ctx.lineWidth=8;
  ctx.beginPath();
  ctx.moveTo(6,6);ctx.lineTo(W-6,6);ctx.lineTo(W-6,H+10);
  ctx.moveTo(6,6);ctx.lineTo(6,H+10);
  ctx.stroke();
  // launch chute
  ctx.fillStyle='#1a1a0e';ctx.fillRect(W-30,0,30,H);
  ctx.strokeStyle='#3a3a2a';ctx.lineWidth=2;ctx.strokeRect(W-30,0,30,H);
  // bumpers
  for(const b of bumpers){
    const grad=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
    grad.addColorStop(0,'#fff');grad.addColorStop(0.3,b.color);grad.addColorStop(1,b.color+'40');
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=b.color;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 12px sans-serif';ctx.textAlign='center';
    ctx.fillText(b.pts,b.x,b.y+4);ctx.textAlign='left';
  }
  // flippers
  for(const side of['left','right']){
    const f=flippers[side];
    const endX=f.x+Math.cos(f.angle)*f.len;
    const endY=f.y+Math.sin(f.angle)*f.len;
    ctx.strokeStyle=f.active?'#ffd700':'#888';ctx.lineWidth=8;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(f.x,f.y);ctx.lineTo(endX,endY);ctx.stroke();
    ctx.lineCap='butt';
    // pivot
    ctx.fillStyle='#555';ctx.beginPath();ctx.arc(f.x,f.y,6,0,Math.PI*2);ctx.fill();
  }
  // slingshots
  for(const s of slingshots){
    ctx.strokeStyle='#ffd700';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.stroke();
  }
  // ball
  if(launched){
    const grad=ctx.createRadialGradient(ball.x-2,ball.y-2,1,ball.x,ball.y,ball.r);
    grad.addColorStop(0,'#fff');grad.addColorStop(0.5,'#ddd');grad.addColorStop(1,'#888');
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
    // glow
    ctx.fillStyle='rgba(255,255,255,0.1)';
    ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r*2,0,Math.PI*2);ctx.fill();
  }else{
    // ball in chute
    ctx.fillStyle='#ccc';
    ctx.beginPath();ctx.arc(W-15,H-80,ball.r,0,Math.PI*2);ctx.fill();
  }
  // particles
  for(const p of particles){
    ctx.globalAlpha=p.life/20;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  // score display
  ctx.fillStyle='rgba(255,215,0,0.08)';ctx.font='bold 36px sans-serif';ctx.textAlign='center';
  ctx.fillText(score,W/2-15,50);ctx.textAlign='left';
}

function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++){
    particles.push({x,y,dx:(Math.random()-0.5)*6,dy:(Math.random()-0.5)*6,life:20,color,r:Math.random()*3+1});
  }
}

function gameOver(){
  if(score>best){best=score;localStorage.setItem('pinball_best',best);document.getElementById('best').textContent=best}
  alert(`游戏结束！分数: ${score}`);
  resetGame();
}

function resetGame(){init()}

function updateInfo(){
  document.getElementById('score').textContent=score;
  document.getElementById('balls').textContent=ballsLeft;
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='z'){flippers.left.active=true;e.preventDefault()}
  if(e.key==='ArrowRight'||e.key==='/'||e.key==='m'){flippers.right.active=true;e.preventDefault()}
  if(e.key===' '){launchBall();e.preventDefault()}
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='z')flippers.left.active=false;
  if(e.key==='ArrowRight'||e.key==='/'||e.key==='m')flippers.right.active=false;
});

function loop(){update();render();requestAnimationFrame(loop)}

init();
loop();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 飞刀挑战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#ffd700;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #2a2a3e;border-radius:8px;box-shadow:0 0 30px rgba(255,215,0,0.1);cursor:pointer}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a1a2e;color:#ffd700;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:12px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h2{font-size:32px;margin-bottom:8px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;background:#ffd700;color:#111;border:none;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<h1>🎯 飞刀挑战</h1>
<div id="info">
  <div>分数: <span class="val" id="score">0</span></div>
  <div>等级: <span class="val" id="level">1</span></div>
  <div>飞刀: <span class="val" id="knives">5</span></div>
  <div>最高: <span class="val" id="best">0</span></div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <button onclick="throwKnife()">投掷 (空格)</button>
  <button onclick="newGame()">新游戏</button>
</div>
<div id="overlay">
  <h2 id="olTitle">游戏结束</h2>
  <p id="olMsg"></p>
  <button onclick="newGame()">再来一次</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=400,H=500;
canvas.width=W;canvas.height=H;

let target,thrownKnives,flyingKnife,score,level,knivesLeft,spinning,alive,particles;
let best=parseInt(localStorage.getItem('knife_best')||'0');
document.getElementById('best').textContent=best;

function newGame(){
  score=0;level=1;knivesLeft=5;alive=true;particles=[];
  createLevel();
  document.getElementById('overlay').classList.remove('show');
  updateInfo();render();
}

function createLevel(){
  const r=60+level*5;
  target={x:W/2,y:200,r,angle:0,speed:0.01+level*0.003,spikeAngle:[]};
  // pre-place some knives
  const existingCount=Math.min(level-1,6);
  target.spikeAngle=[];
  for(let i=0;i<existingCount;i++){
    target.spikeAngle.push(Math.random()*Math.PI*2);
  }
  thrownKnives=[];flyingKnife=null;spinning=true;
  knivesLeft=5+Math.floor(level/2);
}

function throwKnife(){
  if(!alive||flyingKnife||!spinning||knivesLeft<=0)return;
  flyingKnife={x:W/2,y:H-60,vx:0,vy:-12,angle:0};
  knivesLeft--;updateInfo();
}

function update(){
  if(!alive)return;
  target.angle+=target.speed;
  // update flying knife
  if(flyingKnife){
    flyingKnife.y+=flyingKnife.vy;
    flyingKnife.angle+=0.1;
    // check if reached target
    const dist=Math.sqrt((flyingKnife.x-target.x)**2+(flyingKnife.y-target.y)**2);
    if(dist<=target.r+5){
      // check collision with existing spikes
      const knifeAngle=Math.atan2(flyingKnife.y-target.y,flyingKnife.x-target.x);
      for(const sa of target.spikeAngle){
        const angleDiff=Math.abs(normalizeAngle(knifeAngle-sa));
        if(angleDiff<0.15){
          // hit existing knife - game over
          alive=false;
          spawnParticles(flyingKnife.x,flyingKnife.y,'#f55',15);
          if(score>best){best=score;localStorage.setItem('knife_best',best);document.getElementById('best').textContent=best}
          document.getElementById('olTitle').textContent='💥 飞刀碰撞！';
          document.getElementById('olMsg').textContent=`分数: ${score}`;
          document.getElementById('overlay').classList.add('show');
          flyingKnife=null;return;
        }
      }
      // stick in
      target.spikeAngle.push(knifeAngle);
      thrownKnives.push({angle:knifeAngle,r:target.r});
      score+=10+level*2;
      spawnParticles(flyingKnife.x,flyingKnife.y,'#ffd700',8);
      flyingKnife=null;
      // check level complete
      if(knivesLeft<=0){
        level++;score+=50;
        setTimeout(()=>{createLevel();updateInfo();render()},800);
      }
      updateInfo();
    }
    // check if missed target completely
    if(flyingKnife&&flyingKnife.y<target.y-target.r-20){
      flyingKnife=null;
      if(knivesLeft<=0){
        alive=false;
        if(score>best){best=score;localStorage.setItem('knife_best',best);document.getElementById('best').textContent=best}
        document.getElementById('olTitle').textContent='💨 飞刀用完！';
        document.getElementById('olMsg').textContent=`分数: ${score}`;
        document.getElementById('overlay').classList.add('show');
      }
    }
  }
  // particles
  for(let i=particles.length-1;i>=0;i--){
    particles[i].x+=particles[i].dx;particles[i].y+=particles[i].dy;particles[i].dy+=0.1;particles[i].life--;
    if(particles[i].life<=0)particles.splice(i,1);
  }
}

function render(){
  ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,W,H);
  // background pattern
  for(let i=0;i<20;i++){
    ctx.strokeStyle='rgba(255,255,255,0.02)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(W/2,200,30+i*15,0,Math.PI*2);ctx.stroke();
  }
  // target
  ctx.save();ctx.translate(target.x,target.y);ctx.rotate(target.angle);
  // target body
  const grad=ctx.createRadialGradient(0,0,0,0,0,target.r);
  grad.addColorStop(0,'#8b4513');grad.addColorStop(0.3,'#a0522d');grad.addColorStop(0.6,'#8b4513');grad.addColorStop(1,'#654321');
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.arc(0,0,target.r,0,Math.PI*2);ctx.fill();
  // rings
  ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1;
  for(let r=target.r*0.2;r<target.r;r+=target.r*0.2){
    ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.stroke();
  }
  // center dot
  ctx.fillStyle='#ffd700';
  ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fill();
  // stuck knives
  for(const sa of target.spikeAngle){
    const kx=Math.cos(sa)*(target.r-5);
    const ky=Math.sin(sa)*(target.r-5);
    ctx.save();ctx.translate(kx,ky);ctx.rotate(sa+Math.PI/2);
    ctx.fillStyle='#c0c0c0';
    ctx.fillRect(-2,-12,4,24);
    ctx.fillStyle='#8b4513';
    ctx.fillRect(-4,8,8,6);
    ctx.restore();
  }
  ctx.restore();
  // flying knife
  if(flyingKnife){
    ctx.save();ctx.translate(flyingKnife.x,flyingKnife.y);ctx.rotate(flyingKnife.angle);
    ctx.fillStyle='#c0c0c0';
    ctx.fillRect(-2,-14,4,28);
    ctx.fillStyle='#8b4513';
    ctx.fillRect(-4,10,8,6);
    ctx.restore();
  }
  // launcher
  ctx.fillStyle='#888';
  ctx.fillRect(W/2-15,H-40,30,40);
  ctx.fillStyle='#c0c0c0';
  ctx.fillRect(W/2-3,H-55,6,20);
  // particles
  for(const p of particles){
    ctx.globalAlpha=p.life/25;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

function normalizeAngle(a){while(a>Math.PI)a-=2*Math.PI;while(a<-Math.PI)a+=2*Math.PI;return a}

function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++)particles.push({x,y,dx:(Math.random()-0.5)*6,dy:(Math.random()-0.5)*6,life:25,color,r:Math.random()*3+1});
}

function updateInfo(){
  document.getElementById('score').textContent=score;
  document.getElementById('level').textContent=level;
  document.getElementById('knives').textContent=knivesLeft;
}

document.addEventListener('keydown',e=>{
  if(e.key===' '){e.preventDefault();throwKnife()}
});
canvas.addEventListener('click',throwKnife);

function loop(){update();render();requestAnimationFrame(loop)}
newGame();loop();
</script>
</body>
</html>

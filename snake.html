<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 贪吃蛇</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e0a;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#c8d8c0}
h1{font-size:36px;color:#4a4;margin-bottom:8px}
#info{display:flex;gap:20px;margin-bottom:12px;font-size:14px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #2a4a2a;border-radius:8px;box-shadow:0 0 30px rgba(74,170,74,0.2);cursor:crosshair}
#controls{margin-top:12px;display:flex;gap:8px}
#controls button{padding:8px 20px;background:#1a2a1a;color:#4a4;border:1px solid #2a4a2a;border-radius:6px;cursor:pointer;font-size:13px}
#controls button:hover{background:#2a3a2a}
#msg{margin-top:12px;font-size:14px;color:#ffd700;min-height:20px}
#mobile{display:none;margin-top:12px;gap:4px}
#mobile button{width:56px;height:56px;font-size:24px;background:#1a2a1a;border:1px solid #2a4a2a;border-radius:8px;color:#4a4;cursor:pointer}
@media(max-width:600px){#mobile{display:grid;grid-template-columns:repeat(3,56px);grid-template-rows:repeat(2,56px);justify-content:center}}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h2{font-size:36px;color:#e74c3c;margin-bottom:8px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;background:#4a4;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<h1>🐍 贪吃蛇</h1>
<div id="info">
  <div>分数: <span class="val" id="score">0</span></div>
  <div>最高: <span class="val" id="best">0</span></div>
  <div>长度: <span class="val" id="len">3</span></div>
  <div>速度: <span class="val" id="speed">1</span></div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <button onclick="setSpeed(1)">慢速</button>
  <button onclick="setSpeed(2)">中速</button>
  <button onclick="setSpeed(3)">快速</button>
  <button onclick="toggleWall()">穿墙: <span id="wallMode">关</span></button>
</div>
<div id="mobile">
  <div></div><button onclick="setDir(0,-1)">↑</button><div></div>
  <button onclick="setDir(-1,0)">←</button><button onclick="setDir(0,1)">↓</button><button onclick="setDir(1,0)">→</button>
</div>
<div id="msg"></div>
<div id="overlay">
  <h2 id="olTitle">💀 游戏结束</h2>
  <p id="olMsg"></p>
  <button onclick="init()">再来一局</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const GRID=20,COLS=25,ROWS=25;
canvas.width=COLS*GRID;canvas.height=ROWS*GRID;

let snake,dir,ndir,food,score,speed,alive,wallPass,gameLoop;
let best=parseInt(localStorage.getItem('snake_best')||'0');
document.getElementById('best').textContent=best;
const SPECIAL_FOOD=[{icon:'🍎',pts:1,prob:0.6},{icon:'🍊',pts:2,prob:0.2},{icon:'🍇',pts:3,prob:0.1},{icon:'⭐',pts:5,prob:0.08},{icon:'💎',pts:10,prob:0.02}];

function init(){
  snake=[{x:12,y:12},{x:11,y:12},{x:10,y:12}];
  dir={x:1,y:0};ndir={x:1,y:0};
  score=0;alive=true;wallPass=false;
  document.getElementById('overlay').classList.remove('show');
  spawnFood();render();
  clearInterval(gameLoop);
  const spd=[150,100,65][speed-1]||100;
  gameLoop=setInterval(tick,spd);
  document.getElementById('wallMode').textContent=wallPass?'开':'关';
}

function setSpeed(s){speed=s;clearInterval(gameLoop);const spd=[150,100,65][s-1]||100;gameLoop=setInterval(tick,spd);document.getElementById('speed').textContent=s}
function toggleWall(){wallPass=!wallPass;document.getElementById('wallMode').textContent=wallPass?'开':'关'}

function spawnFood(){
  const roll=Math.random();let cum=0,type=SPECIAL_FOOD[0];
  for(const f of SPECIAL_FOOD){cum+=f.prob;if(roll<cum){type=f;break}}
  let fx,fy;
  do{fx=Math.floor(Math.random()*COLS);fy=Math.floor(Math.random()*ROWS)}
  while(snake.some(s=>s.x===fx&&s.y===fy));
  food={x:fx,y:fy,...type};
}

function tick(){
  if(!alive)return;
  dir={...ndir};
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  // wall collision
  if(wallPass){
    head.x=(head.x+COLS)%COLS;head.y=(head.y+ROWS)%ROWS;
  }else if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS){
    die();return;
  }
  // self collision
  if(snake.some(s=>s.x===head.x&&s.y===head.y)){die();return}
  snake.unshift(head);
  // eat food
  if(head.x===food.x&&head.y===food.y){
    score+=food.pts;
    showMsg(`+${food.pts} ${food.icon}`);
    spawnFood();
  }else{
    snake.pop();
  }
  render();
}

function die(){
  alive=false;
  clearInterval(gameLoop);
  if(score>best){best=score;localStorage.setItem('snake_best',best);document.getElementById('best').textContent=best}
  document.getElementById('olMsg').textContent=`分数: ${score} | 长度: ${snake.length}`;
  document.getElementById('overlay').classList.add('show');
}

function setDir(dx,dy){
  if(dir.x===-dx&&dir.y===-dy)return; // no reverse
  if(dx!==0||dy!==0)ndir={x:dx,y:dy};
}

document.addEventListener('keydown',e=>{
  const map={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],w:[0,-1],s:[0,1],a:[-1,0],d:[1,0]};
  const d=map[e.key];
  if(d){e.preventDefault();setDir(d[0],d[1])}
});

function render(){
  ctx.fillStyle='#0a0e0a';ctx.fillRect(0,0,canvas.width,canvas.height);
  // grid lines
  ctx.strokeStyle='#111a11';ctx.lineWidth=0.5;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*GRID,0);ctx.lineTo(x*GRID,ROWS*GRID);ctx.stroke()}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*GRID);ctx.lineTo(COLS*GRID,y*GRID);ctx.stroke()}
  // food glow
  ctx.fillStyle='rgba(255,215,0,0.1)';ctx.beginPath();ctx.arc(food.x*GRID+GRID/2,food.y*GRID+GRID/2,GRID,0,Math.PI*2);ctx.fill();
  // food
  ctx.font='16px serif';ctx.textAlign='center';
  ctx.fillText(food.icon,food.x*GRID+GRID/2,food.y*GRID+GRID/2+5);
  // snake
  for(let i=0;i<snake.length;i++){
    const s=snake[i];
    const pct=i/snake.length;
    const r=Math.floor(40+pct*30),g=Math.floor(180-pct*80),b=40;
    ctx.fillStyle=`rgb(${r},${g},${b})`;
    const pad=i===0?1:2;
    ctx.beginPath();
    ctx.roundRect(s.x*GRID+pad,s.y*GRID+pad,GRID-pad*2,GRID-pad*2,i===0?6:4);
    ctx.fill();
  }
  // snake eyes
  const h=snake[0];
  ctx.fillStyle='#fff';
  const ex1=h.x*GRID+GRID/2+dir.x*4-dir.y*3;
  const ey1=h.y*GRID+GRID/2+dir.y*4+dir.x*3;
  const ex2=h.x*GRID+GRID/2+dir.x*4+dir.y*3;
  const ey2=h.y*GRID+GRID/2+dir.y*4-dir.x*3;
  ctx.beginPath();ctx.arc(ex1,ey1,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(ex2,ey2,2,0,Math.PI*2);ctx.fill();
  document.getElementById('score').textContent=score;
  document.getElementById('len').textContent=snake.length;
}

function showMsg(t){const el=document.getElementById('msg');el.textContent=t;setTimeout(()=>el.textContent='',1500)}

speed=2;init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#e0e0e0}
h1{font-size:48px;color:#ffd700;margin-bottom:8px;text-shadow:0 0 20px rgba(255,215,0,0.3)}
#info{display:flex;gap:24px;margin-bottom:16px}
#info .box{text-align:center;padding:8px 20px;background:#1a1a2e;border-radius:8px}
#info .box .label{font-size:11px;color:#888;text-transform:uppercase}
#info .box .val{font-size:24px;color:#ffd700;font-weight:bold}
#board{background:#1a1a2e;border-radius:12px;padding:12px;box-shadow:0 0 40px rgba(255,215,0,0.1);display:grid;grid-template-columns:repeat(4,100px);grid-template-rows:repeat(4,100px);gap:10px;position:relative}
.cell{border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:28px;transition:all 0.15s}
.c0{background:#2a2a3a;color:transparent}
.c2{background:#3a3a4a;color:#e0e0e0}
.c4{background:#4a4a5a;color:#e0e0e0}
.c8{background:#f59563;color:#fff}
.c16{background:#f27c5b;color:#fff}
.c32{background:#f25c3c;color:#fff}
.c64{background:#e74c3c;color:#fff}
.c128{background:#edcf72;color:#fff;font-size:24px}
.c256{background:#edcc61;color:#fff;font-size:24px}
.c512{background:#edc850;color:#fff;font-size:24px}
.c1024{background:#edc53f;color:#fff;font-size:20px}
.c2048{background:#edc22e;color:#fff;font-size:20px}
.c4096{background:#3c3a32;color:#fff;font-size:18px}
.c8192{background:#3c3a32;color:#fff;font-size:18px}
#controls{margin-top:16px;display:flex;gap:12px}
#controls button{padding:10px 24px;font-size:14px;background:#2a2a4a;color:#ffd700;border:1px solid #ffd700;border-radius:8px;cursor:pointer;transition:all .2s}
#controls button:hover{background:#3a3a5a}
#msg{margin-top:16px;font-size:18px;color:#ffd700;min-height:28px}
#overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.8);border-radius:12px;align-items:center;justify-content:center;flex-direction:column;z-index:10}
#overlay.show{display:flex}
#overlay h2{font-size:36px;margin-bottom:12px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;font-size:16px;background:#ffd700;color:#111;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
@media(max-width:500px){#board{grid-template-columns:repeat(4,70px);grid-template-rows:repeat(4,70px);gap:6px;padding:8px}.cell{font-size:20px}}
</style>
</head>
<body>
<h1>2048</h1>
<div id="info">
  <div class="box"><div class="label">分数</div><div class="val" id="score">0</div></div>
  <div class="box"><div class="label">最高分</div><div class="val" id="best">0</div></div>
  <div class="box"><div class="label">步数</div><div class="val" id="moves">0</div></div>
</div>
<div id="board">
  <div id="overlay">
    <h2 id="olTitle" style="color:#ffd700">游戏结束</h2>
    <p id="olMsg"></p>
    <button onclick="newGame()">再来一局</button>
  </div>
</div>
<div id="msg"></div>
<div id="controls">
  <button onclick="newGame()">新游戏</button>
  <button onclick="undoMove()">撤销</button>
</div>
<script>
let grid,score,moves,prev,gameOver,won,best=parseInt(localStorage.getItem('2048_best')||'0');
document.getElementById('best').textContent=best;

function newGame(){
  grid=Array.from({length:4},()=>Array(4).fill(0));
  score=0;moves=0;prev=null;gameOver=false;won=false;
  document.getElementById('overlay').classList.remove('show');
  spawn();spawn();render();
}

function spawn(){
  const empty=[];
  for(let r=0;r<4;r++)for(let c=0;c<4;c++)if(grid[r][c]===0)empty.push([r,c]);
  if(!empty.length)return;
  const[r,c]=empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]=Math.random()<0.9?2:4;
}

function savePrev(){
  prev={grid:grid.map(r=>[...r]),score,moves};
}

function undoMove(){
  if(!prev)return;
  grid=prev.grid;score=prev.score;moves=prev.moves;prev=null;
  gameOver=false;won=false;
  document.getElementById('overlay').classList.remove('show');
  render();
}

function slide(row){
  let a=row.filter(v=>v);
  let merged=false;
  for(let i=0;i<a.length-1;i++){
    if(a[i]===a[i+1]){a[i]*=2;a[i+1]=0;score+=a[i];merged=true;if(a[i]===2048&&!won){won=true;showWin()}}
  }
  a=a.filter(v=>v);
  while(a.length<4)a.push(0);
  return{row:a,merged};
}

function move(dir){
  if(gameOver)return false;
  savePrev();
  let moved=false;
  const transposed=dir==='up'||dir==='down';
  const reversed=dir==='right'||dir==='down';
  if(transposed)grid=transpose(grid);
  for(let r=0;r<4;r++){
    let row=grid[r];
    if(reversed)row=row.reverse();
    const{row:newRow}=slide(row);
    if(reversed)newRow.reverse();
    if(newRow.some((v,i)=>v!==grid[r][i]))moved=true;
    grid[r]=newRow;
  }
  if(transposed)grid=transpose(grid);
  if(moved){moves++;spawn();render()}
  checkGameOver();
  return moved;
}

function transpose(g){return g[0].map((_,c)=>g.map(r=>r[c]))}

function canMove(){
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    if(grid[r][c]===0)return true;
    if(c<3&&grid[r][c]===grid[r][c+1])return true;
    if(r<3&&grid[r][c]===grid[r+1][c])return true;
  }
  return false;
}

function checkGameOver(){
  if(!canMove()){
    gameOver=true;
    if(score>best){best=score;localStorage.setItem('2048_best',best);document.getElementById('best').textContent=best}
    document.getElementById('olTitle').textContent='游戏结束';
    document.getElementById('olTitle').style.color='#e74c3c';
    document.getElementById('olMsg').textContent=`最终分数：${score}`;
    document.getElementById('overlay').classList.add('show');
  }
}

function showWin(){
  document.getElementById('olTitle').textContent='🎉 达成 2048！';
  document.getElementById('olTitle').style.color='#ffd700';
  document.getElementById('olMsg').textContent=`分数：${score}  继续挑战更高分`;
  document.getElementById('overlay').classList.add('show');
  setTimeout(()=>document.getElementById('overlay').classList.remove('show'),2000);
}

function render(){
  const board=document.getElementById('board');
  const overlay=document.getElementById('overlay');
  // remove old cells
  board.querySelectorAll('.cell').forEach(c=>c.remove());
  // add cells before overlay
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    const v=grid[r][c];
    const cell=document.createElement('div');
    cell.className=`cell c${v}`;
    cell.textContent=v||'';
    board.insertBefore(cell,overlay);
  }
  document.getElementById('score').textContent=score;
  document.getElementById('moves').textContent=moves;
}

// Keyboard
document.addEventListener('keydown',e=>{
  const map={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',s:'down',a:'left',d:'right'};
  const dir=map[e.key];
  if(dir){e.preventDefault();move(dir)}
});

// Touch
let tx,ty;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<30&&Math.abs(dy)<30)return;
  if(Math.abs(dx)>Math.abs(dy))move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
});

newGame();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎲 骰子大战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#ffd700;margin-bottom:12px}
#game{display:flex;gap:40px;margin-bottom:20px}
.player{text-align:center;padding:20px;background:#12121e;border:2px solid #2a2a3e;border-radius:12px;min-width:160px}
.player.active{border-color:#ffd700;box-shadow:0 0 20px rgba(255,215,0,0.2)}
.player .name{font-size:18px;margin-bottom:8px;color:#ffd700}
.player .score{font-size:36px;font-weight:bold;color:#fff}
.player .dice{display:flex;gap:8px;justify-content:center;margin:12px 0}
.die{width:50px;height:50px;background:#1a1a2e;border:2px solid #3a3a3e;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;transition:all .3s}
.die.rolling{animation:roll 0.1s infinite}
@keyframes roll{0%{transform:rotate(0)}25%{transform:rotate(90deg)}50%{transform:rotate(180deg)}75%{transform:rotate(270deg)}100%{transform:rotate(360deg)}}
#controls{display:flex;gap:12px;margin-bottom:12px}
#controls button{padding:10px 28px;font-size:16px;background:#ffd700;color:#111;border:none;border-radius:8px;cursor:pointer;font-weight:bold;transition:all .15s}
#controls button:hover{transform:scale(1.05)}
#controls button:disabled{background:#333;color:#666;cursor:not-allowed}
#msg{font-size:16px;color:#ffd700;min-height:24px}
#target{font-size:14px;color:#888;margin-bottom:12px}
#history{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;max-width:400px;margin-top:12px}
#history .round{padding:4px 8px;background:#1a1a2e;border-radius:4px;font-size:11px;color:#888}
</style>
</head>
<body>
<h1>🎲 骰子大战</h1>
<div id="target">目标: 先到 100 分</div>
<div id="game">
  <div class="player active" id="p1">
    <div class="name">🧑 玩家1</div>
    <div class="score" id="s1">0</div>
    <div class="dice" id="d1"><div class="die">🎲</div><div class="die">🎲</div></div>
    <div style="font-size:12px;color:#888">本轮: <span id="r1">0</span></div>
  </div>
  <div class="player" id="p2">
    <div class="name">🤖 玩家2</div>
    <div class="score" id="s2">0</div>
    <div class="dice" id="d2"><div class="die">🎲</div><div class="die">🎲</div></div>
    <div style="font-size:12px;color:#888">本轮: <span id="r2">0</span></div>
  </div>
</div>
<div id="controls">
  <button id="rollBtn" onclick="rollDice()">🎲 掷骰子</button>
  <button id="holdBtn" onclick="hold()" disabled>📥 保留</button>
  <button onclick="newGame()">🔄 新游戏</button>
</div>
<div id="msg">玩家1 先手！</div>
<div id="history"></div>
<script>
let scores,roundScore,currentPlayer,gameOver,rolling;

const DOTS={
  1:[[1,1]],
  2:[[0,0],[2,2]],
  3:[[0,0],[1,1],[2,2]],
  4:[[0,0],[0,2],[2,0],[2,2]],
  5:[[0,0],[0,2],[1,1],[2,0],[2,2]],
  6:[[0,0],[0,2],[1,0],[1,2],[2,0],[2,2]],
};

function newGame(){
  scores=[0,0];roundScore=0;currentPlayer=0;gameOver=false;rolling=false;
  document.getElementById('s1').textContent='0';
  document.getElementById('s2').textContent='0';
  document.getElementById('r1').textContent='0';
  document.getElementById('r2').textContent='0';
  document.getElementById('msg').textContent='玩家1 先手！';
  document.getElementById('rollBtn').disabled=false;
  document.getElementById('holdBtn').disabled=true;
  document.getElementById('history').innerHTML='';
  updateActive();
  resetDice();
}

function resetDice(){
  for(let p=0;p<2;p++){
    const el=document.getElementById('d'+(p+1));
    el.innerHTML='<div class="die">🎲</div><div class="die">🎲</div>';
  }
}

function renderDie(value){
  const dots=DOTS[value];
  let html='<div style="display:grid;grid-template-columns:repeat(3,12px);grid-template-rows:repeat(3,12px);gap:2px">';
  for(let r=0;r<3;r++)for(let c=0;c<3;c++){
    const hasDot=dots.some(d=>d[0]===r&&d[1]===c);
    html+=`<div style="width:12px;height:12px;display:flex;align-items:center;justify-content:center">${hasDot?'<div style="width:8px;height:8px;background:#ffd700;border-radius:50%"></div>':''}</div>`;
  }
  html+='</div>';
  return html;
}

async function rollDice(){
  if(rolling||gameOver)return;
  rolling=true;
  document.getElementById('rollBtn').disabled=true;
  document.getElementById('holdBtn').disabled=true;
  const diceEl=document.getElementById('d'+(currentPlayer+1));
  // animation
  for(let i=0;i<10;i++){
    const v1=Math.floor(Math.random()*6)+1;
    const v2=Math.floor(Math.random()*6)+1;
    diceEl.innerHTML=`<div class="die rolling">${['⚀','⚁','⚂','⚃','⚄','⚅'][v1-1]}</div><div class="die rolling">${['⚀','⚁','⚂','⚃','⚄','⚅'][v2-1]}</div>`;
    await sleep(60+i*10);
  }
  // final roll
  const d1=Math.floor(Math.random()*6)+1;
  const d2=Math.floor(Math.random()*6)+1;
  diceEl.innerHTML=`<div class="die">${renderDie(d1)}</div><div class="die">${renderDie(d2)}</div>`;
  // check doubles
  if(d1===d2){
    if(d1===1){
      // snake eyes - lose all
      scores[currentPlayer]=0;
      roundScore=0;
      document.getElementById('msg').textContent='🐍 蛇眼！失去所有分数！';
      document.getElementById('msg').style.color='#f44';
      setTimeout(()=>{document.getElementById('msg').style.color='';switchPlayer()},1500);
    }else{
      // doubles - roll again
      roundScore+=(d1+d2)*2;
      document.getElementById('msg').textContent=`✨ 双${d1}！得分翻倍！继续掷！`;
      document.getElementById('r'+(currentPlayer+1)).textContent=roundScore;
    }
  }else{
    const total=d1+d2;
    roundScore+=total;
    document.getElementById('r'+(currentPlayer+1)).textContent=roundScore;
    document.getElementById('msg').textContent=`掷出 ${d1}+${d2}=${total}  本轮: ${roundScore}`;
    document.getElementById('holdBtn').disabled=false;
  }
  rolling=false;
  if(d1!==d2)document.getElementById('rollBtn').disabled=false;
  // check 100
  if(scores[currentPlayer]+roundScore>=100){
    scores[currentPlayer]+=roundScore;
    document.getElementById('s'+(currentPlayer+1)).textContent=scores[currentPlayer];
    gameOver=true;
    document.getElementById('msg').textContent=`🎉 玩家${currentPlayer+1} 获胜！`;
    document.getElementById('msg').style.color='#ffd700';
    document.getElementById('rollBtn').disabled=true;
    document.getElementById('holdBtn').disabled=true;
  }
}

function hold(){
  if(gameOver||rolling)return;
  scores[currentPlayer]+=roundScore;
  document.getElementById('s'+(currentPlayer+1)).textContent=scores[currentPlayer];
  // add to history
  const hist=document.getElementById('history');
  const round=document.createElement('div');
  round.className='round';
  round.textContent=`P${currentPlayer+1}: +${roundScore} (总${scores[currentPlayer]})`;
  hist.appendChild(round);
  switchPlayer();
}

function switchPlayer(){
  roundScore=0;
  currentPlayer=currentPlayer===0?1:0;
  document.getElementById('r1').textContent='0';
  document.getElementById('r2').textContent='0';
  document.getElementById('msg').textContent=`玩家${currentPlayer+1} 的回合`;
  document.getElementById('rollBtn').disabled=false;
  document.getElementById('holdBtn').disabled=true;
  updateActive();
  // AI auto-play
  if(currentPlayer===1&&!gameOver){
    setTimeout(()=>aiPlay(),800);
  }
}

async function aiPlay(){
  if(gameOver)return;
  // AI strategy: roll until round score >= 20 or scores[currentPlayer]+roundScore >= 100
  while(!gameOver){
    await rollDice();
    if(gameOver)break;
    if(roundScore>=20||scores[currentPlayer]+roundScore>=100){
      hold();break;
    }
    if(roundScore===0)break; // busted
    await sleep(500);
  }
}

function updateActive(){
  document.getElementById('p1').className='player'+(currentPlayer===0?' active':'');
  document.getElementById('p2').className='player'+(currentPlayer===1?' active':'');
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

newGame();
</script>
</body>
</html>

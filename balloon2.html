<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎪 打气球2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#ffd700;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #2a2a3e;border-radius:8px;box-shadow:0 0 30px rgba(255,215,0,0.1);cursor:pointer}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a1a2e;color:#ffd700;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:12px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h2{font-size:32px;margin-bottom:8px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;background:#ffd700;color:#111;border:none;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<h1>🎪 打气球2</h1>
<div id="info">
  <div>分数: <span class="val" id="score">0</span></div>
  <div>时间: <span class="val" id="timer">30</span>s</div>
  <div>连击: <span class="val" id="combo">0</span></div>
  <div>最高: <span class="val" id="best">0</span></div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <button onclick="newGame()">开始</button>
</div>
<div id="overlay">
  <h2>⏱️ 时间到！</h2>
  <p id="olMsg"></p>
  <button onclick="newGame()">再来一次</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=500,H=500;
canvas.width=W;canvas.height=H;

let balloons,particles,score,timeLeft,combo,alive,spawnTimer;
let best=parseInt(localStorage.getItem('balloon2_best')||'0');
document.getElementById('best').textContent=best;

const COLORS=['#f55','#5f5','#55f','#ff5','#f5f','#5ff','#fa0','#a0f','#ffd700','#0ff'];

function newGame(){
  balloons=[];particles=[];score=0;timeLeft=30;combo=0;alive=true;spawnTimer=0;
  for(let i=0;i<8;i++)spawnBalloon();
  document.getElementById('overlay').classList.remove('show');
  updateInfo();
  clearInterval(window._timer);
  window._timer=setInterval(()=>{
    timeLeft--;
    document.getElementById('timer').textContent=timeLeft;
    if(timeLeft<=0){alive=false;gameEnd()}
  },1000);
  if(window._loop)cancelAnimationFrame(window._loop);
  function loop(){if(alive){update();render();window._loop=requestAnimationFrame(loop)}}
  loop();
}

function spawnBalloon(){
  const r=15+Math.random()*20;
  const isSpecial=Math.random()<0.1;
  balloons.push({
    x:r+Math.random()*(W-r*2),y:H+r*2,
    vy:-(0.5+Math.random()*1.5),
    vx:(Math.random()-0.5)*0.3,
    r,
    color:isSpecial?'#ffd700':COLORS[Math.floor(Math.random()*COLORS.length)],
    wobble:Math.random()*Math.PI*2,
    wobbleSpeed:0.02+Math.random()*0.03,
    isSpecial,
    popped:false,
    riseSpeed:0.5+Math.random()*0.5,
  });
}

function update(){
  spawnTimer++;
  if(spawnTimer>25){spawnBalloon();spawnTimer=0}
  for(let i=balloons.length-1;i>=0;i--){
    const b=balloons[i];
    b.wobble+=b.wobbleSpeed;
    b.x+=b.vx+Math.sin(b.wobble)*0.3;
    b.y-=b.riseSpeed;
    if(b.y<-b.r*2){balloons.splice(i,1);combo=0}
  }
  // particles
  for(let i=particles.length-1;i>=0;i--){
    particles[i].x+=particles[i].dx;particles[i].y+=particles[i].dy;
    particles[i].dy+=0.08;particles[i].life--;
    if(particles[i].life<=0)particles.splice(i,1);
  }
  updateInfo();
}

function render(){
  ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,W,H);
  // background
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#1a1a3a');grad.addColorStop(1,'#0a0a1a');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  // balloons
  for(const b of balloons){
    if(b.popped)continue;
    // balloon body
    const grad=ctx.createRadialGradient(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.1,b.x,b.y,b.r);
    grad.addColorStop(0,'#fff');grad.addColorStop(0.3,b.color);grad.addColorStop(1,b.color+'80');
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.ellipse(b.x,b.y,b.r,b.r*1.2,0,0,Math.PI*2);
    ctx.fill();
    // knot
    ctx.fillStyle=b.color;
    ctx.beginPath();ctx.moveTo(b.x-3,b.y+b.r*1.2);ctx.lineTo(b.x+3,b.y+b.r*1.2);ctx.lineTo(b.x,b.y+b.r*1.2+6);ctx.fill();
    // string
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(b.x,b.y+b.r*1.2+6);
    ctx.quadraticCurveTo(b.x+Math.sin(b.wobble)*10,b.y+b.r*2+10,b.x,b.y+b.r*2+20);
    ctx.stroke();
    // highlight
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.beginPath();ctx.ellipse(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.3,b.r*0.4,0,0,Math.PI*2);ctx.fill();
    // special indicator
    if(b.isSpecial){
      ctx.fillStyle='rgba(255,255,255,0.3)';
      ctx.beginPath();ctx.arc(b.x,b.y,b.r+3,0,Math.PI*2);ctx.fill();
    }
  }
  // particles
  for(const p of particles){
    ctx.globalAlpha=p.life/20;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

canvas.addEventListener('click',e=>{
  if(!alive)return;
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  const my=(e.clientY-rect.top)*(H/rect.height);
  for(let i=balloons.length-1;i>=0;i--){
    const b=balloons[i];
    const dx=mx-b.x,dy=my-b.y;
    if(Math.sqrt(dx*dx+dy*dy)<b.r*1.2){
      combo++;
      const pts=(b.isSpecial?50:10)*combo;
      score+=pts;
      // pop particles
      for(let j=0;j<12;j++){
        particles.push({
          x:b.x,y:b.y,
          dx:(Math.random()-0.5)*8,dy:(Math.random()-0.5)*8,
          life:20,color:b.color,r:Math.random()*4+2,
        });
      }
      // floating score
      particles.push({x:b.x,y:b.y,dx:0,dy:-2,life:30,color:'#ffd700',r:0,scoreText:`+${pts}`});
      balloons.splice(i,1);
      break;
    }
  }
});

function gameEnd(){
  if(score>best){best=score;localStorage.setItem('balloon2_best',best);document.getElementById('best').textContent=best}
  document.getElementById('olMsg').textContent=`分数: ${score} | 最高: ${best}`;
  document.getElementById('overlay').classList.add('show');
}

function updateInfo(){
  document.getElementById('score').textContent=score;
  document.getElementById('combo').textContent=combo;
}

newGame();
</script>
</body>
</html>

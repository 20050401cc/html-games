<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎲 骰子迷宫</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#ffd700;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #2a2a3e;border-radius:8px;box-shadow:0 0 30px rgba(255,215,0,0.1)}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a1a2e;color:#ffd700;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:12px}
#msg{margin-top:8px;font-size:14px;color:#ffd700;min-height:20px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h2{font-size:32px;color:#ffd700;margin-bottom:8px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;background:#ffd700;color:#111;border:none;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<h1>🎲 骰子迷宫</h1>
<div id="info">
  <div>步数: <span class="val" id="moves">0</span></div>
  <div>骰子: <span class="val" id="diceVal">-</span></div>
  <div>收集: <span class="val" id="collected">0</span></div>
</div>
<canvas id="game"></canvas>
<div id="msg">按空格掷骰子，方向键移动对应步数</div>
<div id="controls">
  <button onclick="rollDice()">🎲 掷骰子</button>
  <button onclick="newGame()">新游戏</button>
</div>
<div id="overlay">
  <h2>🎉 通关！</h2>
  <p id="olMsg"></p>
  <button onclick="newGame()">下一关</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const SIZE=7,CELL=60;
canvas.width=SIZE*CELL;canvas.height=SIZE*CELL;

let grid,player,exit,diceVal,moves,stepsLeft,coins,collected,level;

function newGame(){
  level=level||1;
  const wallCount=8+level*2;
  grid=Array.from({length:SIZE},()=>Array(SIZE).fill(0));
  // place walls
  for(let i=0;i<wallCount;i++){
    const r=Math.floor(Math.random()*SIZE),c=Math.floor(Math.random()*SIZE);
    if((r===0&&c===0)||(r===SIZE-1&&c===SIZE-1))continue;
    grid[r][c]=1;
  }
  // place coins
  coins=[];
  for(let i=0;i<3+level;i++){
    let r,c;
    do{r=Math.floor(Math.random()*SIZE);c=Math.floor(Math.random()*SIZE)}
    while(grid[r][c]!==0||(r===0&&c===0)||(r===SIZE-1&&c===SIZE-1)||coins.some(coin=>coin.r===r&&coin.c===c));
    coins.push({r,c,collected:false});
  }
  player={r:0,c:0};
  exit={r:SIZE-1,c:SIZE-1};
  diceVal=0;moves=0;stepsLeft=0;collected=0;
  document.getElementById('overlay').classList.remove('show');
  render();updateInfo();
}

function rollDice(){
  if(stepsLeft>0)return;
  diceVal=Math.floor(Math.random()*6)+1;
  stepsLeft=diceVal;
  document.getElementById('msg').textContent=`掷出 ${diceVal}！移动 ${diceVal} 步`;
  updateInfo();
}

function movePlayer(dr,dc){
  if(stepsLeft<=0)return;
  const nr=player.r+dr,nc=player.c+dc;
  if(nr<0||nr>=SIZE||nc<0||nc>=SIZE)return;
  if(grid[nr][nc]===1)return;
  player.r=nr;player.c=nc;
  stepsLeft--;moves++;
  // collect coin
  for(const coin of coins){
    if(!coin.collected&&coin.r===player.r&&coin.c===player.c){
      coin.collected=true;collected++;
    }
  }
  if(stepsLeft===0){
    document.getElementById('msg').textContent='掷骰子继续';
    if(player.r===exit.r&&player.c===exit.c)win();
  }
  render();updateInfo();
}

function win(){
  document.getElementById('olMsg').textContent=`步数: ${moves} | 收集: ${collected}`;
  document.getElementById('overlay').classList.add('show');
  level++;
}

function render(){
  ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      const x=c*CELL,y=r*CELL;
      if(grid[r][c]===1){
        ctx.fillStyle='#2a2a3a';ctx.fillRect(x+2,y+2,CELL-4,CELL-4);
        ctx.strokeStyle='#3a3a4a';ctx.lineWidth=1;ctx.strokeRect(x+2,y+2,CELL-4,CELL-4);
      }else{
        ctx.fillStyle='#12121e';ctx.fillRect(x+2,y+2,CELL-4,CELL-4);
      }
    }
  }
  // coins
  for(const coin of coins){
    if(coin.collected)continue;
    ctx.fillStyle='#ffd700';
    ctx.beginPath();ctx.arc(coin.c*CELL+CELL/2,coin.r*CELL+CELL/2,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#aa8800';ctx.font='12px sans-serif';ctx.textAlign='center';
    ctx.fillText('$',coin.c*CELL+CELL/2,coin.r*CELL+CELL/2+4);ctx.textAlign='left';
  }
  // exit
  ctx.fillStyle='#4a4';
  ctx.beginPath();ctx.roundRect(exit.c*CELL+8,exit.r*CELL+8,CELL-16,CELL-16,8);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='20px serif';ctx.textAlign='center';
  ctx.fillText('🏁',exit.c*CELL+CELL/2,exit.r*CELL+CELL/2+7);ctx.textAlign='left';
  // player
  ctx.fillStyle='#5bf';
  ctx.beginPath();ctx.arc(player.c*CELL+CELL/2,player.r*CELL+CELL/2,18,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='18px serif';ctx.textAlign='center';
  ctx.fillText('🧑',player.c*CELL+CELL/2,player.r*CELL+CELL/2+6);ctx.textAlign='left';
  // steps indicator
  if(stepsLeft>0){
    ctx.fillStyle='rgba(90,130,255,0.1)';
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      if(Math.abs(dr)+Math.abs(dc)!==1)continue;
      const nr=player.r+dr,nc=player.c+dc;
      if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&grid[nr][nc]===0){
        ctx.fillRect(nc*CELL+2,nr*CELL+2,CELL-4,CELL-4);
      }
    }
  }
}

document.addEventListener('keydown',e=>{
  switch(e.key){
    case'ArrowUp':case'w':e.preventDefault();movePlayer(-1,0);break;
    case'ArrowDown':case's':e.preventDefault();movePlayer(1,0);break;
    case'ArrowLeft':case'a':e.preventDefault();movePlayer(0,-1);break;
    case'ArrowRight':case'd':e.preventDefault();movePlayer(0,1);break;
    case' ':e.preventDefault();rollDice();break;
  }
});

function updateInfo(){
  document.getElementById('moves').textContent=moves;
  document.getElementById('diceVal').textContent=diceVal||'-';
  document.getElementById('collected').textContent=collected;
}

newGame();
</script>
</body>
</html>

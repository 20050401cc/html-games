<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌀 贪吃蛇AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e0a;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#c8e0c8}
h1{font-size:28px;color:#4a4;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #2a3a2a;border-radius:8px;box-shadow:0 0 30px rgba(74,170,74,0.1)}
#controls{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
#controls button{padding:6px 14px;background:#1a2a1a;color:#4a4;border:1px solid #2a3a2a;border-radius:6px;cursor:pointer;font-size:12px}
#controls select{padding:4px 8px;background:#1a2a1a;color:#4a4;border:1px solid #2a3a2a;border-radius:4px;font-size:12px}
</style>
</head>
<body>
<h1>🌀 贪吃蛇AI</h1>
<div id="info">
  <div>分数: <span class="val" id="score">0</span></div>
  <div>长度: <span class="val" id="len">3</span></div>
  <div>最高: <span class="val" id="best">0</span></div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <select id="mode"><option value="player">手动</option><option value="ai" selected>AI自动</option><option value="watch">AI观战</option></select>
  <select id="speed"><option value="50">快速</option><option value="100" selected>正常</option><option value="200">慢速</option></select>
  <button onclick="resetGame()">重置</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const GRID=16,COLS=30,ROWS=25;
canvas.width=COLS*GRID;canvas.height=ROWS*GRID;

let snake,dir,food,score,alive,gameLoop,best;
best=parseInt(localStorage.getItem('snake_ai_best')||'0');
document.getElementById('best').textContent=best;

function init(){
  snake=[{x:15,y:12},{x:14,y:12},{x:13,y:12}];
  dir={x:1,y:0};score=0;alive=true;
  spawnFood();
  clearInterval(gameLoop);
  const spd=parseInt(document.getElementById('speed').value);
  gameLoop=setInterval(tick,spd);
  render();
}

function spawnFood(){
  do{food={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}}
  while(snake.some(s=>s.x===food.x&&s.y===food.y));
}

function tick(){
  if(!alive)return;
  const mode=document.getElementById('mode').value;
  if(mode==='ai'||mode==='watch'){
    dir=aiPath();
  }
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  // wall collision
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS){die();return}
  // self collision
  if(snake.some(s=>s.x===head.x&&s.y===head.y)){die();return}
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score+=10;spawnFood();
  }else{
    snake.pop();
  }
  render();
  document.getElementById('score').textContent=score;
  document.getElementById('len').textContent=snake.length;
}

function aiPath(){
  // BFS to food
  const path=bfs(snake[0],food,snake);
  if(path&&path.length>0){
    const next=path[0];
    return{x:next.x-snake[0].x,y:next.y-snake[0].y};
  }
  // fallback: chase tail
  const tail=snake[snake.length-1];
  const tailPath=bfs(snake[0],tail,snake.slice(0,-1));
  if(tailPath&&tailPath.length>0){
    const next=tailPath[0];
    return{x:next.x-snake[0].x,y:next.y-snake[0].y};
  }
  // last resort: any safe direction
  const dirs=[[0,-1],[1,0],[0,1],[-1,0]];
  for(const[dx,dy]of dirs){
    const nx=snake[0].x+dx,ny=snake[0].y+dy;
    if(nx>=0&&nx<COLS&&ny>=0&&ny<ROWS&&!snake.some(s=>s.x===nx&&s.y===ny)){
      return{x:dx,y:dy};
    }
  }
  return dir;
}

function bfs(start,target,obstacles){
  const visited=Array.from({length:ROWS},()=>Array(COLS).fill(false));
  const parent=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  const queue=[start];
  visited[start.y][start.x]=true;
  while(queue.length){
    const cur=queue.shift();
    if(cur.x===target.x&&cur.y===target.y){
      const path=[];let c=cur;
      while(parent[c.y][c.x]){path.unshift(c);c=parent[c.y][c.x]}
      return path;
    }
    for(const[dx,dy]of[[0,-1],[1,0],[0,1],[-1,0]]){
      const nx=cur.x+dx,ny=cur.y+dy;
      if(nx<0||nx>=COLS||ny<0||ny>=ROWS||visited[ny][nx])continue;
      if(obstacles.some(s=>s.x===nx&&s.y===ny))continue;
      visited[ny][nx]=true;parent[ny][nx]={x:cur.x,y:cur.y};
      queue.push({x:nx,y:ny});
    }
  }
  return null;
}

function die(){
  alive=false;
  clearInterval(gameLoop);
  if(score>best){best=score;localStorage.setItem('snake_ai_best',best);document.getElementById('best').textContent=best}
  setTimeout(()=>{if(document.getElementById('mode').value==='watch'){init()}},1000);
}

function render(){
  ctx.fillStyle='#0a0e0a';ctx.fillRect(0,0,canvas.width,canvas.height);
  // grid
  ctx.strokeStyle='#111a11';ctx.lineWidth=0.5;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*GRID,0);ctx.lineTo(x*GRID,ROWS*GRID);ctx.stroke()}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*GRID);ctx.lineTo(COLS*GRID,y*GRID);ctx.stroke()}
  // food
  ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(food.x*GRID+GRID/2,food.y*GRID+GRID/2,6,0,Math.PI*2);ctx.fill();
  // snake
  for(let i=0;i<snake.length;i++){
    const s=snake[i];
    const pct=i/snake.length;
    ctx.fillStyle=`hsl(${120+pct*60},${60+pct*20}%,${40+pct*20}%)`;
    ctx.beginPath();ctx.roundRect(s.x*GRID+1,s.y*GRID+1,GRID-2,GRID-2,i===0?5:3);ctx.fill();
  }
  // eyes
  const h=snake[0];
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(h.x*GRID+GRID/2+dir.x*3-dir.y*2,h.y*GRID+GRID/2+dir.y*3+dir.x*2,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(h.x*GRID+GRID/2+dir.x*3+dir.y*2,h.y*GRID+GRID/2+dir.y*3-dir.x*2,2,0,Math.PI*2);ctx.fill();
}

document.addEventListener('keydown',e=>{
  if(document.getElementById('mode').value!=='player')return;
  const map={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],w:[0,-1],s:[0,1],a:[-1,0],d:[1,0]};
  const d=map[e.key];
  if(d&&(dir.x!==-d[0]||dir.y!==-d[1])){e.preventDefault();dir={x:d[0],y:d[1]}}
});

document.getElementById('speed').addEventListener('change',()=>{
  clearInterval(gameLoop);
  const spd=parseInt(document.getElementById('speed').value);
  gameLoop=setInterval(tick,spd);
});

init();
</script>
</body>
</html>

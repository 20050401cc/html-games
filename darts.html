<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 飞镖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#ffd700;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #3a3a2a;border-radius:8px;box-shadow:0 0 30px rgba(255,215,0,0.1);cursor:crosshair}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a1a2e;color:#ffd700;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:12px}
#msg{margin-top:8px;font-size:14px;color:#ffd700;min-height:20px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h2{font-size:32px;margin-bottom:8px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;background:#ffd700;color:#111;border:none;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<h1>🎯 飞镖</h1>
<div id="info">
  <div>分数: <span class="val" id="score">0</span></div>
  <div>投掷: <span class="val" id="throws">0</span>/10</div>
  <div>最高: <span class="val" id="best">0</span></div>
</div>
<canvas id="game"></canvas>
<div id="msg">点击靶心区域投掷飞镖</div>
<div id="controls">
  <button onclick="newGame()">新游戏</button>
</div>
<div id="overlay">
  <h2>🎯 游戏结束！</h2>
  <p id="olMsg"></p>
  <button onclick="newGame()">再来一局</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=400,H=400;
canvas.width=W;canvas.height=H;
const CX=W/2,CY=H/2,R=180;

let darts,score,throwsLeft,shaking,shakeOffset;
let best=parseInt(localStorage.getItem('darts_best')||'0');
document.getElementById('best').textContent=best;

const RINGS=[
  {r:0.05,pts:50,name:'Bullseye',color:'#ffd700'},
  {r:0.12,pts:25,name:'Bull',color:'#e74c3c'},
  {r:0.3,pts:10,name:'Triple',color:'#2ecc71'},
  {r:0.55,pts:5,name:'Double',color:'#3498db'},
  {r:0.75,pts:3,name:'Inner',color:'#f1c40f'},
  {r:1.0,pts:1,name:'Outer',color:'#e67e22'},
];

function newGame(){
  darts=[];score=0;throwsLeft=10;shaking=false;shakeOffset={x:0,y:0};
  document.getElementById('overlay').classList.remove('show');
  updateInfo();render();
}

canvas.addEventListener('click',e=>{
  if(throwsLeft<=0)return;
  const rect=canvas.getBoundingClientRect();
  let mx=(e.clientX-rect.left)*(W/rect.width);
  let my=(e.clientY-rect.top)*(H/rect.height);
  // add some randomness (dart throw imprecision)
  const dist=Math.sqrt((mx-CX)**2+(my-CY)**2)/R;
  const wobble=dist*15+5;
  mx+=(Math.random()-0.5)*wobble;
  my+=(Math.random()-0.5)*wobble;
  // calculate score
  const d=Math.sqrt((mx-CX)**2+(my-CY)**2)/R;
  let pts=0,ringName='Miss';
  for(const ring of RINGS){
    if(d<=ring.r){pts=ring.pts;ringName=ring.name;break}
  }
  // angle bonus for segments
  const angle=Math.atan2(my-CY,mx-CX);
  const segment=Math.floor(((angle+Math.PI)/(Math.PI*2))*20)+1;
  if(pts>0&&pts<25)pts*=segment%2===0?2:1;
  darts.push({x:mx,y:my,pts,ringName});
  score+=pts;throwsLeft--;
  // shake effect
  shaking=true;shakeOffset={x:(Math.random()-0.5)*4,y:(Math.random()-0.5)*4};
  setTimeout(()=>{shaking=false;shakeOffset={x:0,y:0};render()},100);
  document.getElementById('msg').textContent=pts>0?`🎯 ${ringName}！+${pts}分`:'💨 未命中！';
  updateInfo();render();
  if(throwsLeft<=0){
    if(score>best){best=score;localStorage.setItem('darts_best',best);document.getElementById('best').textContent=best}
    document.getElementById('olMsg').textContent=`总分: ${score} | 最高: ${best}`;
    document.getElementById('overlay').classList.add('show');
  }
});

function render(){
  ctx.save();
  if(shaking)ctx.translate(shakeOffset.x,shakeOffset.y);
  ctx.fillStyle='#0a0a14';ctx.fillRect(-10,-10,W+20,H+20);
  // dartboard
  for(let i=RINGS.length-1;i>=0;i--){
    const ring=RINGS[i];
    ctx.fillStyle=ring.color;
    ctx.beginPath();ctx.arc(CX,CY,R*ring.r,0,Math.PI*2);ctx.fill();
  }
  // segments
  ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1;
  for(let i=0;i<20;i++){
    const angle=(i/20)*Math.PI*2-Math.PI/2;
    ctx.beginPath();ctx.moveTo(CX,CY);ctx.lineTo(CX+Math.cos(angle)*R,CY+Math.sin(angle)*R);ctx.stroke();
  }
  // numbers
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='10px sans-serif';ctx.textAlign='center';
  for(let i=0;i<20;i++){
    const angle=(i/20)*Math.PI*2-Math.PI/2;
    const num=[20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5][i];
    ctx.fillText(num,CX+Math.cos(angle)*(R+12),CY+Math.sin(angle)*(R+12)+4);
  }
  // ring labels
  ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='8px sans-serif';
  for(const ring of RINGS){
    if(ring.r<=0.12)ctx.fillText(ring.pts,CX+R*ring.r*0.7,CY+3);
  }
  // darts
  for(const d of darts){
    // shadow
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath();ctx.arc(d.x+2,d.y+2,6,0,Math.PI*2);ctx.fill();
    // dart
    ctx.fillStyle='#ffd700';
    ctx.beginPath();ctx.arc(d.x,d.y,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#aa8800';
    ctx.beginPath();ctx.arc(d.x,d.y,3,0,Math.PI*2);ctx.fill();
    // highlight
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.beginPath();ctx.arc(d.x-2,d.y-2,2,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
  ctx.textAlign='left';
}

function updateInfo(){
  document.getElementById('score').textContent=score;
  document.getElementById('throws').textContent=throwsLeft;
}

newGame();
</script>
</body>
</html>

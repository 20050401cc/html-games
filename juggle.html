<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎪 马戏团</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#ffd700;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #3a3a2a;border-radius:8px;box-shadow:0 0 30px rgba(255,215,0,0.1);cursor:pointer}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a1a2e;color:#ffd700;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:12px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h2{font-size:32px;margin-bottom:8px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;background:#ffd700;color:#111;border:none;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<h1>🎪 马戏团抛球</h1>
<div id="info">
  <div>分数: <span class="val" id="score">0</span></div>
  <div>球数: <span class="val" id="balls">0</span></div>
  <div>最高: <span class="val" id="best">0</span></div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <button onclick="newGame()">新游戏</button>
</div>
<div id="overlay">
  <h2 id="olTitle">💥 掉了！</h2>
  <p id="olMsg"></p>
  <button onclick="newGame()">再来一次</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=400,H=500;
canvas.width=W;canvas.height=H;

const GRAVITY=0.15;
let balls,paddle,score,alive,spawnTimer;
let best=parseInt(localStorage.getItem('juggle_best')||'0');
document.getElementById('best').textContent=best;

function newGame(){
  balls=[];score=0;alive=true;spawnTimer=0;
  paddle={x:W/2,y:H-40,w:60,h:12};
  addBall();
  document.getElementById('overlay').classList.remove('show');
  updateInfo();
  requestAnimationFrame(loop);
}

function addBall(){
  const colors=['#f55','#5f5','#55f','#ff5','#f5f','#5ff','#fa0'];
  balls.push({
    x:paddle.x,y:paddle.y-20,
    vx:(Math.random()-0.5)*3,vy:-6-Math.random()*2,
    r:8+Math.random()*4,
    color:colors[Math.floor(Math.random()*colors.length)],
    bounces:0,
  });
}

function update(){
  if(!alive)return;
  spawnTimer++;
  if(spawnTimer>200&&balls.length<8){addBall();spawnTimer=0}
  for(let i=balls.length-1;i>=0;i--){
    const b=balls[i];
    b.vy+=GRAVITY;
    b.x+=b.vx;b.y+=b.vy;
    // wall bounce
    if(b.x-b.r<0){b.x=b.r;b.vx=Math.abs(b.vx)*0.8}
    if(b.x+b.r>W){b.x=W-b.r;b.vx=-Math.abs(b.vx)*0.8}
    if(b.y-b.r<0){b.y=b.r;b.vy=Math.abs(b.vy)*0.8}
    // paddle bounce
    if(b.vy>0&&b.y+b.r>=paddle.y&&b.y-b.r<=paddle.y+paddle.h&&b.x>=paddle.x-paddle.w/2&&b.x<=paddle.x+paddle.w/2){
      b.vy=-7-Math.random()*2;
      b.vx+=(b.x-paddle.x)*0.15;
      b.bounces++;
      score+=10+b.bounces*2;
    }
    // fall off
    if(b.y>H+20){
      balls.splice(i,1);
      if(balls.length===0){alive=false;gameEnd()}
    }
  }
  updateInfo();
}

function render(){
  ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,W,H);
  // background
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#1a1a3a');grad.addColorStop(1,'#0a0a1a');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  // ground
  ctx.fillStyle='#2a2a1a';ctx.fillRect(0,H-10,W,10);
  // balls
  for(const b of balls){
    // trail
    ctx.fillStyle=b.color+'20';
    ctx.beginPath();ctx.arc(b.x,b.y,b.r*1.5,0,Math.PI*2);ctx.fill();
    // ball
    const grad=ctx.createRadialGradient(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.1,b.x,b.y,b.r);
    grad.addColorStop(0,'#fff');grad.addColorStop(0.3,b.color);grad.addColorStop(1,b.color+'80');
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
  }
  // paddle
  const pGrad=ctx.createLinearGradient(paddle.x-paddle.w/2,paddle.y,paddle.x+paddle.w/2,paddle.y);
  pGrad.addColorStop(0,'#ffd700');pGrad.addColorStop(0.5,'#ffed4a');pGrad.addColorStop(1,'#ffd700');
  ctx.fillStyle=pGrad;
  ctx.beginPath();ctx.roundRect(paddle.x-paddle.w/2,paddle.y,paddle.w,paddle.h,6);ctx.fill();
  // hands
  ctx.fillStyle='#ffd700';
  ctx.beginPath();ctx.arc(paddle.x-paddle.w/2,paddle.y+paddle.h/2,8,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(paddle.x+paddle.w/2,paddle.y+paddle.h/2,8,0,Math.PI*2);ctx.fill();
}

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  paddle.x=(e.clientX-rect.left)*(W/rect.width);
  paddle.x=Math.max(paddle.w/2,Math.min(W-paddle.w/2,paddle.x));
});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  paddle.x=(e.touches[0].clientX-rect.left)*(W/rect.width);
  paddle.x=Math.max(paddle.w/2,Math.min(W-paddle.w/2,paddle.x));
},{passive:false});

function gameEnd(){
  if(score>best){best=score;localStorage.setItem('juggle_best',best);document.getElementById('best').textContent=best}
  document.getElementById('olMsg').textContent=`分数: ${score}`;
  document.getElementById('overlay').classList.add('show');
}

function updateInfo(){
  document.getElementById('score').textContent=score;
  document.getElementById('balls').textContent=balls.length;
}

function loop(){update();render();requestAnimationFrame(loop)}

newGame();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏓 乒乓球</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#0ff;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #1a2a3a;border-radius:8px;box-shadow:0 0 30px rgba(0,255,255,0.1)}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a1a2e;color:#0ff;border:1px solid #2a2a3a;border-radius:6px;cursor:pointer;font-size:12px}
#controls select{padding:4px 8px;background:#1a1a2e;color:#0ff;border:1px solid #2a2a3a;border-radius:4px;font-size:12px}
</style>
</head>
<body>
<h1>🏓 乒乓球</h1>
<div id="info">
  <div>玩家: <span class="val" id="pScore">0</span></div>
  <div>AI: <span class="val" id="eScore">0</span></div>
  <div>回合: <span class="val" id="rounds">0</span></div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <select id="difficulty" onchange="resetBall()">
    <option value="easy">简单</option>
    <option value="medium" selected>中等</option>
    <option value="hard">困难</option>
  </select>
  <button onclick="resetGame()">重新开始</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=600,H=400;
canvas.width=W;canvas.height=H;

const PADDLE_H=80,PADDLE_W=10,BALL_R=6;
let player,enemy,ball,scores,rounds,paused;

function init(){
  player={x:20,y:H/2-PADDLE_H/2,w:PADDLE_W,h:PADDLE_H,vy:0};
  enemy={x:W-20-PADDLE_W,y:H/2-PADDLE_H/2,w:PADDLE_W,h:PADDLE_H,vy:0,targetY:H/2};
  scores={p:0,e:0};rounds=0;
  resetBall();
}

function resetBall(){
  ball={x:W/2,y:H/2,dx:3*(Math.random()>0.5?1:-1),dy:2*(Math.random()-0.5),speed:3};
  rounds++;
  document.getElementById('rounds').textContent=rounds;
}

function resetGame(){init();scores={p:0,e:0};updateScore()}

function update(){
  // player movement
  player.y+=player.vy;
  player.y=Math.max(0,Math.min(H-player.h,player.y));
  // enemy AI
  const diff=document.getElementById('difficulty').value;
  const reactSpeed={easy:0.02,medium:0.04,hard:0.08}[diff];
  const error={easy:40,medium:20,hard:5}[diff];
  const targetY=ball.y+((Math.random()-0.5)*error);
  enemy.targetY+=(targetY-enemy.targetY)*reactSpeed;
  enemy.y=Math.max(0,Math.min(H-enemy.h,enemy.targetY-enemy.h/2));
  // ball movement
  ball.x+=ball.dx;ball.y+=ball.dy;
  // top/bottom bounce
  if(ball.y-BALL_R<0||ball.y+BALL_R>H){ball.dy*=-1;ball.y=Math.max(BALL_R,Math.min(H-BALL_R,ball.y))}
  // paddle collision
  function paddleHit(p){
    return ball.x-BALL_R<p.x+p.w&&ball.x+BALL_R>p.x&&ball.y-BALL_R<p.y+p.h&&ball.y+BALL_R>p.y;
  }
  if(ball.dx<0&&paddleHit(player)){
    ball.dx*=-1.05;
    ball.dy+=(ball.y-(player.y+player.h/2))*0.1;
    ball.x=player.x+player.w+BALL_R;
  }
  if(ball.dx>0&&paddleHit(enemy)){
    ball.dx*=-1.05;
    ball.dy+=(ball.y-(enemy.y+enemy.h/2))*0.1;
    ball.x=enemy.x-BALL_R;
  }
  // scoring
  if(ball.x<0){scores.e++;updateScore();resetBall()}
  if(ball.x>W){scores.p++;updateScore();resetBall()}
  // cap speed
  const maxSpeed=8;
  const spd=Math.sqrt(ball.dx*ball.dx+ball.dy*ball.dy);
  if(spd>maxSpeed){ball.dx=ball.dx/spd*maxSpeed;ball.dy=ball.dy/spd*maxSpeed}
}

function render(){
  ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,W,H);
  // center line
  ctx.strokeStyle='#1a2a3a';ctx.lineWidth=2;ctx.setLineDash([10,10]);
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
  ctx.setLineDash([]);
  // paddles
  ctx.fillStyle='#0ff';
  ctx.beginPath();ctx.roundRect(player.x,player.y,player.w,player.h,4);ctx.fill();
  ctx.fillStyle='#f55';
  ctx.beginPath();ctx.roundRect(enemy.x,enemy.y,enemy.w,enemy.h,4);ctx.fill();
  // ball trail
  ctx.fillStyle='rgba(0,255,255,0.1)';
  ctx.beginPath();ctx.arc(ball.x,ball.y,BALL_R*3,0,Math.PI*2);ctx.fill();
  // ball
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(ball.x,ball.y,BALL_R,0,Math.PI*2);ctx.fill();
  // scores
  ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='bold 48px sans-serif';ctx.textAlign='center';
  ctx.fillText(scores.p,W/4,60);ctx.fillText(scores.e,W*3/4,60);
  ctx.textAlign='left';
}

let keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key==='ArrowUp'||e.key==='ArrowDown')e.preventDefault();
  if(keys['ArrowUp']||keys['w'])player.vy=-5;
  if(keys['ArrowDown']||keys['s'])player.vy=5;
});
document.addEventListener('keyup',e=>{
  keys[e.key]=false;
  if(!keys['ArrowUp']&&!keys['w']&&!keys['ArrowDown']&&!keys['s'])player.vy=0;
  if(keys['ArrowUp']||keys['w'])player.vy=-5;
  if(keys['ArrowDown']||keys['s'])player.vy=5;
});

// mouse/touch control
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const my=(e.clientY-rect.top)*(H/rect.height);
  player.y=Math.max(0,Math.min(H-player.h,my-player.h/2));
});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const my=(e.touches[0].clientY-rect.top)*(H/rect.height);
  player.y=Math.max(0,Math.min(H-player.h,my-player.h/2));
},{passive:false});

function updateScore(){
  document.getElementById('pScore').textContent=scores.p;
  document.getElementById('eScore').textContent=scores.e;
}

function loop(){update();render();requestAnimationFrame(loop)}

init();
loop();
</script>
</body>
</html>

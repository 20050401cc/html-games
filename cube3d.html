<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧊 数独3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#5bf;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #2a2a3e;border-radius:8px;box-shadow:0 0 30px rgba(90,130,255,0.1)}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a1a2e;color:#5bf;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:12px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h2{font-size:32px;margin-bottom:8px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;background:#5bf;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<h1>🧊 3D 旋转方块</h1>
<div id="info">
  <div>分数: <span class="val" id="score">0</span></div>
  <div>层数: <span class="val" id="level">1</span></div>
  <div>最高: <span class="val" id="best">0</span></div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <button onclick="rotateLeft()">← 旋转</button>
  <button onclick="rotateRight()">旋转 →</button>
  <button onclick="newGame()">新游戏</button>
</div>
<div id="overlay">
  <h2 id="olTitle">🎉 完成！</h2>
  <p id="olMsg"></p>
  <button onclick="newGame()">再来一局</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=500,H=500;
canvas.width=W;canvas.height=H;

let cubes,rotation,targetPattern,score,level,alive,selectedCube;
let best=parseInt(localStorage.getItem('cube_best')||'0');
document.getElementById('best').textContent=best;

const COLORS=['#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#e67e22'];
const FACES=['front','back','left','right','top','bottom'];

function newGame(){
  score=0;level=1;alive=true;rotation=0;selectedCube=null;
  document.getElementById('overlay').classList.remove('show');
  generateLevel();
  render();
}

function generateLevel(){
  cubes=[];
  const count=3+level;
  const gridSize=Math.ceil(Math.sqrt(count));
  const spacing=60;
  for(let i=0;i<count;i++){
    const row=Math.floor(i/gridSize),col=i%gridSize;
    const x=W/2+(col-gridSize/2)*spacing;
    const y=H/2+(row-gridSize/2)*spacing;
    const faceColors=FACES.map(()=>COLORS[Math.floor(Math.random()*COLORS.length)]);
    cubes.push({x,y,size:40,faceColors,matched:false});
  }
  // target pattern
  targetPattern=cubes[0].faceColors.slice();
  document.getElementById('level').textContent=level;
}

function project3D(x,y,z,rot){
  const cos=Math.cos(rot),sin=Math.sin(rot);
  const rx=x*cos-z*sin,rz=x*sin+z*cos;
  const scale=300/(300+rz);
  return{x:rx*scale+W/2,y:y*scale+H/2,scale};
}

function drawCube(cube,rot){
  const s=cube.size/2;
  const vertices=[
    [-s,-s,-s],[s,-s,-s],[s,s,-s],[-s,s,-s],
    [-s,-s,s],[s,-s,s],[s,s,s],[-s,s,s],
  ];
  const projected=vertices.map(v=>project3D(v[0]+cube.x-W/2,v[1]+cube.y-H/2,v[2],rot));
  const faces=[
    {indices:[0,1,2,3],color:cube.faceColors[0],name:'front'},
    {indices:[5,4,7,6],color:cube.faceColors[1],name:'back'},
    {indices:[4,0,3,7],color:cube.faceColors[2],name:'left'},
    {indices:[1,5,6,2],color:cube.faceColors[3],name:'right'},
    {indices:[4,5,1,0],color:cube.faceColors[4],name:'top'},
    {indices:[3,2,6,7],color:cube.faceColors[5],name:'bottom'},
  ];
  // sort by z-depth
  faces.sort((a,b)=>{
    const za=a.indices.reduce((s,i)=>s+vertices[i][2],0)/4;
    const zb=b.indices.reduce((s,i)=>s+vertices[i][2],0)/4;
    return za-zb;
  });
  for(const face of faces){
    const pts=face.indices.map(i=>projected[i]);
    ctx.fillStyle=face.color;
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<4;i++)ctx.lineTo(pts[i].x,pts[i].y);
    ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1;ctx.stroke();
  }
}

function render(){
  ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,W,H);
  // draw target pattern
  ctx.fillStyle='rgba(255,255,255,0.1)';ctx.font='14px sans-serif';ctx.textAlign='center';
  ctx.fillText('目标颜色排列 ↓',W/2,30);
  // target preview
  const previewSize=20;
  for(let i=0;i<targetPattern.length;i++){
    ctx.fillStyle=targetPattern[i];
    ctx.fillRect(W/2-60+i*25,40,previewSize,previewSize);
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.strokeRect(W/2-60+i*25,40,previewSize,previewSize);
  }
  // draw cubes
  const sortedCubes=cubes.slice().sort((a,b)=>{
    const za=Math.sin(rotation)*a.x;const zb=Math.sin(rotation)*b.x;
    return za-zb;
  });
  for(const cube of sortedCubes){
    drawCube(cube,rotation);
    if(cube.matched){
      ctx.strokeStyle='#ffd700';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(cube.x,cube.y,cube.size*0.7,0,Math.PI*2);ctx.stroke();
    }
  }
  // rotation indicator
  ctx.fillStyle='rgba(255,255,255,0.1)';
  ctx.beginPath();ctx.arc(W/2,H-40,15,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffd700';
  ctx.beginPath();ctx.arc(W/2+Math.cos(rotation)*10,H-40+Math.sin(rotation)*10,4,0,Math.PI*2);ctx.fill();
  ctx.textAlign='left';
}

function rotateLeft(){rotation-=0.2;render()}
function rotateRight(){rotation+=0.2;render()}

canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  const my=(e.clientY-rect.top)*(H/rect.height);
  // find clicked cube
  for(const cube of cubes){
    if(Math.abs(mx-cube.x)<cube.size&&Math.abs(my-cube.y)<cube.size){
      if(selectedCube===null){
        selectedCube=cube;
        // rotate its colors
        cube.faceColors.unshift(cube.faceColors.pop());
        score+=5;
      }else{
        // swap colors with selected
        const temp=cube.faceColors.slice();
        cube.faceColors=selectedCube.faceColors.slice();
        selectedCube.faceColors=temp;
        selectedCube=null;score+=10;
      }
      // check if all match
      const allMatch=cubes.every(c=>JSON.stringify(c.faceColors)===JSON.stringify(targetPattern));
      if(allMatch){
        level++;score+=100;
        if(score>best){best=score;localStorage.setItem('cube_best',best);document.getElementById('best').textContent=best}
        document.getElementById('olTitle').textContent=`🎉 第${level-1}关完成！`;
        document.getElementById('olTitle').style.color='#ffd700';
        document.getElementById('olMsg').textContent=`分数: ${score}`;
        document.getElementById('overlay').classList.add('show');
      }
      document.getElementById('score').textContent=score;
      render();
      return;
    }
  }
  selectedCube=null;
});

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'){rotateLeft();e.preventDefault()}
  if(e.key==='ArrowRight'||e.key==='d'){rotateRight();e.preventDefault()}
});

// auto rotation
let autoRot=true;
setInterval(()=>{if(autoRot){rotation+=0.005;render()}},16);

newGame();
</script>
</body>
</html>

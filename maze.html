<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌀 迷宫逃脱</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e0a;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#c8e0c8}
h1{font-size:28px;color:#4a4;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #2a3a2a;border-radius:8px;box-shadow:0 0 30px rgba(74,170,74,0.1)}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a2a1a;color:#4a4;border:1px solid #2a3a2a;border-radius:6px;cursor:pointer;font-size:12px}
#controls select{padding:4px 8px;background:#1a2a1a;color:#4a4;border:1px solid #2a3a2a;border-radius:4px;font-size:12px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h2{font-size:32px;color:#ffd700;margin-bottom:8px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;background:#4a4;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<h1>🌀 迷宫逃脱</h1>
<div id="info">
  <div>大小: <span class="val" id="size">15</span></div>
  <div>步数: <span class="val" id="steps">0</span></div>
  <div>用时: <span class="val" id="timer">0:00</span></div>
  <div>钥匙: <span class="val" id="keys">0</span></div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <select id="difficulty" onchange="newMaze()">
    <option value="9">小 (9×9)</option>
    <option value="15" selected>中 (15×15)</option>
    <option value="21">大 (21×21)</option>
    <option value="31">超大 (31×31)</option>
  </select>
  <button onclick="newMaze()">新迷宫</button>
  <button onclick="showSolution()">💡 提示</button>
</div>
<div id="overlay">
  <h2>🎉 逃出迷宫！</h2>
  <p id="olMsg"></p>
  <button onclick="newMaze()">下一关</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');

let maze,cols,rows,cellSize,player,exit,steps,startTime,timerInterval,showingSolution,solution,keyCount,collectedKeys;

function newMaze(){
  const size=parseInt(document.getElementById('difficulty').value);
  cols=size;rows=size;
  cellSize=Math.min(28,Math.floor(500/Math.max(cols,rows)));
  canvas.width=cols*cellSize;canvas.height=rows*cellSize;
  document.getElementById('size').textContent=size;
  // generate maze using recursive backtracking
  maze=Array.from({length:rows},()=>Array.from({length:cols},()=>({top:true,right:true,bottom:true,left:true,visited:false})));
  carve(0,0);
  // reset visited for gameplay
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)maze[r][c].visited=false;
  player={x:0,y:0};
  exit={x:cols-1,y:rows-1};
  steps=0;keyCount=0;collectedKeys=0;showingSolution=false;
  // place keys
  const numKeys=size>=21?3:size>=15?2:1;
  for(let i=0;i<numKeys;i++){
    let kx,ky;
    do{kx=Math.floor(Math.random()*cols);ky=Math.floor(Math.random()*rows)}
    while((kx===0&&ky===0)||(kx===exit.x&&ky===exit.y)||maze[ky][kx].key);
    maze[ky][kx].key=true;keyCount++;
  }
  // place gems
  for(let i=0;i<2;i++){
    let gx,gy;
    do{gx=Math.floor(Math.random()*cols);gy=Math.floor(Math.random()*rows)}
    while((gx===0&&gy===0)||(gx===exit.x&&gy===exit.y)||maze[gy][gx].key||maze[gy][gx].gem);
    maze[gy][gx].gem=true;
  }
  clearInterval(timerInterval);startTime=Date.now();
  timerInterval=setInterval(()=>{
    const t=Math.floor((Date.now()-startTime)/1000);
    document.getElementById('timer').textContent=`${Math.floor(t/60)}:${String(t%60).padStart(2,'0')}`;
  },1000);
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('steps').textContent='0';
  document.getElementById('keys').textContent='0';
  solution=null;
  render();
}

function carve(r,c){
  maze[r][c].visited=true;
  const dirs=shuffle([[0,-1,'top','bottom'],[1,0,'right','left'],[0,1,'bottom','top'],[-1,0,'left','right']]);
  for(const[dc,dr,wall,opp]of dirs){
    const nc=c+dc,nr=r+dr;
    if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&!maze[nr][nc].visited){
      maze[r][c][wall]=false;maze[nr][nc][opp]=false;
      carve(nr,nc);
    }
  }
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function movePlayer(dx,dy){
  const nx=player.x+dx,ny=player.y+dy;
  if(nx<0||nx>=cols||ny<0||ny>=rows)return;
  const cell=maze[player.y][player.x];
  // check walls
  if(dx===1&&cell.right)return;
  if(dx===-1&&cell.left)return;
  if(dy===1&&cell.bottom)return;
  if(dy===-1&&cell.top)return;
  player.x=nx;player.y=ny;steps++;
  maze[ny][nx].visited=true;
  // collect key
  if(maze[ny][nx].key){maze[ny][nx].key=false;collectedKeys++;document.getElementById('keys').textContent=collectedKeys}
  // collect gem
  if(maze[ny][nx].gem){maze[ny][nx].gem=false}
  document.getElementById('steps').textContent=steps;
  // check exit
  if(player.x===exit.x&&player.y===exit.y){
    clearInterval(timerInterval);
    const time=Math.floor((Date.now()-startTime)/1000);
    document.getElementById('olMsg').textContent=`步数: ${steps} | 用时: ${Math.floor(time/60)}:${String(time%60).padStart(2,'0')}`;
    document.getElementById('overlay').classList.add('show');
  }
  showingSolution=false;
  render();
}

function showSolution(){
  // BFS to find path
  const visited=Array.from({length:rows},()=>Array(cols).fill(false));
  const parent=Array.from({length:rows},()=>Array(cols).fill(null));
  const queue=[{x:player.x,y:player.y}];
  visited[player.y][player.x]=true;
  while(queue.length){
    const cur=queue.shift();
    if(cur.x===exit.x&&cur.y===exit.y)break;
    const cell=maze[cur.y][cur.x];
    const moves=[[1,0,'right'],[-1,0,'left'],[0,1,'bottom'],[0,-1,'top']];
    for(const[dx,dy,wall]of moves){
      const nx=cur.x+dx,ny=cur.y+dy;
      if(nx>=0&&nx<cols&&ny>=0&&ny<rows&&!visited[ny][nx]&&!cell[wall]){
        visited[ny][nx]=true;parent[ny][nx]={x:cur.x,y:cur.y};
        queue.push({x:nx,y:ny});
      }
    }
  }
  // reconstruct path
  solution=[];
  let cur={x:exit.x,y:exit.y};
  while(cur&&(cur.x!==player.x||cur.y!==player.y)){
    solution.unshift(cur);
    cur=parent[cur.y][cur.x];
  }
  showingSolution=true;
  render();
}

function render(){
  ctx.fillStyle='#0a0e0a';ctx.fillRect(0,0,canvas.width,canvas.height);
  // draw visited cells
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    if(maze[r][c].visited){
      ctx.fillStyle='#141e14';ctx.fillRect(c*cellSize,r*cellSize,cellSize,cellSize);
    }
  }
  // draw solution path
  if(showingSolution&&solution){
    ctx.fillStyle='rgba(74,170,74,0.2)';
    for(const p of solution)ctx.fillRect(p.x*cellSize,p.y*cellSize,cellSize,cellSize);
  }
  // draw walls
  ctx.strokeStyle='#4a4';ctx.lineWidth=2;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const x=c*cellSize,y=r*cellSize;
    const cell=maze[r][c];
    if(cell.top){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+cellSize,y);ctx.stroke()}
    if(cell.right){ctx.beginPath();ctx.moveTo(x+cellSize,y);ctx.lineTo(x+cellSize,y+cellSize);ctx.stroke()}
    if(cell.bottom){ctx.beginPath();ctx.moveTo(x,y+cellSize);ctx.lineTo(x+cellSize,y+cellSize);ctx.stroke()}
    if(cell.left){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+cellSize);ctx.stroke()}
  }
  // draw keys
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    if(maze[r][c].key){ctx.font=`${cellSize-4}px serif`;ctx.textAlign='center';ctx.fillText('🔑',c*cellSize+cellSize/2,r*cellSize+cellSize-4)}
    if(maze[r][c].gem){ctx.font=`${cellSize-4}px serif`;ctx.textAlign='center';ctx.fillText('💎',c*cellSize+cellSize/2,r*cellSize+cellSize-4)}
  }
  // draw exit
  ctx.fillStyle='#4a4';
  ctx.fillRect(exit.x*cellSize+2,exit.y*cellSize+2,cellSize-4,cellSize-4);
  ctx.fillStyle='#fff';ctx.font=`${cellSize-6}px serif`;ctx.textAlign='center';
  ctx.fillText('🏁',exit.x*cellSize+cellSize/2,exit.y*cellSize+cellSize-4);
  // draw player
  ctx.fillStyle='#ffd700';
  ctx.beginPath();ctx.arc(player.x*cellSize+cellSize/2,player.y*cellSize+cellSize/2,cellSize/3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.font=`${cellSize-8}px serif`;
  ctx.fillText('🧑',player.x*cellSize+cellSize/2,player.y*cellSize+cellSize-3);
  ctx.textAlign='left';
}

document.addEventListener('keydown',e=>{
  switch(e.key){
    case'ArrowUp':case'w':e.preventDefault();movePlayer(0,-1);break;
    case'ArrowDown':case's':e.preventDefault();movePlayer(0,1);break;
    case'ArrowLeft':case'a':e.preventDefault();movePlayer(-1,0);break;
    case'ArrowRight':case'd':e.preventDefault();movePlayer(1,0);break;
  }
});

// touch swipe
let tx,ty;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<20&&Math.abs(dy)<20)return;
  if(Math.abs(dx)>Math.abs(dy))movePlayer(dx>0?1:-1,0);
  else movePlayer(0,dy>0?1:-1);
});

newMaze();
</script>
</body>
</html>

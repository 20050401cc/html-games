<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🃏 暗影卡牌</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;color:#d0d0e0;overflow:hidden;height:100vh;display:flex;flex-direction:column;user-select:none}
#topBar{display:flex;justify-content:space-between;align-items:center;padding:6px 16px;background:#10101c;border-bottom:1px solid #2a2a3e;min-height:36px;font-size:13px}
#topBar .val{color:#ffd700;font-weight:bold}
#gameArea{flex:1;display:flex;flex-direction:column;position:relative}
#enemyArea{flex:1;display:flex;justify-content:center;align-items:center;gap:24px;padding:20px}
.enemy{background:#16162a;border:2px solid #2a2a3e;border-radius:12px;padding:16px;min-width:130px;text-align:center;transition:all .2s}
.enemy.target{border-color:#f55;box-shadow:0 0 15px rgba(255,85,85,0.3)}
.enemy.dead{opacity:0.3;pointer-events:none}
.enemy .icon{font-size:36px}
.enemy .name{font-size:13px;color:#ccc;margin:4px 0}
.enemy .hp-bar{width:100%;height:8px;background:#1a1a2e;border-radius:4px;overflow:hidden;margin:4px 0}
.enemy .hp-bar .fill{height:100%;background:#e74c3c;transition:width .3s;border-radius:4px}
.enemy .hp-text{font-size:11px;color:#e74c3c}
.enemy .intent{font-size:11px;color:#f80;margin-top:4px}
#playerArea{display:flex;justify-content:center;gap:16px;padding:8px 16px;background:#0e0e1a;border-top:1px solid #2a2a3e}
#playerInfo{text-align:center;min-width:80px}
#playerInfo .p-icon{font-size:32px}
#playerInfo .p-hp-bar{width:80px;height:8px;background:#1a1a2e;border-radius:4px;overflow:hidden;margin:4px auto}
#playerInfo .p-hp-bar .fill{height:100%;background:#2ecc71;transition:width .3s;border-radius:4px}
#playerInfo .p-hp{font-size:11px;color:#2ecc71}
#playerInfo .p-block{font-size:11px;color:#5bf}
#handArea{display:flex;justify-content:center;align-items:flex-end;gap:8px;padding:10px 16px 14px;min-height:180px;background:#0a0a12;border-top:1px solid #1a1a2e}
.card{width:120px;height:165px;background:#1a1a2e;border:2px solid #3a3a4e;border-radius:10px;cursor:pointer;transition:all .2s;position:relative;display:flex;flex-direction:column;overflow:hidden}
.card:hover{transform:translateY(-20px);border-color:#ffd700;box-shadow:0 8px 20px rgba(0,0,0,0.5);z-index:10}
.card.played{opacity:0.3;pointer-events:none}
.card .card-cost{position:absolute;top:6px;left:6px;width:24px;height:24px;background:#3498db;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;color:#fff}
.card .card-icon{font-size:28px;text-align:center;margin-top:28px}
.card .card-name{font-size:11px;text-align:center;color:#e0e0e0;margin-top:4px;font-weight:bold}
.card .card-desc{font-size:9px;text-align:center;color:#888;padding:4px 6px;flex:1}
.card .card-type{font-size:8px;text-align:center;color:#555;padding:3px;background:#0a0a14}
.card.attack{border-color:#c44}
.card.skill{border-color:#48c}
.card.power{border-color:#a4f}
#energy{text-align:center;min-width:60px}
#energy .orb{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#2a4,#4a6);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:bold;color:#fff;margin:0 auto;border:3px solid #4a4;box-shadow:0 0 15px rgba(74,170,74,0.3)}
#deckInfo{display:flex;justify-content:space-between;padding:6px 16px;background:#0a0a14;font-size:11px;color:#666;border-top:1px solid #1a1a2e}
#endTurn{position:absolute;right:20px;bottom:200px;padding:12px 24px;background:#e74c3c;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:bold;transition:all .2s}
#endTurn:hover{background:#ff6b6b;transform:scale(1.05)}
#endTurn:disabled{background:#333;color:#666;cursor:not-allowed}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h1{font-size:40px;margin-bottom:12px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:12px 36px;font-size:16px;background:#ffd700;color:#111;border:none;border-radius:8px;cursor:pointer;font-weight:bold;margin:4px}
#cardReward{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#cardReward.show{display:flex}
#cardReward h2{color:#ffd700;margin-bottom:16px}
#rewardCards{display:flex;gap:16px}
#statusBar{display:flex;gap:8px;justify-content:center;padding:4px;background:#0e0e1a;font-size:11px}
#statusBar .status{padding:2px 8px;border-radius:10px;background:#1a1a2e}
</style>
</head>
<body>
<div id="topBar">
  <div>🗺️ 楼层 <span class="val" id="floor">1</span></div>
  <div>🃏 <span class="val" id="deckCount">10</span> / <span class="val" id="discardCount">0</span></div>
  <div>💰 <span class="val" id="gold">0</span></div>
  <div>⚔️ 击杀 <span class="val" id="kills">0</span></div>
</div>
<div id="gameArea">
  <div id="statusBar"></div>
  <div id="enemyArea"></div>
  <button id="endTurn" onclick="endTurn()">结束回合</button>
</div>
<div id="playerArea">
  <div id="playerInfo">
    <div class="p-icon">🧙</div>
    <div class="p-hp-bar"><div class="p-fill" id="playerHpFill" style="width:100%"></div></div>
    <div class="p-hp" id="playerHp">60/60</div>
    <div class="p-block" id="playerBlock">🛡️ 0</div>
  </div>
  <div id="energy"><div class="orb" id="energyOrb">3</div></div>
</div>
<div id="handArea"></div>
<div id="deckInfo">
  <div>📦 抽牌堆: <span id="drawCount">0</span></div>
  <div>♻️ 弃牌堆: <span id="discardPile">0</span></div>
  <div>🗑️ 消耗: <span id="exhaustCount">0</span></div>
</div>
<div id="overlay">
  <h1 id="olTitle">💀 旅途终结</h1>
  <p id="olMsg"></p>
  <button onclick="startGame()">重新开始</button>
</div>
<div id="cardReward">
  <h2>选择一张卡牌加入牌组</h2>
  <div id="rewardCards"></div>
  <button onclick="skipReward()" style="margin-top:16px;padding:8px 20px;background:#333;color:#aaa;border:none;border-radius:6px;cursor:pointer">跳过</button>
</div>
<script>
const ALL_CARDS=[
  {id:'strike',name:'打击',icon:'🗡️',type:'attack',cost:1,dmg:6,desc:'造成6点伤害',target:'enemy'},
  {id:'defend',name:'防御',icon:'🛡️',type:'skill',cost:1,block:5,desc:'获得5点格挡',target:'self'},
  {id:'bash',name:'猛击',icon:'🔨',type:'attack',cost:2,dmg:8,vulnerable:2,desc:'造成8伤害 施加2层易伤',target:'enemy'},
  {id:'cleave',name:'横扫',icon:'🌀',type:'attack',cost:1,dmg:5,desc:'对所有敌人造成5伤害',target:'all'},
  {id:'iron_wave',name:'铁壁波',icon:'🌊',type:'skill',cost:1,block:7,desc:'获得7点格挡',target:'self'},
  {id:'uppercut',name:'上钩拳',icon:'👊',type:'attack',cost:2,dmg:10,stun:1,desc:'造成10伤害 眩晕1回合',target:'enemy'},
  {id:'flame_barrier',name:'火焰屏障',icon:'🔥',type:'power',cost:2,thorns:3,desc:'获得3层荆棘（受击反伤）',target:'self'},
  {id:'inflame',name:'燃烧',icon:'💪',type:'power',cost:1,strength:2,desc:'永久增加2点力量',target:'self'},
  {id:'pommel',name:'剑柄击',icon:'⚡',type:'attack',cost:1,dmg:4,draw:1,desc:'造成4伤害 抽1张牌',target:'enemy'},
  {id:'shrug',name:'耸肩',icon:'🤷',type:'skill',cost:1,block:8,draw:1,desc:'获得8格挡 抽1张牌',target:'self'},
  {id:'bloodlet',name:'放血',icon:'🩸',type:'skill',cost:0,loseHp:3,energy:1,desc:'失去3HP 获得1能量',target:'self'},
  {id:'whirlwind',name:'旋风斩',icon:'🌪️',type:'attack',cost:0,dmg:5,desc:'消耗所有能量 对全体造成5×能量伤害',target:'all'},
  {id:'offering',name:'献祭',icon:'🕯️',type:'skill',cost:0,loseHp:6,energy:2,draw:3,desc:'失去6HP +2能量 抽3张',target:'self'},
  {id:'demon_form',name:'恶魔形态',icon:'😈',type:'power',cost:3,strengthPerTurn:2,desc:'每回合获得2力量',target:'self'},
  {id:'bludgeon',name:'重击',icon:'🏏',type:'attack',cost:3,dmg:24,desc:'造成24点伤害',target:'enemy'},
  {id:'impervious',name:'坚不可摧',icon:'🏰',type:'skill',cost:2,block:30,exhaust:true,desc:'获得30格挡 消耗',target:'self'},
  {id:'feed',name:'吞噬',icon:'👹',type:'attack',cost:1,dmg:10,maxHpUp:3,desc:'造成10伤害 击杀永久+3最大HP',target:'enemy'},
  {id:'reaper',name:'死神',icon:'💀',type:'attack',cost:2,dmg:5,healAll:true,desc:'对全体造成5伤害 每击杀恢复HP',target:'all'},
  {id:'sword_boomerang',name:'回旋镖剑',icon:'🪃',type:'attack',cost:1,dmg:3,hits:3,desc:'随机造成3次3伤害',target:'random'},
  {id:'metallicize',name:'金属化',icon:'🔩',type:'power',cost:1,blockPerTurn:3,desc:'每回合开始获得3格挡',target:'self'},
];

const ENEMIES={
  slime:{name:'史莱姆',icon:'🟢',hp:28,intents:[{type:'attack',value:5},{type:'attack',value:8}]},
  goblin:{name:'哥布林',icon:'👺',hp:35,intents:[{type:'attack',value:6},{type:'attack',value:10},{type:'buff',value:2}]},
  skeleton:{name:'骷髅兵',icon:'💀',hp:45,intents:[{type:'attack',value:8},{type:'defend',value:6},{type:'attack',value:12}]},
  cultist:{name:'邪教徒',icon:'🧙',hp:50,intents:[{type:'buff',value:3},{type:'attack',value:6}]},
  slimeL:{name:'大史莱姆',icon:'🟢',hp:70,intents:[{type:'attack',value:10},{type:'attack',value:18},{type:'defend',value:10}]},
  gremlin:{name:'小恶魔',icon:'👹',hp:45,intents:[{type:'attack',value:4},{type:'attack',value:4},{type:'attack',value:14}]},
  boss_slime:{name:'史莱姆王',icon:'👑',hp:150,intents:[{type:'attack',value:12},{type:'buff',value:4},{type:'attack',value:24}]},
  boss_skeleton:{name:'骷髅将军',icon:'💀',hp:180,intents:[{type:'attack',value:15},{type:'defend',value:15},{type:'attack',value:30}]},
  boss_demon:{name:'恶魔领主',icon:'👹',hp:250,intents:[{type:'attack',value:20},{type:'buff',value:5},{type:'attack',value:35},{type:'heal',value:20}]},
};

let player,hand,drawPile,discardPile,exhaustPile,enemies,floor,gold,kills,turn,block,str,demonForm,metallicize,thorns;

function startGame(){
  player={hp:60,maxHp:60};
  const starter=[...Array(5).fill('strike'),...Array(4).fill('defend'),'bash'];
  drawPile=shuffle(starter.map(id=>ALL_CARDS.find(c=>c.id===id)));
  discardPile=[];exhaustPile=[];hand=[];
  floor=0;gold=0;kills=0;turn=0;
  block=0;str=0;demonForm=0;metallicize=0;thorns=0;
  document.getElementById('overlay').classList.remove('show');
  nextBattle();
}

function nextBattle(){
  floor++;
  if(floor%3===0){
    const bosses=['boss_slime','boss_skeleton','boss_demon'];
    enemies=[createEnemy(bosses[Math.floor(floor/3-1)]||'boss_demon')];
  }else{
    const pools=[['slime','slime'],['slime','goblin'],['skeleton','goblin','slime'],['cultist','skeleton'],['slimeL','gremlin'],['skeleton','cultist','goblin']];
    const pool=pools[clamp(floor-1,0,pools.length-1)];
    enemies=pool.map(id=>createEnemy(id));
  }
  block=0;
  startTurn();
}

function createEnemy(id){
  const t=ENEMIES[id];
  const scale=1+(floor-1)*0.1;
  return{...t,id,hp:Math.floor(t.hp*scale),maxHp:Math.floor(t.hp*scale),intents:t.intents,intentIdx:0,vulnerable:0,strength:0,stunned:0};
}

function startTurn(){
  turn++;
  block=0;
  // demon form / metallicize
  str+=demonForm;
  block+=metallicize;
  // draw cards
  drawCards(5);
  // set energy
  player.energy=3;
  // set enemy intents
  for(const e of enemies){
    if(e.stunned>0){e.stunned--;e.intent={type:'stunned',value:0};continue}
    e.intent=e.intents[e.intentIdx%e.intents.length];
    e.intentIdx++;
    e.intentValue=e.intent.value+e.strength;
  }
  renderAll();
}

function drawCards(n){
  for(let i=0;i<n;i++){
    if(drawPile.length===0){
      drawPile=shuffle(discardPile);discardPile=[];
    }
    if(drawPile.length===0)break;
    hand.push(drawPile.pop());
  }
}

function playCard(cardIdx,targetIdx){
  const card=hand[cardIdx];
  if(!card||card.cost>player.energy)return;
  player.energy-=card.cost;
  hand.splice(cardIdx,1);
  // auto-target first alive enemy if needed
  if(card.target==='enemy'&&targetIdx===undefined){
    targetIdx=enemies.findIndex(e=>e.hp>0);
  }
  const target=targetIdx!==undefined&&targetIdx>=0?enemies[targetIdx]:null;
  // apply card effects
  let dmg=card.dmg||0;
  if(dmg)dmg+=str;
  if(card.target==='enemy'&&target){
    if(target.vulnerable>0)dmg=Math.floor(dmg*1.5);
    let totalDmg=dmg;
    if(card.hits)totalDmg=dmg*card.hits;
    else if(card.hits===undefined)totalDmg=dmg;
    for(let h=0;h<(card.hits||1);h++){
      const t=card.hits?enemies.filter(e=>e.hp>0)[Math.floor(Math.random()*enemies.filter(e=>e.hp>0).length)]:target;
      if(t){t.hp-=dmg;if(card.vulnerable)t.vulnerable+=card.vulnerable;if(card.stun)t.stunned+=card.stun}
    }
    if(card.maxHpUp&&target.hp<=0){player.maxHp+=card.maxHpUp;player.hp+=card.maxHpUp}
  }else if(card.target==='all'){
    for(const e of enemies){
      if(e.hp<=0)continue;
      let d=dmg;
      if(e.vulnerable>0)d=Math.floor(d*1.5);
      e.hp-=d;
      if(card.healAll&&e.hp<=0)player.hp=Math.min(player.hp+5,player.maxHp);
    }
  }else if(card.target==='random'){
    const alive=enemies.filter(e=>e.hp>0);
    for(let h=0;h<(card.hits||1);h++){
      const t=alive[Math.floor(Math.random()*alive.length)];
      if(t){let d=dmg;if(t.vulnerable>0)d=Math.floor(d*1.5);t.hp-=d}
    }
  }
  if(card.block)block+=card.block;
  if(card.loseHp){player.hp-=card.loseHp;if(player.hp<=0){gameOver();return}}
  if(card.energy)player.energy+=card.energy;
  if(card.draw)drawCards(card.draw);
  if(card.strength)str+=card.strength;
  if(card.thorns)thorns+=card.thorns;
  if(card.blockPerTurn)metallicize+=card.blockPerTurn;
  if(card.strengthPerTurn)demonForm+=card.strengthPerTurn;
  // remove dead enemies
  for(const e of enemies){if(e.hp<=0)e.hp=0}
  if(enemies.every(e=>e.hp<=0)){
    kills++;
    gold+=5+floor*2;
    // card reward
    if(Math.random()<0.7)showCardReward();
    else nextBattle();
    return;
  }
  if(card.exhaust){exhaustPile.push(card)}
  else{discardPile.push(card)}
  renderAll();
}

function endTurn(){
  // discard hand
  discardPile.push(...hand);hand=[];
  // enemy turn
  for(const e of enemies){
    if(e.hp<=0)continue;
    if(e.stunned>0){e.stunned--;continue}
    const intent=e.intent;
    if(!intent)continue;
    switch(intent.type){
      case'attack':
        let dmg=e.intentValue;
        const blocked=Math.min(block,dmg);
        block-=blocked;dmg-=blocked;
        player.hp-=dmg;
        if(thorns>0)e.hp-=thorns;
        break;
      case'defend':e.hp=Math.min(e.hp+intent.value,e.maxHp);break;
      case'buff':e.strength+=intent.value;break;
      case'heal':e.hp=Math.min(e.hp+intent.value,e.maxHp);break;
    }
    // decay vulnerability
    if(e.vulnerable>0)e.vulnerable--;
  }
  if(player.hp<=0){gameOver();return}
  startTurn();
}

function showCardReward(){
  const choices=shuffle(ALL_CARDS.filter(c=>!['strike','defend'].includes(c.id))).slice(0,3);
  const el=document.getElementById('rewardCards');
  el.innerHTML=choices.map((c,i)=>makeCardHTML(c,i,true)).join('');
  document.getElementById('cardReward').classList.add('show');
  window._rewardChoices=choices;
}

function pickReward(i){
  const card=window._rewardChoices[i];
  if(card){
    drawPile.push({...card});
    shuffle(drawPile);
  }
  document.getElementById('cardReward').classList.remove('show');
  nextBattle();
}

function skipReward(){
  document.getElementById('cardReward').classList.remove('show');
  nextBattle();
}

function gameOver(){
  document.getElementById('olTitle').textContent='💀 旅途终结';
  document.getElementById('olTitle').style.color='#e74c3c';
  document.getElementById('olMsg').textContent=`楼层: ${floor} | 击杀: ${kills} | 金币: ${gold}`;
  document.getElementById('overlay').classList.add('show');
}

function makeCardHTML(c,i,isReward){
  const playable=!isReward&&c.cost<=player.energy;
  const onclick=isReward?`pickReward(${i})`:`playCard(${i})`;
  return`<div class="card ${c.type}${!playable&&!isReward?' played':''}" onclick="${onclick}">
    <div class="card-cost">${c.cost}</div>
    <div class="card-icon">${c.icon}</div>
    <div class="card-name">${c.name}</div>
    <div class="card-desc">${c.desc}</div>
    <div class="card-type">${c.type==='attack'?'攻击':c.type==='skill'?'技能':'能力'}</div>
  </div>`;
}

function renderAll(){
  // enemies
  const el=document.getElementById('enemyArea');
  el.innerHTML=enemies.map((e,i)=>{
    if(e.hp<=0)return`<div class="enemy dead"><div class="icon">${e.icon}</div><div class="name">${e.name}</div><div class="hp-text">已击败</div></div>`;
    const intentText=e.intent?e.intent.type==='attack'?`⚔️ ${e.intentValue}`:e.intent.type==='defend'?`🛡️ ${e.intent.value}`:e.intent.type==='buff'?`💪 +${e.intent.value}`:e.intent.type==='heal'?`❤️ ${e.intent.value}`:'💫':'';
    const vuln=e.vulnerable>0?`<span style="color:#f80">易伤${e.vulnerable}</span>`:'';
    const stun=e.stunned>0?`<span style="color:#5bf">眩晕</span>`:'';
    return`<div class="enemy${e.intent&&e.intent.type==='attack'?' target':''}">
      <div class="icon">${e.icon}</div>
      <div class="name">${e.name} ${vuln} ${stun}</div>
      <div class="hp-bar"><div class="fill" style="width:${(e.hp/e.maxHp)*100}%"></div></div>
      <div class="hp-text">${e.hp}/${e.maxHp}</div>
      <div class="intent">${intentText}</div>
    </div>`;
  }).join('');
  // hand
  document.getElementById('handArea').innerHTML=hand.map((c,i)=>makeCardHTML(c,i,false)).join('');
  // player
  document.getElementById('playerHp').textContent=`${player.hp}/${player.maxHp}`;
  document.getElementById('playerHpFill').style.width=`${(player.hp/player.maxHp)*100}%`;
  document.getElementById('playerBlock').textContent=`🛡️ ${block}`;
  document.getElementById('energyOrb').textContent=player.energy;
  // deck info
  document.getElementById('drawCount').textContent=drawPile.length;
  document.getElementById('discardPile').textContent=discardPile.length;
  document.getElementById('exhaustCount').textContent=exhaustPile.length;
  document.getElementById('deckCount').textContent=drawPile.length+discardPile.length+hand.length;
  document.getElementById('discardCount').textContent=discardPile.length;
  document.getElementById('floor').textContent=floor;
  document.getElementById('gold').textContent=gold;
  document.getElementById('kills').textContent=kills;
  // status
  const statuses=[];
  if(str>0)statuses.push(`<span class="status">💪力量+${str}</span>`);
  if(demonForm>0)statuses.push(`<span class="status">😈恶魔形态</span>`);
  if(metallicize>0)statuses.push(`<span class="status">🔩金属化+${metallicize}</span>`);
  if(thorns>0)statuses.push(`<span class="status">🌹荆棘+${thorns}</span>`);
  document.getElementById('statusBar').innerHTML=statuses.join('');
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}

startGame();

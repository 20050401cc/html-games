<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧲 磁力球</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#5bf;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #2a2a3e;border-radius:8px;box-shadow:0 0 30px rgba(90,130,255,0.1);cursor:pointer}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a1a2e;color:#5bf;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:12px}
</style>
</head>
<body>
<h1>🧲 磁力球</h1>
<div id="info">
  <div>分数: <span class="val" id="score">0</span></div>
  <div>球数: <span class="val" id="count">0</span></div>
  <div>最高: <span class="val" id="best">0</span></div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <button onclick="addBall()">➕ 加球</button>
  <button onclick="toggleGravity()">🌍 重力</button>
  <button onclick="clearBalls()">🗑️ 清空</button>
  <button onclick="addAttractor()">🧲 磁铁</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=600,H=500;
canvas.width=W;canvas.height=H;

let balls,attractors,score,gravityOn,mouseX,mouseY;
let best=parseInt(localStorage.getItem('magnet_best')||'0');
document.getElementById('best').textContent=best;

function init(){
  balls=[];attractors=[];score=0;gravityOn=false;mouseX=W/2;mouseY=H/2;
  for(let i=0;i<5;i++)addBall();
  render();
}

function addBall(){
  const colors=['#5bf','#f55','#5f5','#ff5','#f5f','#fa0'];
  balls.push({
    x:50+Math.random()*(W-100),y:50+Math.random()*(H-100),
    vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,
    r:6+Math.random()*8,
    color:colors[Math.floor(Math.random()*colors.length)],
    charge:Math.random()>0.5?1:-1,
  });
  updateInfo();
}

function addAttractor(){
  attractors.push({x:mouseX,y:mouseY,strength:50+Math.random()*50,r:15});
}

function toggleGravity(){gravityOn=!gravityOn}

function clearBalls(){balls=[];attractors=[];score=0;updateInfo()}

function update(){
  for(const b of balls){
    // gravity
    if(gravityOn)b.vy+=0.1;
    // mouse attraction
    const mdx=mouseX-b.x,mdy=mouseY-b.y;
    const mdist=Math.sqrt(mdx*mdx+mdy*mdy)||1;
    b.vx+=mdx/mdist*0.05;b.vy+=mdy/mdist*0.05;
    // attractor forces
    for(const a of attractors){
      const dx=a.x-b.x,dy=a.y-b.y;
      const dist=Math.sqrt(dx*dx+dy*dy)||1;
      const force=a.strength/(dist*dist)*b.charge;
      b.vx+=dx/dist*force;b.vy+=dy/dist*force;
    }
    // ball-ball interaction
    for(const b2 of balls){
      if(b===b2)continue;
      const dx=b2.x-b.x,dy=b2.y-b.y;
      const dist=Math.sqrt(dx*dx+dy*dy)||1;
      const minDist=b.r+b2.r;
      if(dist<minDist){
        // collision
        const nx=dx/dist,ny=dy/dist;
        const overlap=(minDist-dist)/2;
        b.x-=nx*overlap;b.y-=ny*overlap;
        b2.x+=nx*overlap;b2.y+=ny*overlap;
        const dvx=b.vx-b2.vx,dvy=b.vy-b2.vy;
        const dot=dvx*nx+dvy*ny;
        b.vx-=dot*nx*0.8;b.vy-=dot*ny*0.8;
        b2.vx+=dot*nx*0.8;b2.vy+=dot*ny*0.8;
        score++;
      }
      // magnetic force
      const chargeForce=b.charge*b2.charge*-0.5/(dist*dist);
      b.vx+=dx/dist*chargeForce;b.vy+=dy/dist*chargeForce;
    }
    // damping
    b.vx*=0.995;b.vy*=0.995;
    // wall bounce
    b.x+=b.vx;b.y+=b.vy;
    if(b.x-b.r<0){b.x=b.r;b.vx*=-0.8}
    if(b.x+b.r>W){b.x=W-b.r;b.vx*=-0.8}
    if(b.y-b.r<0){b.y=b.r;b.vy*=-0.8}
    if(b.y+b.r>H){b.y=H-b.r;b.vy*=-0.8}
  }
  if(score>best){best=score;localStorage.setItem('magnet_best',best);document.getElementById('best').textContent=best}
  updateInfo();
}

function render(){
  ctx.fillStyle='rgba(10,10,20,0.3)';ctx.fillRect(0,0,W,H);
  // attractors
  for(const a of attractors){
    ctx.strokeStyle='rgba(255,215,0,0.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(a.x,a.y,a.r,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(255,215,0,0.1)';
    ctx.beginPath();ctx.arc(a.x,a.y,a.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffd700';ctx.font='16px serif';ctx.textAlign='center';
    ctx.fillText('🧲',a.x,a.y+5);ctx.textAlign='left';
  }
  // balls
  for(const b of balls){
    // glow
    ctx.fillStyle=b.color+'20';
    ctx.beginPath();ctx.arc(b.x,b.y,b.r*2.5,0,Math.PI*2);ctx.fill();
    // ball
    const grad=ctx.createRadialGradient(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.1,b.x,b.y,b.r);
    grad.addColorStop(0,'#fff');grad.addColorStop(0.4,b.color);grad.addColorStop(1,b.color+'80');
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
    // charge indicator
    ctx.fillStyle='#fff';ctx.font='bold 10px sans-serif';ctx.textAlign='center';
    ctx.fillText(b.charge>0?'+':'−',b.x,b.y+3);ctx.textAlign='left';
  }
  // field lines (simplified)
  ctx.strokeStyle='rgba(90,130,255,0.03)';ctx.lineWidth=0.5;
  for(let x=0;x<W;x+=30)for(let y=0;y<H;y+=30){
    let fx=0,fy=0;
    for(const b of balls){
      const dx=b.x-x,dy=b.y-y;
      const dist=Math.sqrt(dx*dx+dy*dy)||1;
      const force=b.charge*50/(dist*dist);
      fx+=dx/dist*force;fy+=dy/dist*force;
    }
    const fmag=Math.sqrt(fx*fx+fy*fy)||1;
    ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+fx/fmag*10,y+fy/fmag*10);ctx.stroke();
  }
}

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  mouseX=(e.clientX-rect.left)*(W/rect.width);
  mouseY=(e.clientY-rect.top)*(H/rect.height);
});

function updateInfo(){
  document.getElementById('score').textContent=score;
  document.getElementById('count').textContent=balls.length;
}

function loop(){update();render();requestAnimationFrame(loop)}

init();loop();
</script>
</body>
</html>

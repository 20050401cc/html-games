<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚫ 五子棋</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0e0e18;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#ffd700;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px;align-items:center}
#info .disc{width:20px;height:20px;border-radius:50%;display:inline-block}
canvas{border:2px solid #3a3a2a;border-radius:8px;box-shadow:0 0 30px rgba(255,215,0,0.1);cursor:pointer}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a1a2e;color:#ffd700;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:12px}
#controls select{padding:4px 8px;background:#1a1a2e;color:#ffd700;border:1px solid #2a2a3e;border-radius:4px;font-size:12px}
#msg{margin-top:8px;font-size:14px;color:#ffd700;min-height:20px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h2{font-size:32px;margin-bottom:8px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;background:#ffd700;color:#111;border:none;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<h1>⚫ 五子棋</h1>
<div id="info">
  <div><span class="disc" style="background:#111"></span> 黑方</div>
  <div><span class="disc" style="background:#eee"></span> 白方</div>
  <div>模式: <select id="mode" onchange="newGame()"><option value="pvp">双人</option><option value="easy">简单AI</option><option value="hard">困难AI</option></select></div>
</div>
<canvas id="game"></canvas>
<div id="msg"></div>
<div id="controls">
  <button onclick="newGame()">新游戏</button>
  <button onclick="undoMove()">↩ 悔棋</button>
</div>
<div id="overlay">
  <h2 id="olTitle">🎉 胜利！</h2>
  <p id="olMsg"></p>
  <button onclick="newGame()">再来一局</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const SIZE=15,CELL=32,PADDING=20;
canvas.width=SIZE*CELL+PADDING*2;canvas.height=SIZE*CELL+PADDING*2;

let board,current,gameOver,history,winLine;

function newGame(){
  board=Array.from({length:SIZE},()=>Array(SIZE).fill(0));
  current=1;gameOver=false;history=[];winLine=null;
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('msg').textContent='黑方先行';
  render();
}

function render(){
  ctx.fillStyle='#c8a850';ctx.fillRect(0,0,canvas.width,canvas.height);
  // wood grain
  for(let i=0;i<20;i++){
    ctx.strokeStyle=`rgba(160,130,60,${0.1+Math.random()*0.1})`;
    ctx.lineWidth=1;ctx.beginPath();
    ctx.moveTo(0,i*canvas.height/20+Math.random()*10);
    ctx.lineTo(canvas.width,i*canvas.height/20+Math.random()*10);
    ctx.stroke();
  }
  // grid
  ctx.strokeStyle='#5a4a20';ctx.lineWidth=1;
  for(let i=0;i<SIZE;i++){
    ctx.beginPath();ctx.moveTo(PADDING+i*CELL,PADDING);ctx.lineTo(PADDING+i*CELL,PADDING+(SIZE-1)*CELL);ctx.stroke();
    ctx.beginPath();ctx.moveTo(PADDING,PADDING+i*CELL);ctx.lineTo(PADDING+(SIZE-1)*CELL,PADDING+i*CELL);ctx.stroke();
  }
  // star points
  const stars=[[3,3],[3,11],[7,7],[11,3],[11,11]];
  for(const[r,c]of stars){
    ctx.fillStyle='#5a4a20';
    ctx.beginPath();ctx.arc(PADDING+c*CELL,PADDING+r*CELL,4,0,Math.PI*2);ctx.fill();
  }
  // pieces
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    if(board[r][c]===0)continue;
    const x=PADDING+c*CELL,y=PADDING+r*CELL;
    const isWin=winLine&&winLine.some(w=>w[0]===r&&w[1]===c);
    // shadow
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.beginPath();ctx.arc(x+2,y+2,CELL/2-3,0,Math.PI*2);ctx.fill();
    // piece
    const grad=ctx.createRadialGradient(x-4,y-4,2,x,y,CELL/2-3);
    if(board[r][c]===1){
      grad.addColorStop(0,'#555');grad.addColorStop(1,'#111');
    }else{
      grad.addColorStop(0,'#fff');grad.addColorStop(1,'#ccc');
    }
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.arc(x,y,CELL/2-3,0,Math.PI*2);ctx.fill();
    if(isWin){
      ctx.strokeStyle='#ffd700';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(x,y,CELL/2-3,0,Math.PI*2);ctx.stroke();
    }
  }
  // last move indicator
  if(history.length){
    const last=history[history.length-1];
    ctx.strokeStyle=current===1?'#fff':'#111';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(PADDING+last.c*CELL,PADDING+last.r*CELL,4,0,Math.PI*2);ctx.stroke();
  }
}

canvas.addEventListener('click',e=>{
  if(gameOver)return;
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(canvas.width/rect.width);
  const my=(e.clientY-rect.top)*(canvas.height/rect.height);
  const c=Math.round((mx-PADDING)/CELL);
  const r=Math.round((my-PADDING)/CELL);
  if(r<0||r>=SIZE||c<0||c>=SIZE||board[r][c]!==0)return;
  const mode=document.getElementById('mode').value;
  if(mode!=='pvp'&&current===2)return;
  makeMove(r,c,current);
  if(checkWin(current)){endGame(current);return}
  if(isDraw()){endGame(0);return}
  current=current===1?2:1;
  document.getElementById('msg').textContent=current===1?'黑方回合':'白方回合';
  render();
  if(mode!=='pvp'&&current===2&&!gameOver){
    setTimeout(()=>aiMove(mode),200);
  }
});

function makeMove(r,c,player){
  board[r][c]=player;
  history.push({r,c,player});
}

function undoMove(){
  if(!history.length||gameOver)return;
  const mode=document.getElementById('mode').value;
  const steps=mode!=='pvp'?2:1;
  for(let i=0;i<steps&&history.length;i++){
    const h=history.pop();
    board[h.r][h.c]=0;
    current=h.player;
  }
  document.getElementById('msg').textContent=current===1?'黑方回合':'白方回合';
  render();
}

function aiMove(diff){
  if(gameOver)return;
  let bestR,bestC,bestScore=-1;
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    if(board[r][c]!==0)continue;
    let score=0;
    // check all directions
    const dirs=[[0,1],[1,0],[1,1],[1,-1]];
    for(const[dr,dc]of dirs){
      score+=evalDir(r,c,dr,dc,2)+evalDir(r,c,dr,dc,1)*0.8;
    }
    // center preference
    score+=1/(1+Math.abs(r-7)+Math.abs(c-7));
    if(diff==='hard'){
      // block opponent wins
      board[r][c]=1;if(checkWin(1))score+=1000;board[r][c]=0;
      // own wins
      board[r][c]=2;if(checkWin(2))score+=2000;board[r][c]=0;
    }
    if(score>bestScore){bestScore=score;bestR=r;bestC=c}
  }
  if(bestR!==undefined){
    makeMove(bestR,bestC,2);
    if(checkWin(2)){endGame(2);return}
    if(isDraw()){endGame(0);return}
    current=1;
    document.getElementById('msg').textContent='黑方回合';
    render();
  }
}

function evalDir(r,c,dr,dc,player){
  let count=0,open=0;
  for(let i=1;i<5;i++){
    const nr=r+dr*i,nc=c+dc*i;
    if(nr<0||nr>=SIZE||nc<0||nc>=SIZE)break;
    if(board[nr][nc]===player)count++;else{if(board[nr][nc]===0)open++;break}
  }
  for(let i=1;i<5;i++){
    const nr=r-dr*i,nc=c-dc*i;
    if(nr<0||nr>=SIZE||nc<0||nc>=SIZE)break;
    if(board[nr][nc]===player)count++;else{if(board[nr][nc]===0)open++;break}
  }
  if(count>=4)return 1000;
  if(count===3&&open===2)return 100;
  if(count===3&&open===1)return 50;
  if(count===2&&open===2)return 10;
  if(count===2&&open===1)return 5;
  return count;
}

function checkWin(player){
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    if(board[r][c]!==player)continue;
    const dirs=[[0,1],[1,0],[1,1],[1,-1]];
    for(const[dr,dc]of dirs){
      const line=[[r,c]];
      for(let i=1;i<5;i++){
        const nr=r+dr*i,nc=c+dc*i;
        if(nr<0||nr>=SIZE||nc<0||nc>=SIZE||board[nr][nc]!==player)break;
        line.push([nr,nc]);
      }
      if(line.length===5){winLine=line;return true}
    }
  }
  return false;
}

function isDraw(){return board.every(row=>row.every(c=>c!==0))}

function endGame(winner){
  gameOver=true;render();
  const ol=document.getElementById('overlay');
  const title=document.getElementById('olTitle');
  if(winner===0){title.textContent='🤝 平局！';title.style.color='#888'}
  else{title.textContent=(winner===1?'⚫ 黑方':'⚪ 白方')+'胜利！';title.style.color='#ffd700'}
  document.getElementById('olMsg').textContent='';
  ol.classList.add('show');
}

newGame();
</script>
</body>
</html>

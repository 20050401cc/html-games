<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧊 冰壶</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#5bf;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #2a3a4a;border-radius:8px;box-shadow:0 0 30px rgba(90,130,255,0.1);cursor:pointer}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a1a2e;color:#5bf;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:12px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h2{font-size:32px;margin-bottom:8px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;background:#5bf;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<h1>🧊 冰壶</h1>
<div id="info">
  <div>红方: <span class="val" id="redScore">0</span></div>
  <div>蓝方: <span class="val" id="blueScore">0</span></div>
  <div>回合: <span class="val" id="round">1</span>/4</div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <button onclick="newGame()">新游戏</button>
</div>
<div id="overlay">
  <h2 id="olTitle">🎉 比赛结束！</h2>
  <p id="olMsg"></p>
  <button onclick="newGame()">再来一局</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=300,H=600;
canvas.width=W;canvas.height=H;

const TARGET_Y=100,TARGET_R=60;
const FRICTION=0.985;
let stones,aiming,aimX,aimY,aimPower,currentTeam,round,redScore,blueScore,throwsPerRound,throwsLeft,allStopped;

function newGame(){
  stones=[];aiming=true;currentTeam='red';round=1;
  redScore=0;blueScore=0;throwsPerRound=4;throwsLeft=throwsPerRound*2;
  aimX=W/2;aimY=H-50;aimPower=10;
  allStopped=true;
  document.getElementById('overlay').classList.remove('show');
  updateInfo();render();
}

function throwStone(){
  if(!aiming||!allStopped)return;
  const stone={
    x:W/2,y:H-80,
    vx:(aimX-W/2)*0.05*aimPower,
    vy:-aimPower*0.4,
    r:14,
    team:currentTeam,
    moving:true,
  };
  stones.push(stone);
  aiming=false;allStopped=false;
  // switch team
  throwsLeft--;
  if(currentTeam==='red')currentTeam='blue';else currentTeam='red';
  if(throwsLeft%2===0&&throwsLeft>0){round=Math.ceil((throwsPerRound*2-throwsLeft+1)/2)}
  setTimeout(()=>{aiming=true;updateInfo()},1000);
}

function update(){
  allStopped=true;
  for(const s of stones){
    if(!s.moving)continue;
    s.x+=s.vx;s.y+=s.vy;
    s.vx*=FRICTION;s.vy*=FRICTION;
    if(Math.abs(s.vx)<0.05&&Math.abs(s.vy)<0.05){s.vx=0;s.vy=0;s.moving=false;continue}
    allStopped=false;
    // wall bounce
    if(s.x-s.r<10){s.x=10+s.r;s.vx=Math.abs(s.vx)*0.7}
    if(s.x+s.r>W-10){s.x=W-10-s.r;s.vx=-Math.abs(s.vx)*0.7}
    if(s.y-s.r<10){s.y=10+s.r;s.vy=Math.abs(s.vy)*0.5}
    if(s.y+s.r>H-10){s.y=H-10-s.r;s.vy=-Math.abs(s.vy)*0.3}
    // stone collision
    for(const s2 of stones){
      if(s===s2||s2===s)continue;
      const dx=s2.x-s.x,dy=s2.y-s.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const minDist=s.r+s2.r;
      if(dist<minDist&&dist>0){
        const nx=dx/dist,ny=dy/dist;
        const overlap=(minDist-dist)/2;
        s.x-=nx*overlap;s.y-=ny*overlap;
        s2.x+=nx*overlap;s2.y+=ny*overlap;
        const dvx=s.vx-s2.vx,dvy=s.vy-s2.vy;
        const dot=dvx*nx+dvy*ny;
        s.vx-=dot*nx*0.9;s.vy-=dot*ny*0.9;
        s2.vx+=dot*nx*0.9;s2.vy+=dot*ny*0.9;
        s2.moving=true;allStopped=false;
      }
    }
  }
  // check round end
  if(throwsLeft<=0&&allStopped){
    calculateScore();
    if(round>=4)endGame();
    else{round++;throwsLeft=throwsPerRound*2;currentTeam='red';aiming=true}
    updateInfo();
  }
}

function calculateScore(){
  // closest stone to target center
  const sorted=stones.filter(s=>!s.moving).sort((a,b)=>{
    const da=Math.sqrt((a.x-TARGET_R-10)**2+(a.y-TARGET_Y)**2);
    const db=Math.sqrt((b.x-TARGET_R-10)**2+(b.y-TARGET_Y)**2);
    return da-db;
  });
  if(!sorted.length)return;
  const closest=sorted[0].team;
  let count=0;
  for(const s of sorted){
    if(s.team===closest){
      const d=Math.sqrt((s.x-TARGET_R-10)**2+(s.y-TARGET_Y)**2);
      if(d<TARGET_R)count++;
    }else break;
  }
  if(closest==='red')redScore+=count;else blueScore+=count;
  stones=[];
}

function endGame(){
  const ol=document.getElementById('overlay');
  const title=document.getElementById('olTitle');
  if(redScore>blueScore){title.textContent='🔴 红方胜利！';title.style.color='#f55'}
  else if(blueScore>redScore){title.textContent='🔵 蓝方胜利！';title.style.color='#55f'}
  else{title.textContent='🤝 平局！';title.style.color='#888'}
  document.getElementById('olMsg').textContent=`红 ${redScore} : ${blueScore} 蓝`;
  ol.classList.add('show');
}

function render(){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
  // ice surface
  ctx.fillStyle='#1a2a4a';ctx.fillRect(5,5,W-10,H-10);
  // target
  const tx=TARGET_R+10,ty=TARGET_Y;
  for(let r=TARGET_R;r>0;r-=TARGET_R/4){
    const colors=['#fff','#5bf','#f55','#ffd700'];
    ctx.fillStyle=colors[Math.floor((TARGET_R-r)/(TARGET_R/4))];
    ctx.beginPath();ctx.arc(tx,ty,r,0,Math.PI*2);ctx.fill();
  }
  // stones
  for(const s of stones){
    const grad=ctx.createRadialGradient(s.x-3,s.y-3,2,s.x,s.y,s.r);
    if(s.team==='red'){
      grad.addColorStop(0,'#ff6b6b');grad.addColorStop(1,'#c0392b');
    }else{
      grad.addColorStop(0,'#6bb5ff');grad.addColorStop(1,'#2980b9');
    }
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.stroke();
  }
  // aim line
  if(aiming){
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.setLineDash([5,5]);
    ctx.beginPath();ctx.moveTo(W/2,H-80);ctx.lineTo(aimX,aimY);ctx.stroke();
    ctx.setLineDash([]);
    // power indicator
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='12px sans-serif';
    ctx.fillText(`力量: ${Math.floor(aimPower)}`,10,H-10);
  }
}

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  aimX=(e.clientX-rect.left)*(W/rect.width);
  aimY=(e.clientY-rect.top)*(H/rect.height);
  aimPower=Math.max(2,Math.min(15,(H-aimY)/30));
  if(aiming)render();
});

canvas.addEventListener('click',throwStone);

function updateInfo(){
  document.getElementById('redScore').textContent=redScore;
  document.getElementById('blueScore').textContent=blueScore;
  document.getElementById('round').textContent=Math.min(round,4);
}

function loop(){update();render();requestAnimationFrame(loop)}

newGame();loop();
</script>
</body>
</html>

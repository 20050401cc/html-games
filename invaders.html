<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👾 太空侵略者</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080810;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#c8d0e0}
h1{font-size:28px;color:#0ff;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#0ff;font-weight:bold}
canvas{border:2px solid #1a2a3a;border-radius:8px;box-shadow:0 0 30px rgba(0,255,255,0.1);cursor:none}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h2{font-size:32px;margin-bottom:8px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;background:#0ff;color:#111;border:none;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<h1>👾 太空侵略者</h1>
<div id="info">
  <div>分数: <span class="val" id="score">0</span></div>
  <div>生命: <span class="val" id="lives">3</span></div>
  <div>波次: <span class="val" id="wave">1</span></div>
  <div>最高: <span class="val" id="best">0</span></div>
</div>
<canvas id="game"></canvas>
<div id="overlay">
  <h2 id="olTitle">💀 游戏结束</h2>
  <p id="olMsg"></p>
  <button onclick="init()">再来一次</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=500,H=600;
canvas.width=W;canvas.height=H;

let ship,aliens,bullets,alienBullets,particles,score,lives,wave,alive,keys,shootCD,alienDir,alienDrop,alienSpeed,shootTimer;

const ALIEN_ROWS=5,ALIEN_COLS=8,ALIEN_W=32,ALIEN_H=24,ALIEN_GAP=8;
const ALIEN_SCORES=[30,20,20,10,10];
const ALIEN_COLORS=['#f0f','#f55','#fa0','#0f0','#0ff'];

const best=parseInt(localStorage.getItem('invaders_best')||'0');
document.getElementById('best').textContent=best;

function init(){
  ship={x:W/2,y:H-40,w:36,h:20};
  score=0;lives=3;wave=1;alive=true;
  keys={};shootCD=0;alienDir=1;alienDrop=0;alienSpeed=0.5;
  bullets=[];alienBullets=[];particles=[];
  createAliens();
  document.getElementById('overlay').classList.remove('show');
  render();
}

function createAliens(){
  aliens=[];
  const startX=(W-(ALIEN_COLS*(ALIEN_W+ALIEN_GAP)))/2;
  for(let r=0;r<ALIEN_ROWS;r++){
    for(let c=0;c<ALIEN_COLS;c++){
      aliens.push({x:startX+c*(ALIEN_W+ALIEN_GAP),y:40+r*(ALIEN_H+ALIEN_GAP),w:ALIEN_W,h:ALIEN_H,row:r,alive:true,anim:0});
    }
  }
}

function spawnParticles(x,y,color,n=6){
  for(let i=0;i<n;i++){
    particles.push({x,y,dx:(Math.random()-0.5)*6,dy:(Math.random()-0.5)*6,life:25,color,r:Math.random()*3+1});
  }
}

let lastTime=0;
function loop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.033);lastTime=ts;
  if(alive){update();render()}
  requestAnimationFrame(loop);
}

function update(){
  // ship movement
  if(keys['ArrowLeft']||keys['a'])ship.x=Math.max(0,ship.x-5);
  if(keys['ArrowRight']||keys['d'])ship.x=Math.min(W-ship.w,ship.x+5);
  // shoot
  if(shootCD>0)shootCD--;
  if((keys[' ']||keys['ArrowUp'])&&shootCD<=0){
    bullets.push({x:ship.x+ship.w/2-1,y:ship.y,dy:-8});
    shootCD=12;
  }
  // bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.y+=b.dy;
    if(b.y<-10){bullets.splice(i,1);continue}
    // hit alien
    let hit=false;
    for(const a of aliens){
      if(!a.alive)continue;
      if(b.x>a.x&&b.x<a.x+a.w&&b.y>a.y&&b.y<a.y+a.h){
        a.alive=false;hit=true;
        score+=ALIEN_SCORES[a.row];
        spawnParticles(a.x+a.w/2,a.y+a.h/2,ALIEN_COLORS[a.row],10);
        break;
      }
    }
    if(hit)bullets.splice(i,1);
  }
  // alien movement
  let minX=W,maxX=0;
  for(const a of aliens){
    if(!a.alive)continue;
    minX=Math.min(minX,a.x);maxX=Math.max(maxX,a.x+a.w);
  }
  if(maxX+alienSpeed*alienDir>W||minX+alienSpeed*alienDir<0){
    alienDir*=-1;
    for(const a of aliens)a.y+=alienDrop||16;
  }
  for(const a of aliens){
    if(a.alive){a.x+=alienSpeed*alienDir;a.anim++}
  }
  // alien shoot
  shootTimer=(shootTimer||0)+1;
  if(shootTimer>60){
    shootTimer=0;
    const aliveAliens=aliens.filter(a=>a.alive);
    if(aliveAliens.length>0){
      const shooter=aliveAliens[Math.floor(Math.random()*aliveAliens.length)];
      alienBullets.push({x:shooter.x+shooter.w/2,y:shooter.y+shooter.h,dy:3+wave*0.2});
    }
  }
  // alien bullets
  for(let i=alienBullets.length-1;i>=0;i--){
    const b=alienBullets[i];
    b.y+=b.dy;
    if(b.y>H+10){alienBullets.splice(i,1);continue}
    if(b.x>ship.x&&b.x<ship.x+ship.w&&b.y>ship.y&&b.y<ship.y+ship.h){
      alienBullets.splice(i,1);
      lives--;
      spawnParticles(ship.x+ship.w/2,ship.y,'#0ff',15);
      if(lives<=0){die();return}
    }
  }
  // aliens reach bottom
  for(const a of aliens){
    if(a.alive&&a.y+a.h>H-60){die();return}
  }
  // all aliens dead - next wave
  if(aliens.every(a=>!a.alive)){
    wave++;
    alienSpeed=0.5+wave*0.15;
    alienDrop=Math.min(24,16+wave*2);
    createAliens();
  }
  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.dx;p.y+=p.dy;p.dx*=0.96;p.dy*=0.96;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
  document.getElementById('score').textContent=score;
  document.getElementById('lives').textContent=lives;
  document.getElementById('wave').textContent=wave;
}

function die(){
  alive=false;
  if(score>parseInt(localStorage.getItem('invaders_best')||'0')){
    localStorage.setItem('invaders_best',score);
  }
  document.getElementById('olMsg').textContent=`分数: ${score} | 波次: ${wave}`;
  document.getElementById('overlay').classList.add('show');
}

function render(){
  ctx.fillStyle='#080810';ctx.fillRect(0,0,W,H);
  // stars
  for(let i=0;i<40;i++){
    const sx=(i*97+Date.now()/200)%W,sy=(i*53)%H;
    ctx.fillStyle=`rgba(255,255,255,${0.2+Math.sin(Date.now()/500+i)*0.15})`;
    ctx.fillRect(sx,sy,1,1);
  }
  // aliens
  for(const a of aliens){
    if(!a.alive)continue;
    ctx.fillStyle=ALIEN_COLORS[a.row];
    // body
    ctx.fillRect(a.x+4,a.y+4,a.w-8,a.h-8);
    // eyes
    ctx.fillStyle='#fff';
    ctx.fillRect(a.x+8,a.y+8,6,6);
    ctx.fillRect(a.x+a.w-14,a.y+8,6,6);
    ctx.fillStyle='#000';
    ctx.fillRect(a.x+10,a.y+10,3,3);
    ctx.fillRect(a.x+a.w-12,a.y+10,3,3);
    // legs animation
    const legOff=Math.sin(a.anim*0.15)*3;
    ctx.fillStyle=ALIEN_COLORS[a.row];
    ctx.fillRect(a.x+6,a.y+a.h-4+legOff,4,4);
    ctx.fillRect(a.x+a.w-10,a.y+a.h-4-legOff,4,4);
  }
  // ship
  ctx.fillStyle='#0ff';
  ctx.beginPath();
  ctx.moveTo(ship.x+ship.w/2,ship.y);
  ctx.lineTo(ship.x+ship.w,ship.y+ship.h);
  ctx.lineTo(ship.x,ship.y+ship.h);
  ctx.fill();
  ctx.fillStyle='#0aa';
  ctx.fillRect(ship.x+ship.w/2-2,ship.y+4,4,10);
  // bullets
  ctx.fillStyle='#0ff';
  for(const b of bullets){ctx.fillRect(b.x,b.y,2,10)}
  // alien bullets
  ctx.fillStyle='#f55';
  for(const b of alienBullets){
    ctx.fillRect(b.x-1,b.y,2,8);
    ctx.fillStyle='rgba(255,85,85,0.3)';
    ctx.beginPath();ctx.arc(b.x,b.y,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#f55';
  }
  // particles
  for(const p of particles){
    ctx.globalAlpha=p.life/25;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  // ground line
  ctx.fillStyle='#1a2a3a';ctx.fillRect(0,H-8,W,8);
}

document.addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowLeft','ArrowRight',' ','ArrowUp'].includes(e.key))e.preventDefault()});
document.addEventListener('keyup',e=>{keys[e.key]=false});

init();
requestAnimationFrame(loop);
</script>
</body>
</html>

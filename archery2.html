<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 射箭比赛</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#ffd700;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #2a2a3e;border-radius:8px;box-shadow:0 0 30px rgba(255,215,0,0.1);cursor:pointer}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a1a2e;color:#ffd700;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:12px}
</style>
</head>
<body>
<h1>🎯 射箭比赛</h1>
<div id="info">
  <div>分数: <span class="val" id="score">0</span></div>
  <div>箭矢: <span class="val" id="arrows">10</span></div>
  <div>平均: <span class="val" id="avg">-</span></div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <button onclick="newGame()">新游戏</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=500,H=500;
canvas.width=W;canvas.height=H;

const CX=250,CY=200,MAX_R=150;
let shots,score,arrowsLeft,aiming,aimX,aimY,power,wind;

function newGame(){
  shots=[];score=0;arrowsLeft=10;aiming=true;
  aimX=CX;aimY=CY;power=0.5;
  wind=Math.floor(Math.random()*30-15);
  updateInfo();render();
}

function shoot(){
  if(!aiming||arrowsLeft<=0)return;
  // add wind effect and random spread
  const spread=(1-power)*30+5;
  const wx=wind*0.5;
  const x=aimX+wx+(Math.random()-0.5)*spread;
  const y=aimY+(Math.random()-0.5)*spread;
  const dist=Math.sqrt((x-CX)**2+(y-CY)**2);
  let pts=0;
  if(dist<MAX_R*0.05)pts=100; // bullseye
  else if(dist<MAX_R*0.15)pts=50;
  else if(dist<MAX_R*0.3)pts=25;
  else if(dist<MAX_R*0.5)pts=10;
  else if(dist<MAX_R*0.7)pts=5;
  else if(dist<MAX_R)pts=1;
  shots.push({x,y,pts,dist});
  score+=pts;arrowsLeft--;
  wind=Math.floor(Math.random()*30-15);
  aiming=arrowsLeft>0;
  updateInfo();render();
}

function render(){
  ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,W,H);
  // target rings
  const rings=[
    {r:MAX_R,color:'#e67e22',label:'1'},
    {r:MAX_R*0.7,color:'#f1c40f',label:'5'},
    {r:MAX_R*0.5,color:'#3498db',label:'10'},
    {r:MAX_R*0.3,color:'#e74c3c',label:'25'},
    {r:MAX_R*0.15,color:'#2ecc71',label:'50'},
    {r:MAX_R*0.05,color:'#ffd700',label:'100'},
  ];
  for(const ring of rings){
    ctx.fillStyle=ring.color;
    ctx.beginPath();ctx.arc(CX,CY,ring.r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(CX,CY,ring.r,0,Math.PI*2);ctx.stroke();
  }
  // ring labels
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.font='10px sans-serif';ctx.textAlign='center';
  for(const ring of rings){
    ctx.fillText(ring.label,CX+ring.r-12,CY+4);
  }
  // shots
  for(const s of shots){
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath();ctx.arc(s.x+2,s.y+2,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=s.pts>=50?'#ffd700':s.pts>=25?'#f55':s.pts>=10?'#55f':'#888';
    ctx.beginPath();ctx.arc(s.x,s.y,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(s.x,s.y,2,0,Math.PI*2);ctx.fill();
  }
  // aim crosshair
  if(aiming){
    ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(aimX,aimY,20,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(aimX-25,aimY);ctx.lineTo(aimX+25,aimY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(aimX,aimY-25);ctx.lineTo(aimX,aimY+25);ctx.stroke();
    // power bar
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(W-30,H-200,20,150);
    ctx.fillStyle=power>0.7?'#2ecc71':power>0.3?'#f1c40f':'#e74c3c';
    ctx.fillRect(W-30,H-200+150*(1-power),20,150*power);
    ctx.fillStyle='#fff';ctx.font='10px sans-serif';
    ctx.fillText('力量',W-35,H-210);
    // wind indicator
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='12px sans-serif';ctx.textAlign='center';
    ctx.fillText(`风: ${wind>0?'→':'←'} ${Math.abs(wind)}`,W/2,H-20);
    ctx.textAlign='left';
  }
  // score summary
  if(!aiming&&arrowsLeft<=0){
    const avg=shots.length?Math.round(score/shots.length):0;
    ctx.fillStyle='rgba(0,0,0,0.7)';
    ctx.fillRect(W/2-100,H/2-40,200,80);
    ctx.fillStyle='#ffd700';ctx.font='bold 16px sans-serif';ctx.textAlign='center';
    ctx.fillText(`总分: ${score}`,W/2,H/2-10);
    ctx.fillStyle='#fff';ctx.font='14px sans-serif';
    ctx.fillText(`平均: ${avg}/箭`,W/2,H/2+15);
    ctx.textAlign='left';
  }
}

canvas.addEventListener('mousemove',e=>{
  if(!aiming)return;
  const rect=canvas.getBoundingClientRect();
  aimX=(e.clientX-rect.left)*(W/rect.width);
  aimY=(e.clientY-rect.top)*(H/rect.height);
  // power based on distance from center
  const dist=Math.sqrt((aimX-CX)**2+(aimY-CY)**2);
  power=Math.max(0.1,1-dist/MAX_R);
  render();
});

canvas.addEventListener('click',shoot);

function updateInfo(){
  document.getElementById('score').textContent=score;
  document.getElementById('arrows').textContent=arrowsLeft;
  document.getElementById('avg').textContent=shots.length?Math.round(score/shots.length):'-';
}

newGame();
</script>
</body>
</html>

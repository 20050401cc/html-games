<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎪 弹球消除</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#ffd700;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #2a2a3e;border-radius:8px;box-shadow:0 0 30px rgba(255,215,0,0.1);cursor:pointer}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a1a2e;color:#ffd700;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:12px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h2{font-size:32px;margin-bottom:8px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;background:#ffd700;color:#111;border:none;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<h1>🎪 弹球消除</h1>
<div id="info">
  <div>分数: <span class="val" id="score">0</span></div>
  <div>剩余: <span class="val" id="remaining">0</span></div>
  <div>发射: <span class="val" id="shots">0</span></div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <button onclick="newGame()">新游戏</button>
</div>
<div id="overlay">
  <h2 id="olTitle">🎉 过关！</h2>
  <p id="olMsg"></p>
  <button onclick="newGame()">下一关</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=400,H=600;
canvas.width=W;canvas.height=H;

const GRAVITY=0.08;
const ROWS=8,COLS=10,CELL_R=16;
const COLORS=['#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#e67e22'];

let grid,shootBall,balls,particles,score,shots,level,aimX,aimY,gameOver;

function newGame(){
  level=level||1;
  grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  // fill grid
  const colorCount=Math.min(4+Math.floor(level/2),COLORS.length);
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(Math.random()<0.7){
      grid[r][c]={color:COLORS[Math.floor(Math.random()*colorCount)]};
    }
  }
  shootBall={color:COLORS[Math.floor(Math.random()*colorCount)]};
  balls=[];particles=[];score=0;shots=0;gameOver=false;
  aimX=W/2;aimY=0;
  document.getElementById('overlay').classList.remove('show');
  updateInfo();render();
}

function shoot(){
  if(gameOver)return;
  const dx=aimX-W/2,dy=aimY-H;
  const d=Math.sqrt(dx*dx+dy*dy)||1;
  balls.push({x:W/2,y:H-30,vx:dx/d*8,vy:dy/d*8,color:shootBall.color});
  shots++;
  // next ball
  shootBall={color:COLORS[Math.floor(Math.random()*Math.min(4+Math.floor(level/2),COLORS.length))]};
  updateInfo();
}

function update(){
  // update balls
  for(let i=balls.length-1;i>=0;i--){
    const b=balls[i];
    b.x+=b.vx;b.y+=b.vy;
    b.vy+=GRAVITY;
    // wall bounce
    if(b.x-b.r<0){b.x=b.r;b.vx=Math.abs(b.vx)}
    if(b.x+b.r>W){b.x=W-b.r;b.vx=-Math.abs(b.vx)}
    if(b.y-b.r<0){b.y=b.r;b.vy=Math.abs(b.vy)}
    // grid collision
    const col=Math.floor(b.x/(CELL_R*2));
    const row=Math.floor(b.y/(CELL_R*2));
    if(row>=0&&row<ROWS&&col>=0&&col<COLS){
      if(grid[row][col]){
        // place ball
        const snapX=col*(CELL_R*2)+CELL_R;
        const snapY=row*(CELL_R*2)+CELL_R;
        // find nearest empty cell
        let bestCell=null,bestDist=Infinity;
        for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
          if(grid[r][c])continue;
          const cx=c*(CELL_R*2)+CELL_R,cy=r*(CELL_R*2)+CELL_R;
          const d=Math.sqrt((b.x-cx)**2+(b.y-cy)**2);
          if(d<bestDist){bestDist=d;bestCell={r,c}}
        }
        if(bestCell){
          grid[bestCell.r][bestCell.c]={color:b.color};
          // check matches
          checkMatches(bestCell.r,bestCell.c,b.color);
        }
        balls.splice(i,1);
        continue;
      }
    }
    // off screen
    if(b.y>H+20)balls.splice(i,1);
  }
  // particles
  for(let i=particles.length-1;i>=0;i--){
    particles[i].x+=particles[i].dx;particles[i].y+=particles[i].dy;
    particles[i].dy+=0.1;particles[i].life--;
    if(particles[i].life<=0)particles.splice(i,1);
  }
  // check if all cleared
  let remaining=0;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(grid[r][c])remaining++;
  document.getElementById('remaining').textContent=remaining;
  if(remaining===0&&!gameOver){
    gameOver=true;
    level++;
    document.getElementById('olMsg').textContent=`分数: ${score} | 发射: ${shots}`;
    document.getElementById('overlay').classList.add('show');
  }
}

function checkMatches(r,c,color){
  const connected=[];
  const visited=Array.from({length:ROWS},()=>Array(COLS).fill(false));
  const stack=[[r,c]];
  while(stack.length){
    const[cr,cc]=stack.pop();
    if(cr<0||cr>=ROWS||cc<0||cc>=COLS||visited[cr][cc])continue;
    if(!grid[cr][cc]||grid[cr][cc].color!==color)continue;
    visited[cr][cc]=true;connected.push([cr,cc]);
    stack.push([cr-1,cc],[cr+1,cc],[cr,cc-1],[cr,cc+1]);
  }
  if(connected.length>=3){
    for(const[cr,cc]of connected){
      spawnParticles(cc*(CELL_R*2)+CELL_R,cr*(CELL_R*2)+CELL_R,grid[cr][cc].color,5);
      grid[cr][cc]=null;
    }
    score+=connected.length*10;
    // gravity - drop floating bubbles
    dropFloating();
  }
}

function dropFloating(){
  // find connected to top
  const connected=Array.from({length:ROWS},()=>Array(COLS).fill(false));
  for(let c=0;c<COLS;c++){
    if(grid[0][c]&&!connected[0][c]){
      const stack=[[0,c]];
      while(stack.length){
        const[r,cc]=stack.pop();
        if(r<0||r>=ROWS||cc<0||cc>=COLS||connected[r][cc]||!grid[r][cc])continue;
        connected[r][cc]=true;
        stack.push([r-1,cc],[r+1,cc],[r,cc-1],[r,cc+1]);
      }
    }
  }
  // remove floating
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(grid[r][c]&&!connected[r][c]){
      spawnParticles(c*(CELL_R*2)+CELL_R,r*(CELL_R*2)+CELL_R,grid[r][c].color,3);
      score+=5;grid[r][c]=null;
    }
  }
}

function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++)particles.push({x,y,dx:(Math.random()-0.5)*6,dy:(Math.random()-0.5)*6,life:20,color,r:Math.random()*3+1});
}

function render(){
  ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,W,H);
  // grid bubbles
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(!grid[r][c])continue;
    const x=c*(CELL_R*2)+CELL_R,y=r*(CELL_R*2)+CELL_R;
    const grad=ctx.createRadialGradient(x-3,y-3,2,x,y,CELL_R);
    grad.addColorStop(0,'#fff');grad.addColorStop(0.3,grid[r][c].color);grad.addColorStop(1,grid[r][c].color+'80');
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.arc(x,y,CELL_R-2,0,Math.PI*2);ctx.fill();
  }
  // flying balls
  for(const b of balls){
    ctx.fillStyle=b.color;
    ctx.beginPath();ctx.arc(b.x,b.y,CELL_R-2,0,Math.PI*2);ctx.fill();
  }
  // aim line
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;ctx.setLineDash([5,5]);
  ctx.beginPath();ctx.moveTo(W/2,H-30);ctx.lineTo(aimX,aimY);ctx.stroke();
  ctx.setLineDash([]);
  // shooter
  const grad=ctx.createRadialGradient(W/2-3,H-33,2,W/2,H-30,CELL_R);
  grad.addColorStop(0,'#fff');grad.addColorStop(0.3,shootBall.color);grad.addColorStop(1,shootBall.color+'80');
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.arc(W/2,H-30,CELL_R-2,0,Math.PI*2);ctx.fill();
  // particles
  for(const p of particles){
    ctx.globalAlpha=p.life/20;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  aimX=(e.clientX-rect.left)*(W/rect.width);
  aimY=(e.clientY-rect.top)*(H/rect.height);
  render();
});

canvas.addEventListener('click',shoot);

function updateInfo(){
  document.getElementById('score').textContent=score;
  document.getElementById('shots').textContent=shots;
}

function loop(){update();render();requestAnimationFrame(loop)}

newGame();loop();
</script>
</body>
</html>

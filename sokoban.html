<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📦 推箱子</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0e0e18;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#f80;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #2a2a3a;border-radius:8px;box-shadow:0 0 30px rgba(255,136,0,0.1)}
#controls{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
#controls button{padding:6px 16px;background:#1a1a2e;color:#f80;border:1px solid #2a2a3a;border-radius:6px;cursor:pointer;font-size:12px}
#msg{margin-top:8px;font-size:14px;color:#ffd700;min-height:20px}
#mobile{display:none;margin-top:10px;gap:4px}
#mobile button{width:50px;height:50px;font-size:20px;background:#1a1a2e;border:1px solid #2a2a3a;border-radius:8px;color:#f80;cursor:pointer}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h2{font-size:32px;color:#ffd700;margin-bottom:8px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;background:#f80;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer}
@media(max-width:500px){#mobile{display:grid;grid-template-columns:repeat(3,50px);grid-template-rows:repeat(2,50px);justify-content:center}}
</style>
</head>
<body>
<h1>📦 推箱子</h1>
<div id="info">
  <div>关卡: <span class="val" id="level">1</span></div>
  <div>步数: <span class="val" id="moves">0</span></div>
  <div>推箱: <span class="val" id="pushes">0</span></div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <button onclick="undo()">撤销 (Z)</button>
  <button onclick="resetLevel()">重来 (R)</button>
  <button onclick="prevLevel()">上一关</button>
  <button onclick="nextLevel()">下一关</button>
</div>
<div id="mobile">
  <div></div><button onclick="move(0,-1)">↑</button><div></div>
  <button onclick="move(-1,0)">←</button><button onclick="move(0,1)">↓</button><button onclick="move(1,0)">→</button>
</div>
<div id="msg"></div>
<div id="overlay">
  <h2>🎉 过关！</h2>
  <p id="olMsg"></p>
  <button onclick="nextLevel()">下一关</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const CELL=40;
const W=0,F=1,B=2,T=3,P=4; // Wall,Floor,Box,Target,Player

const LEVELS=[
  // Level 1 - tutorial
  {map:[
    [W,W,W,W,W,W,0,0,0,0],
    [W,F,F,F,W,W,0,0,0,0],
    [W,F,B,F,F,W,0,0,0,0],
    [W,F,F,B,F,W,0,0,0,0],
    [W,W,F,F,P,W,0,0,0,0],
    [W,W,W,W,W,W,0,0,0,0],
  ],targets:[[2,2],[3,2]]},
  // Level 2
  {map:[
    [0,W,W,W,W,0,0,0],
    [W,W,F,F,W,0,0,0],
    [W,F,B,F,W,0,0,0],
    [W,F,F,B,W,W,W,W],
    [W,W,F,F,F,F,P,W],
    [0,W,F,F,F,F,F,W],
    [0,W,T,T,W,F,W,0],
    [0,W,W,W,W,W,W,0],
  ],targets:[[2,6],[3,6]]},
  // Level 3
  {map:[
    [W,W,W,W,W,0,0],
    [W,F,F,F,W,0,0],
    [W,F,B,F,W,W,W],
    [W,F,B,P,F,F,W],
    [W,F,B,F,F,F,W],
    [W,W,W,F,F,W,0],
    [0,0,W,T,T,W,0],
    [0,0,W,T,W,W,0],
    [0,0,W,W,W,0,0],
  ],targets:[[2,6],[3,6],[3,7]]},
  // Level 4
  {map:[
    [0,W,W,W,W,0],
    [W,W,F,F,W,0],
    [W,F,B,F,W,0],
    [W,F,F,B,W,W,W],
    [W,W,F,B,F,F,W],
    [0,W,F,F,F,F,W],
    [0,W,F,F,F,F,W],
    [0,W,W,T,T,W,W],
    [0,0,W,T,P,W,0],
    [0,0,W,W,W,W,0],
  ],targets:[[2,7],[3,7],[3,8]]},
  // Level 5
  {map:[
    [W,W,W,W,W,W,W],
    [W,F,F,F,F,F,W],
    [W,F,W,B,B,W,W],
    [W,F,F,B,F,F,W],
    [W,F,B,F,B,F,W],
    [W,F,F,B,F,F,W],
    [W,W,F,F,F,W,W],
    [0,W,T,T,T,W,0],
    [0,W,T,P,T,W,0],
    [0,W,W,W,W,W,0],
  ],targets:[[1,7],[2,7],[3,7],[1,8],[3,8]]},
  // Levels 6-20 (generated procedurally from patterns)
];

// Generate more levels procedurally
for(let i=LEVELS.length;i<20;i++){
  LEVELS.push(generateLevel(5+Math.floor(i/3)));
}

function generateLevel(boxCount){
  const size=7+Math.floor(Math.random()*4);
  const m=Array.from({length:size},()=>Array(size).fill(W));
  // carve rooms
  const rooms=[];
  for(let i=0;i<3+Math.floor(Math.random()*2);i++){
    const rw=3+Math.floor(Math.random()*3),rh=3+Math.floor(Math.random()*3);
    const rx=1+Math.floor(Math.random()*(size-rw-2)),ry=1+Math.floor(Math.random()*(size-rh-2));
    rooms.push({x:rx,y:ry,w:rw,h:rh});
    for(let dy=0;dy<rh;dy++)for(let dx=0;dx<rw;dx++)m[ry+dy][rx+dx]=F;
  }
  // connect rooms
  for(let i=1;i<rooms.length;i++){
    const a=rooms[i-1],b=rooms[i];
    let cx=Math.floor(a.x+a.w/2),cy=Math.floor(a.y+a.h/2);
    const tx=Math.floor(b.x+b.w/2),ty=Math.floor(b.y+b.h/2);
    while(cx!==tx){m[cy][cx]=F;cx+=cx<tx?1:-1}
    while(cy!==ty){m[cy][cx]=F;cy+=cy<ty?1:-1}
  }
  // place player
  const pr=rooms[0];
  const px=Math.floor(pr.x+pr.w/2),py=Math.floor(pr.y+pr.h/2);
  m[py][px]=P;
  // place boxes and targets
  const targets=[];
  const freeCells=[];
  for(let y=1;y<size-1;y++)for(let x=1;x<size-1;x++){
    if(m[y][x]===F&&!(x===px&&y===py))freeCells.push([x,y]);
  }
  const shuffled=freeCells.sort(()=>Math.random()-0.5);
  const bc=Math.min(boxCount,Math.floor(shuffled.length/2));
  for(let i=0;i<bc;i++){
    const[tx,ty]=shuffled[i*2];
    const[bx,by]=shuffled[i*2+1];
    m[by][bx]=B;
    targets.push([tx,ty]);
  }
  return{map:m,targets};
}

let grid,player,targets,moves,pushes,level,history;

function loadLevel(n){
  level=clamp(n,0,LEVELS.length-1);
  const lv=LEVELS[level];
  grid=lv.map.map(r=>[...r]);
  targets=lv.targets;
  history=[];moves=0;pushes=0;
  // find player
  for(let y=0;y<grid.length;y++)for(let x=0;x<grid[y].length;x++){
    if(grid[y][x]===P){player={x,y};grid[y][x]=F}
  }
  canvas.width=grid[0].length*CELL;
  canvas.height=grid.length*CELL;
  render();
  updateInfo();
}

function move(dx,dy){
  const nx=player.x+dx,ny=player.y+dy;
  if(nx<0||nx>=grid[0].length||ny<0||ny>=grid.length)return;
  if(grid[ny][nx]===W)return;
  // box push
  if(grid[ny][nx]===B){
    const bx=nx+dx,by=ny+dy;
    if(bx<0||bx>=grid[0].length||by<0||by>=grid.length)return;
    if(grid[by][bx]===W||grid[by][bx]===B)return;
    // save state
    history.push({px:player.x,py:player.y,grid:grid.map(r=>[...r]),moves,pushes});
    grid[ny][nx]=F;grid[by][bx]=B;
    pushes++;
  }else{
    history.push({px:player.x,py:player.y,grid:grid.map(r=>[...r]),moves,pushes});
  }
  player.x=nx;player.y=ny;
  moves++;
  render();updateInfo();
  checkWin();
}

function undo(){
  if(!history.length)return;
  const h=history.pop();
  player.x=h.px;player.y=h.py;
  grid=h.grid;moves=h.moves;pushes=h.pushes;
  render();updateInfo();
}

function resetLevel(){loadLevel(level)}
function prevLevel(){loadLevel(level-1)}
function nextLevel(){loadLevel(level+1);document.getElementById('overlay').classList.remove('show')}

function checkWin(){
  for(const[tx,ty]of targets){
    if(grid[ty][tx]!==B)return;
  }
  document.getElementById('olMsg').textContent=`步数: ${moves} | 推箱: ${pushes}`;
  document.getElementById('overlay').classList.add('show');
}

function render(){
  ctx.fillStyle='#0e0e18';ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let y=0;y<grid.length;y++){
    for(let x=0;x<grid[y].length;x++){
      const px=x*CELL,py=y*CELL;
      const tile=grid[y][x];
      if(tile===W){
        ctx.fillStyle='#2a2a3a';
        ctx.beginPath();ctx.roundRect(px+1,py+1,CELL-2,CELL-2,4);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(px+2,py+2,CELL-4,6);
      }else if(tile===F){
        ctx.fillStyle='#181828';
        ctx.fillRect(px+1,py+1,CELL-2,CELL-2);
      }else if(tile===B){
        // check if on target
        const onTarget=targets.some(([tx,ty])=>tx===x&&ty===y);
        ctx.fillStyle=onTarget?'#2a8':'#a80';
        ctx.beginPath();ctx.roundRect(px+4,py+4,CELL-8,CELL-8,6);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(px+6,py+6,CELL-12,8);
        ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(px+6,py+CELL-14,CELL-12,8);
        ctx.font='20px serif';ctx.textAlign='center';
        ctx.fillText('📦',px+CELL/2,py+CELL/2+7);
      }
      // target markers
      if(targets.some(([tx,ty])=>tx===x&&ty===y)&&tile!==B){
        ctx.strokeStyle='rgba(255,136,0,0.4)';ctx.lineWidth=2;
        ctx.beginPath();ctx.roundRect(px+8,py+8,CELL-16,CELL-16,4);ctx.stroke();
        ctx.fillStyle='rgba(255,136,0,0.15)';
        ctx.beginPath();ctx.arc(px+CELL/2,py+CELL/2,6,0,Math.PI*2);ctx.fill();
      }
    }
  }
  // player
  ctx.font='22px serif';ctx.textAlign='center';
  ctx.fillText('🧑',player.x*CELL+CELL/2,player.y*CELL+CELL/2+8);
  ctx.textAlign='left';
}

function updateInfo(){
  document.getElementById('level').textContent=level+1;
  document.getElementById('moves').textContent=moves;
  document.getElementById('pushes').textContent=pushes;
}

document.addEventListener('keydown',e=>{
  switch(e.key){
    case'ArrowUp':case'w':e.preventDefault();move(0,-1);break;
    case'ArrowDown':case's':e.preventDefault();move(0,1);break;
    case'ArrowLeft':case'a':e.preventDefault();move(-1,0);break;
    case'ArrowRight':case'd':e.preventDefault();move(1,0);break;
    case'z':case'Z':undo();break;
    case'r':case'R':resetLevel();break;
  }
});

function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}

loadLevel(0);
</script>
</body>
</html>

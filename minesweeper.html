<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💣 扫雷</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0e0e18;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#ffd700;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
#board{display:inline-grid;gap:1px;background:#2a2a3a;border:2px solid #2a2a3a;border-radius:6px;padding:2px;box-shadow:0 0 30px rgba(255,215,0,0.1)}
.cell{width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;cursor:pointer;transition:background .1s;border-radius:2px}
.cell.hidden{background:#3a3a4a}
.cell.hidden:hover{background:#4a4a5a}
.cell.revealed{background:#1a1a28}
.cell.mine{background:#a33}
.cell.flagged{background:#3a4a3a}
.c1{color:#55f}.c2{color:#2a2}.c3{color:#f33}.c4{color:#22a}.c5{color:#a22}.c6{color:#2aa}.c7{color:#333}.c8{color:#888}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a1a2e;color:#ffd700;border:1px solid #2a2a3a;border-radius:6px;cursor:pointer;font-size:12px}
#controls select{padding:4px 8px;background:#1a1a2e;color:#ffd700;border:1px solid #2a2a3a;border-radius:4px;font-size:12px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h2{font-size:32px;margin-bottom:8px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;background:#ffd700;color:#111;border:none;border-radius:8px;font-size:16px;cursor:pointer}
#timer{color:#ff6b6b}
</style>
</head>
<body>
<h1>💣 扫雷</h1>
<div id="info">
  <div>💣 <span class="val" id="mines">10</span></div>
  <div>🚩 <span class="val" id="flags">0</span></div>
  <div>⏱️ <span class="val" id="timer">0</span></div>
  <div>最高: <span class="val" id="best">-</span></div>
</div>
<div id="board"></div>
<div id="controls">
  <select id="difficulty" onchange="newGame()">
    <option value="easy">简单 9×9</option>
    <option value="medium">中等 16×16</option>
    <option value="hard">困难 16×30</option>
  </select>
  <button onclick="newGame()">新游戏</button>
</div>
<div id="overlay">
  <h2 id="olTitle">💀 踩雷了！</h2>
  <p id="olMsg"></p>
  <button onclick="newGame()">再来一局</button>
</div>
<script>
const DIFFS={easy:{r:9,c:9,m:10},medium:{r:16,c:16,m:40},hard:{r:16,c:30,m:99}};
let grid,rows,cols,mineCount,flagCount,revealedCount,alive,started,startTime,timerInterval;

function newGame(){
  const diff=DIFFS[document.getElementById('difficulty').value];
  rows=diff.r;cols=diff.c;mineCount=diff.m;
  flagCount=0;revealedCount=0;alive=true;started=false;
  clearInterval(timerInterval);document.getElementById('timer').textContent='0';
  document.getElementById('overlay').classList.remove('show');
  // init grid
  grid=Array.from({length:rows},()=>Array.from({length:cols},()=>({mine:false,revealed:false,flagged:false,adjacent:0})));
  // place mines
  let placed=0;
  while(placed<mineCount){
    const r=Math.floor(Math.random()*rows),c=Math.floor(Math.random()*cols);
    if(!grid[r][c].mine){grid[r][c].mine=true;placed++}
  }
  // calc adjacent
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    if(grid[r][c].mine)continue;
    let count=0;
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&grid[nr][nc].mine)count++;
    }
    grid[r][c].adjacent=count;
  }
  renderBoard();
  updateInfo();
}

function renderBoard(){
  const board=document.getElementById('board');
  board.style.gridTemplateColumns=`repeat(${cols},28px)`;
  board.innerHTML='';
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=document.createElement('div');
      cell.className='cell';
      cell.dataset.r=r;cell.dataset.c=c;
      const g=grid[r][c];
      if(g.revealed){
        cell.classList.add('revealed');
        if(g.mine){cell.classList.add('mine');cell.textContent='💣'}
        else if(g.adjacent>0){cell.textContent=g.adjacent;cell.classList.add('c'+g.adjacent)}
      }else{
        cell.classList.add('hidden');
        if(g.flagged)cell.textContent='🚩';
      }
      cell.addEventListener('click',()=>reveal(r,c));
      cell.addEventListener('contextmenu',e=>{e.preventDefault();toggleFlag(r,c)});
      board.appendChild(cell);
    }
  }
}

function reveal(r,c){
  if(!alive)return;
  const g=grid[r][c];
  if(g.revealed||g.flagged)return;
  if(!started){
    started=true;
    startTime=Date.now();
    timerInterval=setInterval(()=>{
      document.getElementById('timer').textContent=Math.floor((Date.now()-startTime)/1000);
    },1000);
  }
  g.revealed=true;revealedCount++;
  if(g.mine){
    alive=false;
    clearInterval(timerInterval);
    // reveal all mines
    for(let rr=0;rr<rows;rr++)for(let cc=0;cc<cols;cc++){
      if(grid[rr][cc].mine)grid[rr][cc].revealed=true;
    }
    renderBoard();
    document.getElementById('olTitle').textContent='💀 踩雷了！';
    document.getElementById('olTitle').style.color='#e74c3c';
    document.getElementById('olMsg').textContent=`用时: ${document.getElementById('timer').textContent}秒`;
    document.getElementById('overlay').classList.add('show');
    return;
  }
  // flood fill if 0
  if(g.adjacent===0){
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&!grid[nr][nc].revealed)reveal(nr,nc);
    }
  }
  renderBoard();
  checkWin();
}

function toggleFlag(r,c){
  if(!alive)return;
  const g=grid[r][c];
  if(g.revealed)return;
  g.flagged=!g.flagged;
  flagCount+=g.flagged?1:-1;
  renderBoard();updateInfo();
  checkWin();
}

function checkWin(){
  const totalSafe=rows*cols-mineCount;
  if(revealedCount>=totalSafe){
    alive=false;
    clearInterval(timerInterval);
    const time=Math.floor((Date.now()-startTime)/1000);
    const bestKey=`minesweeper_${document.getElementById('difficulty').value}`;
    const prevBest=localStorage.getItem(bestKey);
    if(!prevBest||time<parseInt(prevBest)){
      localStorage.setItem(bestKey,time);
      document.getElementById('best').textContent=time+'秒 🏆';
    }
    document.getElementById('olTitle').textContent='🎉 恭喜过关！';
    document.getElementById('olTitle').style.color='#ffd700';
    document.getElementById('olMsg').textContent=`用时: ${time}秒`;
    document.getElementById('overlay').classList.add('show');
  }
}

function updateInfo(){
  document.getElementById('mines').textContent=mineCount;
  document.getElementById('flags').textContent=flagCount;
  // update best
  const bestKey=`minesweeper_${document.getElementById('difficulty').value}`;
  const best=localStorage.getItem(bestKey);
  document.getElementById('best').textContent=best?best+'秒':'-';
}

newGame();
</script>
</body>
</html>

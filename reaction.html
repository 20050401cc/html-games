<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ 反应测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0;transition:background .3s}
h1{font-size:28px;color:#ffd700;margin-bottom:12px}
#area{width:400px;height:300px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:all .3s;background:#1a1a2e;border:2px solid #2a2a3e;color:#888}
#area.waiting{background:#c0392b;color:#fff;border-color:#e74c3c}
#area.ready{background:#27ae60;color:#fff;border-color:#2ecc71}
#area.result{background:#2980b9;color:#fff;border-color:#3498db}
#area.tooearly{background:#8e44ad;color:#fff;border-color:#9b59b6}
#stats{margin-top:16px;display:flex;gap:16px}
.stat{padding:10px 16px;background:#12121e;border-radius:8px;text-align:center}
.stat .label{font-size:10px;color:#888;text-transform:uppercase}
.stat .val{font-size:22px;color:#ffd700;font-weight:bold}
#history{margin-top:12px;display:flex;gap:4px;flex-wrap:wrap;justify-content:center;max-width:400px}
#history .dot{width:8px;height:8px;border-radius:50%}
#controls{margin-top:12px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a1a2e;color:#ffd700;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:12px}
</style>
</head>
<body>
<h1>⚡ 反应速度测试</h1>
<div id="area" onclick="handleClick()">点击开始测试</div>
<div id="stats">
  <div class="stat"><div class="label">平均</div><div class="val" id="avg">-</div></div>
  <div class="stat"><div class="label">最快</div><div class="val" id="best">-</div></div>
  <div class="stat"><div class="label">次数</div><div class="val" id="count">0</div></div>
</div>
<div id="history"></div>
<div id="controls">
  <button onclick="reset()">重置</button>
</div>
<script>
let state='idle',results=[],startTime,timeoutId;
const area=document.getElementById('area');

function handleClick(){
  if(state==='idle'||state==='result'||state==='tooearly'){
    startTest();
  }else if(state==='waiting'){
    clearTimeout(timeoutId);
    state='tooearly';
    area.className='tooearly';
    area.textContent='太早了！点击重试';
  }else if(state==='ready'){
    const elapsed=Date.now()-startTime;
    results.push(elapsed);
    state='result';
    area.className='result';
    const rating=elapsed<200?'⚡ 闪电反应！':elapsed<250?'🔥 很快！':elapsed<300?'👍 不错':elapsed<400?'😐 一般':'🐌 需要练习';
    area.textContent=`${elapsed}ms — ${rating}`;
    updateStats();
  }
}

function startTest(){
  state='waiting';
  area.className='waiting';
  area.textContent='变绿后立即点击...';
  const delay=1000+Math.random()*4000;
  timeoutId=setTimeout(()=>{
    state='ready';
    area.className='ready';
    area.textContent='现在点击！';
    startTime=Date.now();
  },delay);
}

function updateStats(){
  if(!results.length)return;
  const avg=Math.round(results.reduce((a,b)=>a+b)/results.length);
  const best=Math.min(...results);
  document.getElementById('avg').textContent=avg+'ms';
  document.getElementById('best').textContent=best+'ms';
  document.getElementById('count').textContent=results.length;
  // history dots
  const hist=document.getElementById('history');
  hist.innerHTML=results.map(r=>{
    const color=r<200?'#2ecc71':r<250?'#f1c40f':r<300?'#e67e22':'#e74c3c';
    return`<div class="dot" style="background:${color}" title="${r}ms"></div>`;
  }).join('');
}

function reset(){results=[];state='idle';area.className='';area.textContent='点击开始测试';document.getElementById('avg').textContent='-';document.getElementById('best').textContent='-';document.getElementById('count').textContent='0';document.getElementById('history').innerHTML=''}
</script>
</body>
</html>

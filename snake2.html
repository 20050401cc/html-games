<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎪 贪吃蛇2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#4a4;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #2a3a2a;border-radius:8px;box-shadow:0 0 30px rgba(74,170,74,0.1)}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a2a1a;color:#4a4;border:1px solid #2a3a2a;border-radius:6px;cursor:pointer;font-size:12px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h2{font-size:32px;margin-bottom:8px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;background:#4a4;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<h1>🎪 贪吃蛇2</h1>
<div id="info">
  <div>分数: <span class="val" id="score">0</span></div>
  <div>长度: <span class="val" id="len">3</span></div>
  <div>速度: <span class="val" id="speed">1</span></div>
  <div>最高: <span class="val" id="best">0</span></div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <button onclick="newGame()">新游戏</button>
  <select id="mode"><option value="normal">普通</option><option value="wrap">穿墙</option><option value="speed">加速</option></select>
</div>
<div id="overlay">
  <h2 id="olTitle">💀 游戏结束</h2>
  <p id="olMsg"></p>
  <button onclick="newGame()">再来一次</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const GRID=16,COLS=30,ROWS=25;
canvas.width=COLS*GRID;canvas.height=ROWS*GRID;

let snake,dir,food,specialFood,score,alive,tickInterval,speed,particles;
let best=parseInt(localStorage.getItem('snake2_best')||'0');
document.getElementById('best').textContent=best;

function init(){
  snake=[{x:15,y:12},{x:14,y:12},{x:13,y:12}];
  dir={x:1,y:0};score=0;speed=1;alive=true;particles=[];
  spawnFood();specialFood=null;
  clearInterval(tickInterval);
  tickInterval=setInterval(tick,120);
  document.getElementById('overlay').classList.remove('show');
  render();updateInfo();
}

function spawnFood(){
  do{food={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}}
  while(snake.some(s=>s.x===food.x&&s.y===food.y));
  // chance for special food
  if(Math.random()<0.15&&!specialFood){
    do{specialFood={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS),timer:200}}
    while(snake.some(s=>s.x===specialFood.x&&s.y===specialFood.y)||(specialFood.x===food.x&&specialFood.y===food.y));
  }
}

function tick(){
  if(!alive)return;
  const mode=document.getElementById('mode').value;
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  // wall handling
  if(mode==='wrap'){
    if(head.x<0)head.x=COLS-1;if(head.x>=COLS)head.x=0;
    if(head.y<0)head.y=ROWS-1;if(head.y>=ROWS)head.y=0;
  }else{
    if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS){die();return}
  }
  // self collision
  if(snake.some(s=>s.x===head.x&&s.y===head.y)){die();return}
  snake.unshift(head);
  let ate=false;
  // eat food
  if(head.x===food.x&&head.y===food.y){
    score+=10;ate=true;spawnFood();
    // speed up in speed mode
    if(mode==='speed'){speed=Math.min(5,1+Math.floor(score/50));clearInterval(tickInterval);tickInterval=setInterval(tick,Math.max(40,120-speed*15))}
  }
  // eat special food
  if(specialFood&&head.x===specialFood.x&&head.y===specialFood.y){
    score+=50;ate=true;specialFood=null;
    spawnParticles(head.x*GRID+GRID/2,head.y*GRID+GRID/2,'#ffd700',10);
  }
  if(!ate)snake.pop();
  // special food timer
  if(specialFood){specialFood.timer--;if(specialFood.timer<=0)specialFood=null}
  // particles
  for(let i=particles.length-1;i>=0;i--){
    particles[i].x+=particles[i].dx;particles[i].y+=particles[i].dy;particles[i].life--;
    if(particles[i].life<=0)particles.splice(i,1);
  }
  updateInfo();render();
}

function die(){
  alive=false;clearInterval(tickInterval);
  if(score>best){best=score;localStorage.setItem('snake2_best',best);document.getElementById('best').textContent=best}
  document.getElementById('olTitle').textContent='💀 撞到了！';
  document.getElementById('olMsg').textContent=`分数: ${score} | 长度: ${snake.length}`;
  document.getElementById('overlay').classList.add('show');
}

function render(){
  ctx.fillStyle='#0a0e0a';ctx.fillRect(0,0,canvas.width,canvas.height);
  // grid
  ctx.strokeStyle='#111a11';ctx.lineWidth=0.5;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*GRID,0);ctx.lineTo(x*GRID,ROWS*GRID);ctx.stroke()}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*GRID);ctx.lineTo(COLS*GRID,y*GRID);ctx.stroke()}
  // food
  ctx.fillStyle='#ffd700';
  ctx.beginPath();ctx.arc(food.x*GRID+GRID/2,food.y*GRID+GRID/2,6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#aa8800';ctx.font='bold 8px sans-serif';ctx.textAlign='center';
  ctx.fillText('+',food.x*GRID+GRID/2,food.y*GRID+GRID/2+3);ctx.textAlign='left';
  // special food
  if(specialFood){
    const pulse=Math.sin(Date.now()/200)*3;
    ctx.fillStyle=`rgba(255,215,0,${0.3+Math.sin(Date.now()/300)*0.2})`;
    ctx.beginPath();ctx.arc(specialFood.x*GRID+GRID/2,specialFood.y*GRID+GRID/2,8+pulse,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffd700';
    ctx.beginPath();ctx.arc(specialFood.x*GRID+GRID/2,specialFood.y*GRID+GRID/2,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='10px serif';ctx.textAlign='center';
    ctx.fillText('⭐',specialFood.x*GRID+GRID/2,specialFood.y*GRID+GRID/2+3);ctx.textAlign='left';
  }
  // snake
  for(let i=0;i<snake.length;i++){
    const s=snake[i];
    const pct=i/snake.length;
    const hue=120+pct*60;
    ctx.fillStyle=`hsl(${hue},60%,${40+pct*20}%)`;
    ctx.beginPath();ctx.roundRect(s.x*GRID+1,s.y*GRID+1,GRID-2,GRID-2,i===0?5:3);ctx.fill();
  }
  // eyes on head
  const h=snake[0];
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(h.x*GRID+GRID/2+dir.x*3-dir.y*2,h.y*GRID+GRID/2+dir.y*3+dir.x*2,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(h.x*GRID+GRID/2+dir.x*3+dir.y*2,h.y*GRID+GRID/2+dir.y*3-dir.x*2,2,0,Math.PI*2);ctx.fill();
  // particles
  for(const p of particles){
    ctx.globalAlpha=p.life/20;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++)particles.push({x,y,dx:(Math.random()-0.5)*6,dy:(Math.random()-0.5)*6,life:20,color,r:Math.random()*3+1});
}

document.addEventListener('keydown',e=>{
  const map={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],w:[0,-1],s:[0,1],a:[-1,0],d:[1,0]};
  const d=map[e.key];
  if(d&&(dir.x!==-d[0]||dir.y!==-d[1])){e.preventDefault();dir={x:d[0],y:d[1]}}
});

function updateInfo(){
  document.getElementById('score').textContent=score;
  document.getElementById('len').textContent=snake.length;
  document.getElementById('speed').textContent=speed;
}

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎪 杂技演员</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#ffd700;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #3a3a2a;border-radius:8px;box-shadow:0 0 30px rgba(255,215,0,0.1);cursor:pointer}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a1a2e;color:#ffd700;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:12px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h2{font-size:32px;margin-bottom:8px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;background:#ffd700;color:#111;border:none;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<h1>🎪 平衡大师</h1>
<div id="info">
  <div>分数: <span class="val" id="score">0</span></div>
  <div>时间: <span class="val" id="timer">0</span>s</div>
  <div>最高: <span class="val" id="best">0</span></div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <button onclick="newGame()">新游戏</button>
</div>
<div id="overlay">
  <h2 id="olTitle">💥 倒了！</h2>
  <p id="olMsg"></p>
  <button onclick="newGame()">再来一次</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=400,H=500;
canvas.width=W;canvas.height=H;

const GRAVITY=0.0005;
let blocks,platform,score,alive,startTime,mouseX;
let best=parseInt(localStorage.getItem('balance_best')||'0');
document.getElementById('best').textContent=best;

function newGame(){
  platform={x:W/2,y:H-30,w:80,h:10,angle:0};
  blocks=[
    {x:W/2-15,y:H-60,w:30,h:25,color:'#f55'},
    {x:W/2-12,y:H-85,w:24,h:20,color:'#5f5'},
    {x:W/2-10,y:H-105,w:20,h:18,color:'#55f'},
    {x:W/2-8,y:H-123,w:16,h:15,color:'#ff5'},
  ];
  score=0;alive=true;mouseX=W/2;startTime=Date.now();
  document.getElementById('overlay').classList.remove('show');
  updateInfo();render();
  requestAnimationFrame(loop);
}

function update(){
  if(!alive)return;
  // platform follows mouse
  platform.x+=(mouseX-platform.x)*0.1;
  platform.x=Math.max(platform.w/2,Math.min(W-platform.w/2,platform.x));
  // gravity on blocks
  for(const b of blocks){
    b.vy=(b.vy||0)+GRAVITY;
    b.y+=b.vy;
    // platform collision
    if(b.y+b.h>=platform.y&&b.y+b.h<=platform.y+platform.h+5&&
       b.x+b.w>platform.x-platform.w/2&&b.x<platform.x+platform.w/2){
      b.y=platform.y-b.h;
      b.vy=0;
    }
    // block stacking
    for(const b2 of blocks){
      if(b===b2)continue;
      if(b.y+b.h>=b2.y&&b.y+b.h<=b2.y+5&&
         b.x+b.w>b2.x&&b.x<b2.x+b2.w){
        b.y=b2.y-b.h;
        b.vy=0;
      }
    }
  }
  // check if any block fell
  for(const b of blocks){
    if(b.y>H+50){alive=false;gameEnd();return}
  }
  // score
  const elapsed=Math.floor((Date.now()-startTime)/1000);
  score=elapsed*10;
  document.getElementById('timer').textContent=elapsed;
  updateInfo();
}

function render(){
  ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,W,H);
  // ground
  ctx.fillStyle='#2a2a1a';ctx.fillRect(0,H-20,W,20);
  // platform
  ctx.fillStyle='#ffd700';
  ctx.fillRect(platform.x-platform.w/2,platform.y,platform.w,platform.h);
  // support
  ctx.fillStyle='#8b6914';
  ctx.fillRect(platform.x-3,platform.y+platform.h,6,H-20-platform.y-platform.h);
  // blocks
  for(const b of blocks){
    ctx.fillStyle=b.color;
    ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.fillStyle='rgba(255,255,255,0.1)';
    ctx.fillRect(b.x,b.y,b.w,b.h/3);
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.fillRect(b.x,b.y+b.h-3,b.w,3);
  }
  // height indicator
  const topBlock=blocks.reduce((a,b)=>a.y<b.y?a:b);
  const height=Math.floor((H-20-topBlock.y)/10);
  ctx.fillStyle='rgba(255,255,255,0.1)';ctx.font='14px sans-serif';
  ctx.fillText(`${height}m`,10,25);
}

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  mouseX=(e.clientX-rect.left)*(W/rect.width);
});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  mouseX=(e.touches[0].clientX-rect.left)*(W/rect.width);
},{passive:false});

function gameEnd(){
  const elapsed=Math.floor((Date.now()-startTime)/1000);
  if(score>best){best=score;localStorage.setItem('balance_best',best);document.getElementById('best').textContent=best}
  document.getElementById('olMsg').textContent=`时间: ${elapsed}秒 | 分数: ${score}`;
  document.getElementById('overlay').classList.add('show');
}

function updateInfo(){document.getElementById('score').textContent=score}

function loop(){update();render();requestAnimationFrame(loop)}

newGame();
</script>
</body>
</html>

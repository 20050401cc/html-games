<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌌 星际迷航</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#5bf;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #2a2a3e;border-radius:8px;box-shadow:0 0 30px rgba(90,130,255,0.1)}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a1a2e;color:#5bf;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:12px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h2{font-size:32px;margin-bottom:8px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;background:#5bf;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<h1>🌌 星际迷航</h1>
<div id="info">
  <div>分数: <span class="val" id="score">0</span></div>
  <div>燃料: <span class="val" id="fuel">100</span></div>
  <div>距离: <span class="val" id="dist">0</span></div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <button onclick="newGame()">新游戏</button>
</div>
<div id="overlay">
  <h2 id="olTitle">💥 坠毁！</h2>
  <p id="olMsg"></p>
  <button onclick="newGame()">再来一次</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=400,H=600;
canvas.width=W;canvas.height=H;

let ship,asteroids,stars,particles,score,fuel,distance,alive,speed;
let best=parseInt(localStorage.getItem('space_best')||'0');
document.getElementById('best').textContent=best;

function newGame(){
  ship={x:W/2,y:H-60,w:24,h:30,vx:0};
  asteroids=[];particles=[];stars=[];
  score=0;fuel=100;distance=0;alive=true;speed=1;
  // generate stars
  for(let i=0;i<80;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.5,speed:Math.random()*0.5+0.2});
  document.getElementById('overlay').classList.remove('show');
  updateInfo();
  requestAnimationFrame(loop);
}

function spawnAsteroid(){
  const r=8+Math.random()*20;
  asteroids.push({
    x:r+Math.random()*(W-r*2),y:-r*2,
    vx:(Math.random()-0.5)*1,vy:1+Math.random()*speed,
    r,rotation:0,rotSpeed:(Math.random()-0.5)*0.05,
    color:'#8b6914',
  });
}

function update(){
  if(!alive)return;
  // ship movement
  ship.x+=ship.vx;
  ship.x=Math.max(ship.w/2,Math.min(W-ship.w/2,ship.x));
  ship.vx*=0.95;
  // spawn asteroids
  if(Math.random()<0.03+speed*0.005)spawnAsteroid();
  // update asteroids
  for(let i=asteroids.length-1;i>=0;i--){
    const a=asteroids[i];
    a.x+=a.vx;a.y+=a.vy;a.rotation+=a.rotSpeed;
    if(a.y>H+a.r*2){asteroids.splice(i,1);score+=5;continue}
    // collision
    const dx=a.x-ship.x,dy=a.y-(ship.y+ship.h/2);
    if(Math.sqrt(dx*dx+dy*dy)<a.r+ship.w/2-2){
      alive=false;
      spawnParticles(ship.x,ship.y,'#f55',20);
      gameEnd();return;
    }
  }
  // stars
  for(const s of stars){
    s.y+=s.speed*speed;
    if(s.y>H){s.y=0;s.x=Math.random()*W}
  }
  // particles
  for(let i=particles.length-1;i>=0;i--){
    particles[i].x+=particles[i].dx;particles[i].y+=particles[i].dy;particles[i].life--;
    if(particles[i].life<=0)particles.splice(i,1);
  }
  // exhaust
  if(Math.random()<0.3){
    particles.push({x:ship.x+Math.random()*6-3,y:ship.y+ship.h,dx:(Math.random()-0.5)*1,vy:2+Math.random()*2,life:15,color:'#5bf',r:Math.random()*2+1,vy_:2+Math.random()*2});
  }
  distance+=speed;
  speed=1+distance/10000;
  fuel=Math.max(0,fuel-0.02);
  if(fuel<=0){alive=false;gameEnd()}
  document.getElementById('dist').textContent=Math.floor(distance);
  updateInfo();
}

function render(){
  ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,W,H);
  // stars
  for(const s of stars){
    ctx.fillStyle=`rgba(255,255,255,${0.3+s.r*0.2})`;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  }
  // asteroids
  for(const a of asteroids){
    ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.rotation);
    // asteroid shape
    ctx.fillStyle=a.color;
    ctx.beginPath();
    for(let i=0;i<8;i++){
      const angle=(i/8)*Math.PI*2;
      const r=a.r*(0.8+Math.sin(i*3)*0.2);
      if(i===0)ctx.moveTo(Math.cos(angle)*r,Math.sin(angle)*r);
      else ctx.lineTo(Math.cos(angle)*r,Math.sin(angle)*r);
    }
    ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;ctx.stroke();
    ctx.restore();
  }
  // ship
  if(alive){
    ctx.fillStyle='#5bf';
    ctx.beginPath();
    ctx.moveTo(ship.x,ship.y);
    ctx.lineTo(ship.x-ship.w/2,ship.y+ship.h);
    ctx.lineTo(ship.x+ship.w/2,ship.y+ship.h);
    ctx.closePath();ctx.fill();
    // cockpit
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(ship.x,ship.y+10,4,0,Math.PI*2);ctx.fill();
    // wings
    ctx.fillStyle='#3af';
    ctx.beginPath();ctx.moveTo(ship.x-ship.w/2,ship.y+ship.h);ctx.lineTo(ship.x-ship.w,ship.y+ship.h-5);ctx.lineTo(ship.x-ship.w/2+3,ship.y+ship.h-8);ctx.fill();
    ctx.beginPath();ctx.moveTo(ship.x+ship.w/2,ship.y+ship.h);ctx.lineTo(ship.x+ship.w,ship.y+ship.h-5);ctx.lineTo(ship.x+ship.w/2-3,ship.y+ship.h-8);ctx.fill();
  }
  // particles
  for(const p of particles){
    ctx.globalAlpha=p.life/15;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  // HUD
  ctx.fillStyle='rgba(255,255,255,0.05)';ctx.font='bold 24px sans-serif';
  ctx.fillText(Math.floor(distance),W/2-20,H/2);
}

function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++)particles.push({x,y,dx:(Math.random()-0.5)*6,dy:(Math.random()-0.5)*6,life:25,color,r:Math.random()*3+1});
}

function gameEnd(){
  if(score>best){best=score;localStorage.setItem('space_best',best);document.getElementById('best').textContent=best}
  document.getElementById('olMsg').textContent=`距离: ${Math.floor(distance)} | 分数: ${score}`;
  document.getElementById('overlay').classList.add('show');
}

function updateInfo(){
  document.getElementById('score').textContent=score;
  document.getElementById('fuel').textContent=Math.floor(fuel);
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'){ship.vx-=0.8;e.preventDefault()}
  if(e.key==='ArrowRight'||e.key==='d'){ship.vx+=0.8;e.preventDefault()}
});
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  ship.vx+=(mx-ship.x)*0.05;
});

function loop(){update();render();requestAnimationFrame(loop)}

newGame();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎪 打字练习2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#0f0;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #2a3a2a;border-radius:8px;box-shadow:0 0 30px rgba(0,255,0,0.1)}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a2a1a;color:#0f0;border:1px solid #2a3a2a;border-radius:6px;cursor:pointer;font-size:12px}
#controls select{padding:4px 8px;background:#1a2a1a;color:#0f0;border:1px solid #2a3a2a;border-radius:4px;font-size:12px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h2{font-size:32px;margin-bottom:8px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;background:#0f0;color:#111;border:none;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<h1>🎪 打字练习2</h1>
<div id="info">
  <div>分数: <span class="val" id="score">0</span></div>
  <div>WPM: <span class="val" id="wpm">0</span></div>
  <div>准确率: <span class="val" id="acc">100%</span></div>
  <div>连击: <span class="val" id="combo">0</span></div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <select id="difficulty"><option value="easy">简单</option><option value="medium" selected>中等</option><option value="hard">困难</option></select>
  <button onclick="newGame()">新游戏</button>
</div>
<div id="overlay">
  <h2 id="olTitle">⏱️ 时间到！</h2>
  <p id="olMsg"></p>
  <button onclick="newGame()">再来一次</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=500,H=400;
canvas.width=W;canvas.height=H;

const WORDS={
  easy:['cat','dog','sun','run','big','red','hot','fun','map','cup','box','pen','hat','bus','egg','ice','jam','key','leg','mop'],
  medium:['apple','beach','cloud','dance','eagle','flame','grape','house','input','joker','knife','lemon','mouse','night','ocean','piano','queen','river','stone','tiger'],
  hard:['algorithm','beautiful','challenge','dangerous','elaborate','fantastic','governor','happiness','important','japanese','knowledge','landscape','marketing','necessary','operation','platform','question','remember','suddenly','tropical'],
};

let words,fallingWords,currentInput,score,combo,maxCombo,totalTyped,correctTyped,alive,startTime,timerInterval,speed;
let best=parseInt(localStorage.getItem('typing2_best')||'0');
document.getElementById('best').textContent=best;

function newGame(){
  words=WORDS[document.getElementById('difficulty').value];
  fallingWords=[];currentInput='';score=0;combo=0;maxCombo=0;
  totalTyped=0;correctTyped=0;alive=true;speed=1;
  startTime=Date.now();
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(!alive)return;
    const elapsed=Math.floor((Date.now()-startTime)/1000);
    if(elapsed>=60){alive=false;endGame();return}
  },1000);
  spawnWord();spawnWord();
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('game').focus();
  updateInfo();
  if(window._loop)cancelAnimationFrame(window._loop);
  function loop(){update();render();window._loop=requestAnimationFrame(loop)}
  loop();
}

function spawnWord(){
  const text=words[Math.floor(Math.random()*words.length)];
  fallingWords.push({
    text,x:30+Math.random()*(W-100),y:0,
    speed:0.5+Math.random()*speed*0.3,
    typed:'',active:false,
  });
}

function update(){
  if(!alive)return;
  // move words down
  for(let i=fallingWords.length-1;i>=0;i--){
    const w=fallingWords[i];
    w.y+=w.speed;
    if(w.y>H-20&&!w.active){
      fallingWords.splice(i,1);combo=0;
    }
  }
  // spawn new words
  const elapsed=(Date.now()-startTime)/1000;
  speed=1+elapsed/30;
  if(fallingWords.length<3+Math.floor(elapsed/10)&&Math.random()<0.03)spawnWord();
}

function render(){
  ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,W,H);
  // background grid
  ctx.strokeStyle='#111a11';ctx.lineWidth=0.5;
  for(let x=0;x<W;x+=20){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  // falling words
  for(const w of fallingWords){
    if(w.active){
      ctx.fillStyle='#ffd700';ctx.font='bold 16px monospace';
    }else{
      ctx.fillStyle='#888';ctx.font='16px monospace';
    }
    ctx.textAlign='left';
    ctx.fillText(w.text,w.x,w.y);
  }
  // current input
  ctx.fillStyle='#0f0';ctx.font='bold 20px monospace';ctx.textAlign='center';
  ctx.fillText(currentInput||'_',W/2,H-30);
  ctx.textAlign='left';
  // timer
  const elapsed=Math.floor((Date.now()-startTime)/1000);
  const remaining=Math.max(0,60-elapsed);
  ctx.fillStyle=remaining<=10?'#f55':'#888';ctx.font='14px sans-serif';ctx.textAlign='right';
  ctx.fillText(`${remaining}s`,W-10,20);ctx.textAlign='left';
}

canvas.addEventListener('click',()=>{document.getElementById('game').focus()});
document.addEventListener('keydown',e=>{
  if(!alive)return;
  if(e.key==='Backspace'){e.preventDefault();currentInput=currentInput.slice(0,-1);updateActiveWord();return}
  if(e.key==='Escape'){e.preventDefault();currentInput='';updateActiveWord();return}
  if(e.key==='Enter'||e.key===' '){
    e.preventDefault();
    // check if current input matches any word
    for(let i=0;i<fallingWords.length;i++){
      const w=fallingWords[i];
      if(w.text===currentInput.toLowerCase()){
        totalTyped+=currentInput.length;correctTyped=currentInput.length;
        combo++;maxCombo=Math.max(maxCombo,combo);
        score+=w.text.length*10+combo*5;
        fallingWords.splice(i,1);
        currentInput='';
        spawnWord();
        updateInfo();render();
        return;
      }
    }
    // miss
    if(currentInput.length>0){combo=0;totalTyped+=currentInput.length}
    currentInput='';updateInfo();render();
    return;
  }
  if(/^[a-zA-Z]$/.test(e.key)){
    e.preventDefault();
    currentInput+=e.key.toLowerCase();
    totalTyped++;
    updateActiveWord();
    // auto-check
    for(let i=0;i<fallingWords.length;i++){
      const w=fallingWords[i];
      if(w.text===currentInput){
        correctTyped+=currentInput.length;
        combo++;maxCombo=Math.max(maxCombo,combo);
        score+=w.text.length*10+combo*5;
        fallingWords.splice(i,1);
        currentInput='';
        spawnWord();
        updateInfo();render();
        return;
      }
    }
    render();
  }
});

function updateActiveWord(){
  for(const w of fallingWords){
    w.active=currentInput.length>0&&w.text.startsWith(currentInput);
  }
}

function endGame(){
  const elapsed=Math.floor((Date.now()-startTime)/1000);
  const wpm=Math.round(score/(elapsed/60)/10);
  if(score>best){best=score;localStorage.setItem('typing2_best',best);document.getElementById('best').textContent=best}
  document.getElementById('olMsg').textContent=`分数: ${score} | WPM: ${wpm} | 最大连击: ${maxCombo}`;
  document.getElementById('overlay').classList.add('show');
}

function updateInfo(){
  const elapsed=Math.max(1,(Date.now()-startTime)/1000/60);
  const wpm=Math.round(score/elapsed/10);
  const acc=totalTyped>0?Math.round(correctTyped/totalTyped*100):100;
  document.getElementById('score').textContent=score;
  document.getElementById('wpm').textContent=wpm;
  document.getElementById('acc').textContent=acc+'%';
  document.getElementById('combo').textContent=combo;
}

newGame();
</script>
</body>
</html>

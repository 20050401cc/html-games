<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏹 弓箭手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#ffd700;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #2a2a3e;border-radius:8px;box-shadow:0 0 30px rgba(255,215,0,0.1);cursor:crosshair}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a1a2e;color:#ffd700;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:12px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h2{font-size:32px;margin-bottom:8px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;background:#ffd700;color:#111;border:none;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<h1>🏹 弓箭手</h1>
<div id="info">
  <div>分数: <span class="val" id="score">0</span></div>
  <div>箭矢: <span class="val" id="arrows">10</span></div>
  <div>连击: <span class="val" id="combo">0</span></div>
  <div>最高: <span class="val" id="best">0</span></div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <button onclick="newGame()">新游戏</button>
</div>
<div id="overlay">
  <h2 id="olTitle">🏹 箭矢用完！</h2>
  <p id="olMsg"></p>
  <button onclick="newGame()">再来一局</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=500,H=400;
canvas.width=W;canvas.height=H;

const WIND_CHANGE=3000;
let targets,arrows,particles,score,arrowsLeft,combo,alive,mouseX,mouseY,wind,windTimer;
let best=parseInt(localStorage.getItem('archery_best')||'0');
document.getElementById('best').textContent=best;

function newGame(){
  targets=[];arrows=[];particles=[];
  score=0;arrowsLeft=10;combo=0;alive=true;
  mouseX=W/2;mouseY=H/2;
  wind=Math.floor(Math.random()*20-10);windTimer=Date.now();
  spawnTargets(3);
  document.getElementById('overlay').classList.remove('show');
  updateInfo();render();
}

function spawnTargets(count){
  for(let i=0;i<count;i++){
    const type=Math.random();
    let r,pts,speed,color;
    if(type<0.5){r=20;pts=10;speed=0.5;color='#f55'}
    else if(type<0.8){r=15;pts=20;speed=1;color='#ff5'}
    else{r=10;pts=50;speed=1.5;color='#5ff'}
    targets.push({
      x:100+Math.random()*(W-200),y:60+Math.random()*(H-150),
      r,pts,speed,color,
      dx:(Math.random()-0.5)*speed,dy:(Math.random()-0.5)*speed*0.5,
      hit:false,
    });
  }
}

function shoot(x,y){
  if(!alive||arrowsLeft<=0)return;
  arrowsLeft--;
  // apply wind
  const windOffset=wind*0.3;
  arrows.push({x:20,y:H/2,targetX:x+windOffset,targetY:y,vx:0,vy:0,speed:12,trail:[]});
  updateInfo();
}

function update(){
  // wind change
  if(Date.now()-windTimer>WIND_CHANGE){
    wind=Math.floor(Math.random()*20-10);windTimer=Date.now();
  }
  // update targets
  for(const t of targets){
    t.x+=t.dx;t.y+=t.dy;
    if(t.x-t.r<50||t.x+t.r>W-10)t.dx*=-1;
    if(t.y-t.r<30||t.y+t.r>H-30)t.dy*=-1;
  }
  // spawn new targets
  if(targets.filter(t=>!t.hit).length<2)spawnTargets(1);
  // update arrows
  for(let i=arrows.length-1;i>=0;i--){
    const a=arrows[i];
    const dx=a.targetX-a.x,dy=a.targetY-a.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<5){
      // hit check
      let hitTarget=false;
      for(const t of targets){
        if(t.hit)continue;
        const td=Math.sqrt((a.x-t.x)**2+(a.y-t.y)**2);
        if(td<t.r){
          t.hit=true;hitTarget=true;
          combo++;
          const pts=t.pts*(1+combo*0.2);
          score+=Math.floor(pts);
          spawnParticles(t.x,t.y,t.color,10);
          break;
        }
      }
      if(!hitTarget)combo=0;
      arrows.splice(i,1);
      continue;
    }
    a.vx=dx/dist*a.speed;a.vy=dy/dist*a.speed;
    a.x+=a.vx;a.y+=a.vy;
    a.trail.push({x:a.x,y:a.y});
    if(a.trail.length>15)a.trail.shift();
  }
  // particles
  for(let i=particles.length-1;i>=0;i--){
    particles[i].x+=particles[i].dx;particles[i].y+=particles[i].dy;particles[i].life--;
    if(particles[i].life<=0)particles.splice(i,1);
  }
  // check end
  if(arrowsLeft<=0&&arrows.length===0){
    alive=false;
    if(score>best){best=score;localStorage.setItem('archery_best',best);document.getElementById('best').textContent=best}
    document.getElementById('olMsg').textContent=`分数: ${score} | 最高: ${best}`;
    document.getElementById('overlay').classList.add('show');
  }
  updateInfo();
}

function render(){
  ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,W,H);
  // sky gradient
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#1a1a3a');grad.addColorStop(1,'#0a0a1a');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  // ground
  ctx.fillStyle='#1a2a1a';ctx.fillRect(0,H-30,W,30);
  // targets
  for(const t of targets){
    if(t.hit)continue;
    // rings
    const rings=[{r:t.r,color:'#fff'},{r:t.r*0.7,color:t.color},{r:t.r*0.4,color:'#fff'},{r:t.r*0.15,color:'#f55'}];
    for(const ring of rings){
      ctx.fillStyle=ring.color;
      ctx.beginPath();ctx.arc(t.x,t.y,ring.r,0,Math.PI*2);ctx.fill();
    }
    ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,Math.PI*2);ctx.stroke();
  }
  // arrows
  for(const a of arrows){
    // trail
    for(let i=0;i<a.trail.length;i++){
      ctx.globalAlpha=i/a.trail.length*0.3;
      ctx.fillStyle='#ffd700';
      ctx.beginPath();ctx.arc(a.trail[i].x,a.trail[i].y,1.5,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
    // arrow
    ctx.fillStyle='#ffd700';
    ctx.beginPath();ctx.arc(a.x,a.y,3,0,Math.PI*2);ctx.fill();
  }
  // crosshair
  ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(mouseX,mouseY,15,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(mouseX-20,mouseY);ctx.lineTo(mouseX-10,mouseY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(mouseX+10,mouseY);ctx.lineTo(mouseX+20,mouseY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(mouseX,mouseY-20);ctx.lineTo(mouseX,mouseY-10);ctx.stroke();
  ctx.beginPath();ctx.moveTo(mouseX,mouseY+10);ctx.lineTo(mouseX,mouseY+20);ctx.stroke();
  // wind indicator
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='12px sans-serif';ctx.textAlign='center';
  ctx.fillText(`风: ${wind>0?'→':'←'} ${Math.abs(wind)}`,W/2,20);
  ctx.textAlign='left';
  // particles
  for(const p of particles){
    ctx.globalAlpha=p.life/25;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++)particles.push({x,y,dx:(Math.random()-0.5)*6,dy:(Math.random()-0.5)*6,life:25,color,r:Math.random()*3+1});
}

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  mouseX=(e.clientX-rect.left)*(W/rect.width);
  mouseY=(e.clientY-rect.top)*(H/rect.height);
  render();
});

canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const x=(e.clientX-rect.left)*(W/rect.width);
  const y=(e.clientY-rect.top)*(H/rect.height);
  shoot(x,y);
});

function updateInfo(){
  document.getElementById('score').textContent=score;
  document.getElementById('arrows').textContent=arrowsLeft;
  document.getElementById('combo').textContent=combo;
}

function loop(){update();render();requestAnimationFrame(loop)}

newGame();loop();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
title>🔢 数字华容道</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#ffd700;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:12px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
#board{display:grid;gap:4px;padding:8px;background:#1a1a2e;border-radius:12px;border:2px solid #2a2a3e;box-shadow:0 0 30px rgba(255,215,0,0.1)}
.tile{display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;border-radius:8px;cursor:pointer;transition:all .15s;user-select:none}
.tile.num{background:#2a2a4a;color:#ffd700;border:1px solid #3a3a5e}
.tile.num:hover{background:#3a3a5a}
.tile.empty{background:#0a0a14;border:1px dashed #1a1a2e}
.tile.correct{background:#2a4a2a;border-color:#3a5a3a}
#controls{margin-top:12px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a1a2e;color:#ffd700;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:12px}
#controls select{padding:4px 8px;background:#1a1a2e;color:#ffd700;border:1px solid #2a2a3e;border-radius:4px;font-size:12px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h2{font-size:32px;color:#ffd700;margin-bottom:8px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;background:#ffd700;color:#111;border:none;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<h1>🔢 数字华容道</h1>
<div id="info">
  <div>步数: <span class="val" id="moves">0</span></div>
  <div>时间: <span class="val" id="timer">0:00</span></div>
  <div>最高: <span class="val" id="best">-</span></div>
</div>
<div id="board"></div>
<div id="controls">
  <select id="size" onchange="newGame()"><option value="3">3×3</option><option value="4" selected>4×4</option><option value="5">5×5</option></select>
  <button onclick="newGame()">新游戏</button>
  <button onclick="shuffleBoard()">🔀 打乱</button>
</div>
<div id="overlay">
  <h2>🎉 完成！</h2>
  <p id="olMsg"></p>
  <button onclick="newGame()">再来一局</button>
</div>
<script>
let grid,size,moves,emptyPos,startTime,timerInterval;

function newGame(){
  size=parseInt(document.getElementById('size').value);
  const n=size*size;
  grid=Array.from({length:n},(_,i)=>i);
  moves=0;
  clearInterval(timerInterval);startTime=Date.now();
  timerInterval=setInterval(()=>{
    const t=Math.floor((Date.now()-startTime)/1000);
    document.getElementById('timer').textContent=`${Math.floor(t/60)}:${String(t%60).padStart(2,'0')}`;
  },1000);
  document.getElementById('overlay').classList.remove('show');
  shuffleBoard();
}

function shuffleBoard(){
  // shuffle by making random moves
  for(let i=0;i<size*size*100;i++){
    const empty=grid.indexOf(0);
    const neighbors=getNeighbors(empty);
    const target=neighbors[Math.floor(Math.random()*neighbors.length)];
    [grid[empty],grid[target]]=[grid[target],grid[empty]];
  }
  // verify solvable
  if(!isSolvable())shuffleBoard();
  moves=0;
  renderBoard();updateInfo();
}

function getNeighbors(idx){
  const r=Math.floor(idx/size),c=idx%size;
  const n=[];
  if(r>0)n.push(idx-size);
  if(r<size-1)n.push(idx+size);
  if(c>0)n.push(idx-1);
  if(c<size-1)n.push(idx+1);
  return n;
}

function isSolvable(){
  let inversions=0;
  for(let i=0;i<grid.length;i++)for(let j=i+1;j<grid.length;j++){
    if(grid[i]&&grid[j]&&grid[i]>grid[j])inversions++;
  }
  if(size%2===1)return inversions%2===0;
  const emptyRow=Math.floor(grid.indexOf(0)/size);
  return(inversions+emptyRow)%2===1;
}

function moveTile(idx){
  const empty=grid.indexOf(0);
  if(!getNeighbors(empty).includes(idx))return;
  [grid[empty],grid[idx]]=[grid[idx],grid[empty]];
  moves++;updateInfo();
  renderBoard();
  if(checkWin())win();
}

function checkWin(){
  for(let i=0;i<grid.length-1;i++){if(grid[i]!==i+1)return false}
  return grid[grid.length-1]===0;
}

function win(){
  clearInterval(timerInterval);
  const time=Math.floor((Date.now()-startTime)/1000);
  const bestKey=`puzzle_${size}`;
  const prev=localStorage.getItem(bestKey);
  if(!prev||moves<parseInt(prev))localStorage.setItem(bestKey,moves);
  document.getElementById('olMsg').textContent=`步数: ${moves} | 用时: ${Math.floor(time/60)}:${String(time%60).padStart(2,'0')}`;
  document.getElementById('overlay').classList.add('show');
}

function renderBoard(){
  const board=document.getElementById('board');
  board.style.gridTemplateColumns=`repeat(${size},${size<=4?60:48}px)`;
  board.innerHTML='';
  const tileSize=size<=4?60:48;
  for(let i=0;i<grid.length;i++){
    const tile=document.createElement('div');
    tile.className='tile';
    tile.style.width=tileSize+'px';tile.style.height=tileSize+'px';
    if(grid[i]===0){
      tile.classList.add('empty');
    }else{
      tile.classList.add('num');
      tile.textContent=grid[i];
      if(grid[i]===i+1)tile.classList.add('correct');
      tile.addEventListener('click',()=>moveTile(i));
    }
    board.appendChild(tile);
  }
}

function updateInfo(){
  document.getElementById('moves').textContent=moves;
  const bestKey=`puzzle_${size}`;
  const best=localStorage.getItem(bestKey);
  document.getElementById('best').textContent=best?best+'步':'-';
}

document.addEventListener('keydown',e=>{
  const empty=grid.indexOf(0);
  let target=-1;
  switch(e.key){
    case'ArrowUp':target=empty+size;break;
    case'ArrowDown':target=empty-size;break;
    case'ArrowLeft':target=empty+1;break;
    case'ArrowRight':target=empty-1;break;
  }
  if(target>=0&&target<grid.length){e.preventDefault();moveTile(target)}
});

newGame();
</script>
</body>
</html>

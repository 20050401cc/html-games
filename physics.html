<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 弹球物理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#f5a;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #2a2a3e;border-radius:8px;box-shadow:0 0 30px rgba(255,90,170,0.1);cursor:crosshair}
#controls{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
#controls button{padding:6px 14px;background:#1a1a2e;color:#f5a;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:12px}
#controls select{padding:4px 8px;background:#1a1a2e;color:#f5a;border:1px solid #2a2a3e;border-radius:4px;font-size:12px}
#msg{margin-top:8px;font-size:12px;color:#888}
</style>
</head>
<body>
<h1>🔮 弹球物理</h1>
<div id="info">
  <div>球数: <span class="val" id="count">0</span></div>
  <div>弹跳: <span class="val" id="bounces">0</span></div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <select id="gravity"><option value="0.1">弱重力</option><option value="0.2" selected>正常</option><option value="0.4">强重力</option></select>
  <select id="bounce"><option value="0.7">低弹力</option><option value="0.85" selected>正常</option><option value="0.95">高弹力</option></select>
  <button onclick="clearBalls()">清空</button>
  <button onclick="addExplosion()">💥 爆炸</button>
  <button onclick="toggleTrails()">✨ 轨迹</button>
</div>
<div id="msg">点击/拖拽发射弹球 · 右键添加障碍物</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=600,H=450;
canvas.width=W;canvas.height=H;

let balls,obstacles,bouncesCount,showTrails,mouseDown,startX,startY;

function init(){
  balls=[];obstacles=[];bouncesCount=0;showTrails=true;mouseDown=false;
  // add some default obstacles
  obstacles.push({x:150,y:300,w:120,h:10,angle:0.1});
  obstacles.push({x:350,y:250,w:120,h:10,angle:-0.1});
  obstacles.push({x:250,y:150,w:80,h:10,angle:0});
  render();
}

function addBall(x,y,vx,vy,r){
  const colors=['#f55','#5f5','#55f','#ff5','#f5f','#5ff','#fa0','#a0f'];
  balls.push({x,y,vx,vy,r:r||8+Math.random()*8,color:colors[Math.floor(Math.random()*colors.length)],trail:[],life:1000});
  updateInfo();
}

function clearBalls(){balls=[];updateInfo()}

function addExplosion(){
  const cx=W/2,cy=H/2;
  for(let i=0;i<20;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=3+Math.random()*8;
    addBall(cx,cy,Math.cos(angle)*speed,Math.sin(angle)*speed,4+Math.random()*6);
  }
}

function toggleTrails(){showTrails=!showTrails}

function update(){
  const gravity=parseFloat(document.getElementById('gravity').value);
  const bounceCoeff=parseFloat(document.getElementById('bounce').value);
  for(let i=balls.length-1;i>=0;i--){
    const b=balls[i];
    b.vy+=gravity;
    b.x+=b.vx;b.y+=b.vy;
    // trail
    if(showTrails){b.trail.push({x:b.x,y:b.y});if(b.trail.length>30)b.trail.shift()}
    // wall bounce
    if(b.x-b.r<0){b.x=b.r;b.vx*=-bounceCoeff;bouncesCount++}
    if(b.x+b.r>W){b.x=W-b.r;b.vx*=-bounceCoeff;bouncesCount++}
    if(b.y-b.r<0){b.y=b.r;b.vy*=-bounceCoeff;bouncesCount++}
    if(b.y+b.r>H){b.y=H-b.r;b.vy*=-bounceCoeff;bouncesCount++;if(Math.abs(b.vy)<0.5)b.vy=0}
    // obstacle collision
    for(const o of obstacles){
      const cos=Math.cos(-o.angle),sin=Math.sin(-o.angle);
      const dx=b.x-(o.x+o.w/2),dy=b.y-(o.y+o.h/2);
      const lx=dx*cos-dy*sin,ly=dx*sin+dy*cos;
      if(Math.abs(lx)<o.w/2+b.r&&Math.abs(ly)<o.h/2+b.r){
        const overlapX=o.w/2+b.r-Math.abs(lx);
        const overlapY=o.h/2+b.r-Math.abs(ly);
        if(overlapX<overlapY){
          const nx=lx>0?1:-1;
          const wx=nx*cos,sy=nx*sin;
          b.vx=b.vx-2*(b.vx*wx+b.vy*sy)*wx*bounceCoeff*0.8;
          b.vy=b.vy-2*(b.vx*wx+b.vy*sy)*sy*bounceCoeff*0.8;
          b.x+=nx*overlapX*cos;b.y+=nx*overlapX*sin;
        }else{
          const ny=ly>0?1:-1;
          const wx=ny*sin,sy=ny*cos;
          b.vx=b.vx-2*(b.vx*wx+b.vy*sy)*wx*bounceCoeff*0.8;
          b.vy=b.vy-2*(b.vx*wx+b.vy*sy)*sy*bounceCoeff*0.8;
          b.x+=ny*overlapY*sin;b.y+=ny*overlapY*cos;
        }
        bouncesCount++;
      }
    }
    // ball-ball collision
    for(let j=i+1;j<balls.length;j++){
      const b2=balls[j];
      const dx=b2.x-b.x,dy=b2.y-b.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const minDist=b.r+b2.r;
      if(dist<minDist&&dist>0){
        const nx=dx/dist,ny=dy/dist;
        const overlap=(minDist-dist)/2;
        b.x-=nx*overlap;b.y-=ny*overlap;
        b2.x+=nx*overlap;b2.y+=ny*overlap;
        // elastic collision
        const dvx=b.vx-b2.vx,dvy=b.vy-b2.vy;
        const dot=dvx*nx+dvy*ny;
        b.vx-=dot*nx*bounceCoeff;b.vy-=dot*ny*bounceCoeff;
        b2.vx+=dot*nx*bounceCoeff;b2.vy+=dot*ny*bounceCoeff;
        bouncesCount++;
      }
    }
    b.life--;
    if(b.life<=0||b.y>H+50)balls.splice(i,1);
  }
  updateInfo();
}

function render(){
  ctx.fillStyle='rgba(10,10,20,0.3)';ctx.fillRect(0,0,W,H);
  // obstacles
  for(const o of obstacles){
    ctx.save();ctx.translate(o.x+o.w/2,o.y+o.h/2);ctx.rotate(o.angle);
    ctx.fillStyle='#3a3a5a';ctx.fillRect(-o.w/2,-o.h/2,o.w,o.h);
    ctx.strokeStyle='#5a5a7a';ctx.lineWidth=1;ctx.strokeRect(-o.w/2,-o.h/2,o.w,o.h);
    ctx.restore();
  }
  // balls
  for(const b of balls){
    // trail
    if(showTrails&&b.trail.length>1){
      ctx.beginPath();ctx.moveTo(b.trail[0].x,b.trail[0].y);
      for(let i=1;i<b.trail.length;i++)ctx.lineTo(b.trail[i].x,b.trail[i].y);
      ctx.strokeStyle=b.color+'40';ctx.lineWidth=b.r*0.5;ctx.stroke();
    }
    // glow
    ctx.fillStyle=b.color+'20';
    ctx.beginPath();ctx.arc(b.x,b.y,b.r*2,0,Math.PI*2);ctx.fill();
    // ball
    const grad=ctx.createRadialGradient(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.1,b.x,b.y,b.r);
    grad.addColorStop(0,'#fff');grad.addColorStop(0.3,b.color);grad.addColorStop(1,b.color+'80');
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
  }
  // launch preview
  if(mouseDown&&startX!==undefined){
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.setLineDash([5,5]);
    ctx.beginPath();ctx.moveTo(startX,startY);ctx.lineTo(startX+(startX-mouseX),startY+(startY-mouseY));ctx.stroke();
    ctx.setLineDash([]);
  }
}

let mouseX,mouseY;
canvas.addEventListener('mousedown',e=>{
  if(e.button===2){
    // add obstacle
    const rect=canvas.getBoundingClientRect();
    const mx=(e.clientX-rect.left)*(W/rect.width);
    const my=(e.clientY-rect.top)*(H/rect.height);
    obstacles.push({x:mx-40,y:my-5,w:80,h:10,angle:(Math.random()-0.5)*0.4});
    render();return;
  }
  mouseDown=true;
  const rect=canvas.getBoundingClientRect();
  startX=(e.clientX-rect.left)*(W/rect.width);
  startY=(e.clientY-rect.top)*(H/rect.height);
  mouseX=startX;mouseY=startY;
});
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  mouseX=(e.clientX-rect.left)*(W/rect.width);
  mouseY=(e.clientY-rect.top)*(H/rect.height);
});
canvas.addEventListener('mouseup',e=>{
  if(!mouseDown)return;mouseDown=false;
  const rect=canvas.getBoundingClientRect();
  const ex=(e.clientX-rect.left)*(W/rect.width);
  const ey=(e.clientY-rect.top)*(H/rect.height);
  const vx=(startX-ex)*0.08,vy=(startY-ey)*0.08;
  if(Math.abs(vx)>0.5||Math.abs(vy)>0.5)addBall(startX,startY,vx,vy);
});
canvas.addEventListener('contextmenu',e=>e.preventDefault());

function updateInfo(){
  document.getElementById('count').textContent=balls.length;
  document.getElementById('bounces').textContent=bouncesCount;
}

function loop(){update();render();requestAnimationFrame(loop)}

init();
loop();
</script>
</body>
</html>

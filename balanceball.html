<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎪 平衡球</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#ffd700;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #2a2a3e;border-radius:8px;box-shadow:0 0 30px rgba(255,215,0,0.1);cursor:pointer}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a1a2e;color:#ffd700;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:12px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h2{font-size:32px;margin-bottom:8px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;background:#ffd700;color:#111;border:none;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<h1>🎪 平衡球</h1>
<div id="info">
  <div>分数: <span class="val" id="score">0</span></div>
  <div>关卡: <span class="val" id="level">1</span></div>
  <div>最高: <span class="val" id="best">0</span></div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <button onclick="newGame()">新游戏</button>
</div>
<div id="overlay">
  <h2 id="olTitle">🎉 过关！</h2>
  <p id="olMsg"></p>
  <button onclick="nextLevel()">下一关</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=400,H=500;
canvas.width=W;canvas.height=H;

const GRAVITY=0.12;
let ball,platforms,goal,score,level,alive;
let best=parseInt(localStorage.getItem('balanceball_best')||'0');
document.getElementById('best').textContent=best;

function newGame(){
  level=1;score=0;alive=true;
  loadLevel();document.getElementById('overlay').classList.remove('show');
  updateInfo();requestAnimationFrame(loop);
}

function nextLevel(){level++;alive=true;loadLevel();document.getElementById('overlay').classList.remove('show');updateInfo()}

function loadLevel(){
  ball={x:50,y:50,vx:0,vy:0,r:10};
  platforms=[
    {x:0,y:H-20,w:W,h:20}, // ground
  ];
  goal={x:W-50,y:50,r:20};
  // generate platforms based on level
  const count=5+level*2;
  for(let i=0;i<count;i++){
    const pw=60+Math.random()*80;
    const px=Math.random()*(W-pw);
    const py=80+i*(H-160)/count;
    platforms.push({x:px,y:py,w:pw,h:10,tilt:(Math.random()-0.5)*0.2});
  }
  document.getElementById('level').textContent=level;
}

function update(){
  if(!alive)return;
  // ball physics
  ball.vy+=GRAVITY;
  ball.vx*=0.995;ball.vy*=0.995;
  ball.x+=ball.vx;ball.y+=ball.vy;
  // platform collision
  for(const p of platforms){
    const cos=Math.cos(p.tilt||0),sin=Math.sin(p.tilt||0);
    // transform ball position to platform space
    const dx=ball.x-(p.x+p.w/2),dy=ball.y-(p.y+p.h/2);
    const lx=dx*cos+dy*sin,ly=-dx*sin+dy*cos;
    if(Math.abs(lx)<p.w/2+ball.r&&Math.abs(ly)<p.h/2+ball.r&&ball.vy>0){
      // bounce
      const overlap=p.h/2+ball.r-Math.abs(ly);
      ball.y-=overlap;
      ball.vy=-Math.abs(ball.vy)*0.5;
      ball.vx+=Math.sin(p.tilt||0)*2;
    }
  }
  // wall bounce
  if(ball.x-ball.r<0){ball.x=ball.r;ball.vx=Math.abs(ball.vx)*0.7}
  if(ball.x+ball.r>W){ball.x=W-ball.r;ball.vx=-Math.abs(ball.vx)*0.7}
  if(ball.y-ball.r<0){ball.y=ball.r;ball.vy=Math.abs(ball.vy)*0.7}
  // goal check
  const gx=ball.x-goal.x,gy=ball.y-goal.y;
  if(Math.sqrt(gx*gx+gy*gy)<ball.r+goal.r){
    score+=100+level*50;
    if(score>best){best=score;localStorage.setItem('balanceball_best',best);document.getElementById('best').textContent=best}
    document.getElementById('olMsg').textContent=`分数: ${score}`;
    document.getElementById('overlay').classList.add('show');
    alive=false;
  }
  // fall off
  if(ball.y>H+50){alive=false;document.getElementById('olTitle').textContent='💀 掉落！';document.getElementById('olMsg').textContent='';document.getElementById('overlay').classList.add('show')}
  updateInfo();
}

function render(){
  ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,W,H);
  // background
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#1a1a3a');grad.addColorStop(1,'#0a0a1a');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  // platforms
  for(const p of platforms){
    ctx.save();ctx.translate(p.x+p.w/2,p.y+p.h/2);ctx.rotate(p.tilt||0);
    ctx.fillStyle='#3a3a5a';
    ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    ctx.fillStyle='rgba(255,255,255,0.1)';
    ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h/3);
    ctx.restore();
  }
  // goal
  ctx.fillStyle='rgba(255,215,0,0.1)';
  ctx.beginPath();ctx.arc(goal.x,goal.y,goal.r*1.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffd700';
  ctx.beginPath();ctx.arc(goal.x,goal.y,goal.r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#aa8800';ctx.font='16px serif';ctx.textAlign='center';
  ctx.fillText('⭐',goal.x,goal.y+5);ctx.textAlign='left';
  // ball
  if(alive){
    const grad=ctx.createRadialGradient(ball.x-3,ball.y-3,2,ball.x,ball.y,ball.r);
    grad.addColorStop(0,'#fff');grad.addColorStop(0.3,'#5bf');grad.addColorStop(1,'#38a');
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
    // glow
    ctx.fillStyle='rgba(90,130,255,0.1)';
    ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r*2,0,Math.PI*2);ctx.fill();
  }
}

canvas.addEventListener('click',e=>{
  if(!alive)return;
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  const my=(e.clientY-rect.top)*(H/rect.height);
  // apply force toward click
  const dx=mx-ball.x,dy=my-ball.y;
  const d=Math.sqrt(dx*dx+dy*dy)||1;
  ball.vx+=dx/d*3;ball.vy+=dy/d*3;
});

function updateInfo(){
  document.getElementById('score').textContent=score;
}

function loop(){update();render();requestAnimationFrame(loop)}

newGame();
</script>
</body>
</html>

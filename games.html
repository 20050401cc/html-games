let activeTag='全部';
function init(){
  const tags=['全部',...new Set(GAMES.flatMap(g=>g.t))].sort();
  document.getElementById('tags').innerHTML=tags.map(t=>`<span class="tag${t===activeTag?' active':''}" onclick="setTag('${t}')">${t}</span>`).join('');
  renderGrid();
}
function setTag(t){activeTag=t;document.querySelectorAll('.tag').forEach(el=>el.classList.toggle('active',el.textContent===t));filterGames()}
function filterGames(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  renderGrid(q);
}
function renderGrid(q=''){
  const filtered=GAMES.filter(g=>{
    const matchTag=activeTag==='全部'||g.t.includes(activeTag);
    const matchSearch=!q||g.n.toLowerCase().includes(q)||g.d.toLowerCase().includes(q)||g.t.some(t=>t.toLowerCase().includes(q));
    return matchTag&&matchSearch;
  });
  const bgColors=['#1a1a3a','#1a2a1a','#2a1a1a','#1a1a2a','#2a2a1a','#1a2a2a','#2a1a2a','#2a2a2a'];
  document.getElementById('grid').innerHTML=filtered.map((g,i)=>{
    const bg=bgColors[i%bgColors.length];
    return`<a class="card" href="${g.f}">
      <div class="icon" style="background:linear-gradient(135deg,${bg},#12121e)">${g.n.split(' ')[0]}</div>
      <div class="meta">
        <h3>${g.n}</h3>
        <p>${g.d}</p>
        <div class="tags">${g.t.map(t=>`<span>${t}</span>`).join('')}</div>
      </div>
    </a>`;
  }).join('');
}

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔢 2048变体</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#ffd700;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #2a2a3e;border-radius:8px;box-shadow:0 0 30px rgba(255,215,0,0.1);cursor:pointer}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a1a2e;color:#ffd700;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:12px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h2{font-size:32px;margin-bottom:8px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;background:#ffd700;color:#111;border:none;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<h1>🔢 数字消除</h1>
<div id="info">
  <div>分数: <span class="val" id="score">0</span></div>
  <div>目标: <span class="val" id="target">2048</span></div>
  <div>最高: <span class="val" id="best">0</span></div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <button onclick="newGame()">新游戏</button>
</div>
<div id="overlay">
  <h2 id="olTitle">🎉 达成！</h2>
  <p id="olMsg"></p>
  <button onclick="newGame()">继续挑战</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const SIZE=4,CELL=90,GAP=8,PADDING=16;
canvas.width=SIZE*CELL+(SIZE+1)*GAP+PADDING*2;
canvas.height=canvas.width;

let grid,score,best,won;
best=parseInt(localStorage.getItem('num2048_best')||'0');
document.getElementById('best').textContent=best;

function newGame(){
  grid=Array.from({length:SIZE},()=>Array(SIZE).fill(0));
  score=0;won=false;
  document.getElementById('overlay').classList.remove('show');
  spawn();spawn();render();
}

function spawn(){
  const empty=[];
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(grid[r][c]===0)empty.push([r,c]);
  if(!empty.length)return;
  const[r,c]=empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]=Math.random()<0.9?2:4;
}

function slide(row){
  let a=row.filter(v=>v);
  for(let i=0;i<a.length-1;i++){
    if(a[i]===a[i+1]){a[i]*=2;a[i+1]=0;score+=a[i]}
  }
  a=a.filter(v=>v);
  while(a.length<SIZE)a.push(0);
  return a;
}

function move(dir){
  let moved=false;
  const transposed=dir==='up'||dir==='down';
  const reversed=dir==='right'||dir==='down';
  let g=grid.map(r=>[...r]);
  if(transposed)g=transpose(g);
  for(let r=0;r<SIZE;r++){
    let row=g[r];
    if(reversed)row=row.reverse();
    const newRow=slide(row);
    if(reversed)newRow.reverse();
    if(newRow.some((v,i)=>v!==g[r][i]))moved=true;
    g[r]=newRow;
  }
  if(transposed)g=transpose(g);
  if(moved){grid=g;spawn();render()}
  checkGameOver();
  document.getElementById('score').textContent=score;
  if(score>best){best=score;localStorage.setItem('num2048_best',best);document.getElementById('best').textContent=best}
}

function transpose(g){return g[0].map((_,c)=>g.map(r=>r[c]))}

function canMove(){
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    if(grid[r][c]===0)return true;
    if(c<SIZE-1&&grid[r][c]===grid[r][c+1])return true;
    if(r<SIZE-1&&grid[r][c]===grid[r+1][c])return true;
  }
  return false;
}

function checkGameOver(){
  // check for 2048
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    if(grid[r][c]>=2048&&!won){won=true;
      document.getElementById('olTitle').textContent='🎉 达成 2048！';
      document.getElementById('olTitle').style.color='#ffd700';
      document.getElementById('olMsg').textContent=`分数: ${score}`;
      document.getElementById('overlay').classList.add('show');
    }
  }
  if(!canMove()){
    document.getElementById('olTitle').textContent='💀 游戏结束';
    document.getElementById('olTitle').style.color='#e74c3c';
    document.getElementById('olMsg').textContent=`最终分数: ${score}`;
    document.getElementById('overlay').classList.add('show');
  }
}

const COLORS={
  0:'#1a1a2e',2:'#2a2a4a',4:'#3a3a5a',8:'#f59563',16:'#f27c5b',
  32:'#f25c3c',64:'#e74c3c',128:'#edcf72',256:'#edcc61',512:'#edc850',
  1024:'#edc53f',2048:'#edc22e',4096:'#3c3a32',8192:'#3c3a32',
};
const TEXTCOLORS={0:'transparent',2:'#e0e0e0',4:'#e0e0e0',8:'#fff',16:'#fff',32:'#fff',64:'#fff',128:'#fff',256:'#fff',512:'#fff',1024:'#fff',2048:'#fff'};

function render(){
  ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#1a1a2e';
  ctx.beginPath();ctx.roundRect(PADDING,PADDING,canvas.width-PADDING*2,canvas.height-PADDING*2,12);ctx.fill();
  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      const x=PADDING+GAP+c*(CELL+GAP);
      const y=PADDING+GAP+r*(CELL+GAP);
      const v=grid[r][c];
      ctx.fillStyle=COLORS[v]||'#3c3a32';
      ctx.beginPath();ctx.roundRect(x,y,CELL,CELL,8);ctx.fill();
      if(v>0){
        ctx.fillStyle=TEXTCOLORS[v]||'#fff';
        ctx.font=`bold ${v>=1024?20:v>=128?24:28}px sans-serif`;
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(v,x+CELL/2,y+CELL/2);
      }
    }
  }
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
}

document.addEventListener('keydown',e=>{
  const map={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',s:'down',a:'left',d:'right'};
  const dir=map[e.key];
  if(dir){e.preventDefault();move(dir)}
});

let tx,ty;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<30&&Math.abs(dy)<30)return;
  if(Math.abs(dx)>Math.abs(dy))move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
});

newGame();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎪 水果忍者</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#ffd700;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #2a2a3e;border-radius:8px;box-shadow:0 0 30px rgba(255,215,0,0.1);cursor:none}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a1a2e;color:#ffd700;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:12px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h2{font-size:32px;margin-bottom:8px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;background:#ffd700;color:#111;border:none;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<h1>🎪 水果忍者</h1>
<div id="info">
  <div>分数: <span class="val" id="score">0</span></div>
  <div>生命: <span class="val" id="lives">3</span></div>
  <div>连击: <span class="val" id="combo">0</span></div>
  <div>最高: <span class="val" id="best">0</span></div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <button onclick="newGame()">新游戏</button>
</div>
<div id="overlay">
  <h2 id="olTitle">💀 游戏结束</h2>
  <p id="olMsg"></p>
  <button onclick="newGame()">再来一次</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=500,H=500;
canvas.width=W;canvas.height=H;

const FRUITS=['🍎','🍊','🍋','🍇','🍉','🍑','🍒','🥝'];
const BOMB='💣';
let items,slices,particles,score,lives,combo,maxCombo,alive,spawnTimer,mouseTrail;
let best=parseInt(localStorage.getItem('fruit_best')||'0');
document.getElementById('best').textContent=best;

function newGame(){
  items=[];slices=[];particles=[];score=0;lives=3;combo=0;maxCombo=0;alive=true;spawnTimer=0;
  mouseTrail=[];
  document.getElementById('overlay').classList.remove('show');
  updateInfo();render();
  if(window._loop)cancelAnimationFrame(window._loop);
  function loop(){update();render();window._loop=requestAnimationFrame(loop)}
  loop();
}

function spawnItem(){
  const isBomb=Math.random()<0.15;
  const x=50+Math.random()*(W-100);
  items.push({
    x,y:H+20,
    vx:(Math.random()-0.5)*4,
    vy:-(8+Math.random()*4),
    r:25,
    emoji:isBomb?BOMB:FRUITS[Math.floor(Math.random()*FRUITS.length)],
    isBomb,
    sliced:false,
    life:200,
  });
}

function update(){
  if(!alive)return;
  spawnTimer++;
  if(spawnTimer>40-Math.floor(Date.now()/10000)%20){spawnItem();spawnTimer=0}
  // update items
  for(let i=items.length-1;i>=0;i--){
    const it=items[i];
    it.vy+=0.15;it.x+=it.vx;it.y+=it.vy;
    it.life--;
    if(it.life<=0||it.y>H+50){
      if(!it.sliced&&!it.isBomb){combo=0}
      items.splice(i,1);
    }
  }
  // update slices
  for(let i=slices.length-1;i>=0;i--){
    s=slices[i];s.life--;
    if(s.life<=0)slices.splice(i,1);
  }
  // particles
  for(let i=particles.length-1;i>=0;i--){
    particles[i].x+=particles[i].dx;particles[i].y+=particles[i].dy;particles[i].dy+=0.15;particles[i].life--;
    if(particles[i].life<=0)particles.splice(i,1);
  }
  // mouse trail fade
  if(mouseTrail.length>2)mouseTrail.shift();
  updateInfo();
}

function render(){
  ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,W,H);
  // background gradient
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#1a1a3a');grad.addColorStop(1,'#0a0a1a');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  // items
  for(const it of items){
    ctx.font='40px serif';ctx.textAlign='center';
    ctx.fillText(it.emoji,it.x,it.y);
    ctx.textAlign='left';
  }
  // slices
  for(const s of slices){
    ctx.globalAlpha=s.life/15;
    ctx.strokeStyle='#ffd700';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.stroke();
    ctx.globalAlpha=1;
  }
  // particles
  for(const p of particles){
    ctx.globalAlpha=p.life/20;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  // mouse trail
  if(mouseTrail.length>1){
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(mouseTrail[0].x,mouseTrail[0].y);
    for(let i=1;i<mouseTrail.length;i++)ctx.lineTo(mouseTrail[i].x,mouseTrail[i].y);
    ctx.stroke();
  }
}

canvas.addEventListener('mousemove',e=>{
  if(!alive)return;
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  const my=(e.clientY-rect.top)*(H/rect.height);
  mouseTrail.push({x:mx,y:my});
  if(mouseTrail.length>10)mouseTrail.shift();
  // check slice
  for(const it of items){
    if(it.sliced)continue;
    const dist=Math.sqrt((mx-it.x)**2+(my-it.y)**2);
    if(dist<it.r+10){
      it.sliced=true;
      if(it.isBomb){
        alive=false;
        spawnParticles(it.x,it.y,'#f55',20);
        if(score>best){best=score;localStorage.setItem('fruit_best',best);document.getElementById('best').textContent=best}
        document.getElementById('olTitle').textContent='💥 炸弹！';
        document.getElementById('olMsg').textContent=`分数: ${score}`;
        document.getElementById('overlay').classList.add('show');
        return;
      }
      combo++;maxCombo=Math.max(maxCombo,combo);
      const pts=10*combo;
      score+=pts;
      spawnParticles(it.x,it.y,'#ffd700',10);
      slices.push({x1:mx-30,y1:my-30,x2:mx+30,y2:my+30,life:15});
    }
  }
});

function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++)particles.push({x,y,dx:(Math.random()-0.5)*8,dy:(Math.random()-0.5)*8,life:20,color,r:Math.random()*3+2});
}

function updateInfo(){
  document.getElementById('score').textContent=score;
  document.getElementById('lives').textContent=lives;
  document.getElementById('combo').textContent=combo;
}

newGame();
</script>
</body>
</html>

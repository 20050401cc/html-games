<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌀 生命游戏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#5f5;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #2a3a2a;border-radius:8px;box-shadow:0 0 30px rgba(85,255,85,0.1);cursor:pointer}
#controls{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
#controls button{padding:6px 14px;background:#1a2a1a;color:#5f5;border:1px solid #2a3a2a;border-radius:6px;cursor:pointer;font-size:12px}
#controls select{padding:4px 8px;background:#1a2a1a;color:#5f5;border:1px solid #2a3a2a;border-radius:4px;font-size:12px}
</style>
</head>
<body>
<h1>🌀 生命游戏</h1>
<div id="info">
  <div>世代: <span class="val" id="gen">0</span></div>
  <div>存活: <span class="val" id="alive">0</span></div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <button onclick="toggleRun()" id="runBtn">▶ 运行</button>
  <button onclick="step()">⏭ 单步</button>
  <button onclick="randomize()">🎲 随机</button>
  <button onclick="clear()">🗑️ 清空</button>
  <select id="speed"><option value="50">快速</option><option value="150" selected>正常</option><option value="400">慢速</option></select>
  <select id="preset" onchange="loadPreset()"><option value="">预设图案</option><option value="glider">滑翔机</option><option value="blinker">闪烁</option><option value="pulsar">脉冲星</option><option value="gosper">高斯帕枪</option><option value="pentadecathlon">十五年</option></select>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const COLS=80,ROWS=50,CELL=10;
canvas.width=COLS*CELL;canvas.height=ROWS*CELL;

let grid,running,gen,intervalId;

function init(){
  grid=Array.from({length:ROWS},()=>Array(COLS).fill(0));
  gen=0;running=false;
  randomize();
}

function randomize(){
  grid=Array.from({length:ROWS},()=>Array(COLS).fill(0));
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    grid[r][c]=Math.random()<0.3?1:0;
  }
  gen=0;render();updateInfo();
}

function clear(){
  grid=Array.from({length:ROWS},()=>Array(COLS).fill(0));
  gen=0;render();updateInfo();
}

function countNeighbors(r,c){
  let count=0;
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
    if(dr===0&&dc===0)continue;
    const nr=(r+dr+ROWS)%ROWS,nc=(c+dc+COLS)%COLS;
    count+=grid[nr][nc];
  }
  return count;
}

function step(){
  const next=Array.from({length:ROWS},()=>Array(COLS).fill(0));
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const n=countNeighbors(r,c);
    if(grid[r][c]===1)next[r][c]=(n===2||n===3)?1:0;
    else next[r][c]=n===3?1:0;
  }
  grid=next;gen++;render();updateInfo();
}

function toggleRun(){
  running=!running;
  document.getElementById('runBtn').textContent=running?'⏸ 暂停':'▶ 运行';
  if(running)runLoop();
  else clearInterval(intervalId);
}

function runLoop(){
  clearInterval(intervalId);
  const speed=parseInt(document.getElementById('speed').value);
  intervalId=setInterval(()=>{
    if(running)step();
  },speed);
}

function loadPreset(){
  const preset=document.getElementById('preset').value;
  if(!preset)return;
  clear();
  const cx=Math.floor(COLS/2),cy=Math.floor(ROWS/2);
  const patterns={
    glider:[[0,1],[1,2],[2,0],[2,1],[2,2]],
    blinker:[[0,-1],[0,0],[0,1]],
    pulsar:[[-6,-4],[-6,-3],[-6,-2],[-4,-6],[-3,-6],[-2,-6],[-1,-4],[-1,-3],[-1,-2],[1,-4],[1,-3],[1,-2],[2,-6],[3,-6],[4,-6],[6,-4],[6,-3],[6,-2],[-6,2],[-6,3],[-6,4],[-4,6],[-3,6],[-2,6],[-1,2],[-1,3],[-1,4],[1,2],[1,3],[1,4],[2,6],[3,6],[4,6],[6,2],[6,3],[6,4]],
    gosper:[[0,24],[1,22],[1,24],[2,12],[2,13],[2,20],[2,21],[2,34],[2,35],[3,11],[3,15],[3,20],[3,21],[3,34],[3,35],[4,0],[4,1],[4,10],[4,16],[4,20],[4,21],[5,0],[5,1],[5,10],[5,14],[5,16],[5,17],[5,22],[5,24],[6,10],[6,16],[6,24],[7,11],[7,15],[8,12],[8,13]],
    pentadecathlon:[[0,-1],[0,0],[0,1]],
  };
  const p=patterns[preset];
  if(p)for(const[dr,dc]of p){
    const r=cy+dr,c=cx+dc;
    if(r>=0&&r<ROWS&&c>=0&&c<COLS)grid[r][c]=1;
  }
  render();updateInfo();
}

function render(){
  ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,canvas.width,canvas.height);
  // grid lines
  ctx.strokeStyle='#111a11';ctx.lineWidth=0.3;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,ROWS*CELL);ctx.stroke()}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(COLS*CELL,y*CELL);ctx.stroke()}
  // cells
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(grid[r][c]===1){
      const n=countNeighbors(r,c);
      const hue=120+n*20;
      ctx.fillStyle=`hsl(${hue},70%,${40+n*5}%)`;
      ctx.fillRect(c*CELL+1,r*CELL+1,CELL-2,CELL-2);
      // glow for cells with many neighbors
      if(n>=3){ctx.fillStyle=`hsla(${hue},70%,60%,0.3)`;ctx.fillRect(c*CELL,r*CELL,CELL,CELL)}
    }
  }
}

function updateInfo(){
  document.getElementById('gen').textContent=gen;
  let count=0;for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)count+=grid[r][c];
  document.getElementById('alive').textContent=count;
}

canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const c=Math.floor((e.clientX-rect.left)*(canvas.width/rect.width)/CELL);
  const r=Math.floor((e.clientY-rect.top)*(canvas.height/rect.height)/CELL);
  if(r>=0&&r<ROWS&&c>=0&&c<COLS){grid[r][c]=grid[r][c]?0:1;render();updateInfo()}
});

canvas.addEventListener('mousemove',e=>{
  if(e.buttons!==1)return;
  const rect=canvas.getBoundingClientRect();
  const c=Math.floor((e.clientX-rect.left)*(canvas.width/rect.width)/CELL);
  const r=Math.floor((e.clientY-rect.top)*(canvas.height/rect.height)/CELL);
  if(r>=0&&r<ROWS&&c>=0&&c<COLS){grid[r][c]=1;render();updateInfo()}
});

document.addEventListener('keydown',e=>{
  if(e.key===' '){e.preventDefault();toggleRun()}
  if(e.key==='n')step();
});

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎪 管道连接</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#5bf;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #2a2a3e;border-radius:8px;box-shadow:0 0 30px rgba(90,130,255,0.1);cursor:pointer}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a1a2e;color:#5bf;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:12px}
#controls select{padding:4px 8px;background:#1a1a2e;color:#5bf;border:1px solid #2a2a3e;border-radius:4px;font-size:12px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h2{font-size:32px;color:#ffd700;margin-bottom:8px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;background:#5bf;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<h1>🎪 管道连接</h1>
<div id="info">
  <div>步数: <span class="val" id="moves">0</span></div>
  <div>大小: <span class="val" id="size">5</span></div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <select id="gridSize" onchange="newGame()"><option value="5">5×5</option><option value="7" selected>7×7</option><option value="9">9×9</option></select>
  <button onclick="newGame()">新游戏</button>
  <button onclick="checkWin()">✅ 检查</button>
</div>
<div id="overlay">
  <h2>🎉 连通！</h2>
  <p id="olMsg"></p>
  <button onclick="newGame()">下一关</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');

const PIPE_SHAPES={
  straight:{dirs:[[0,-1],[0,1]],draw:(x,y,s)=>{ctx.fillRect(x+s/2-3,y,6,s)}},
  corner:{dirs:[[1,0],[0,1]],draw:(x,y,s)=>{ctx.fillRect(x+s/2-3,y+s/2-3,3+s/2,6);ctx.fillRect(x+s/2-3,y+s/2-3,6,3+s/2)}},
  tee:{dirs:[[0,-1],[1,0],[0,1]],draw:(x,y,s)=>{ctx.fillRect(x+s/2-3,y,6,s);ctx.fillRect(x+s/2,y+s/2-3,s/2,6)}},
  cross:{dirs:[[0,-1],[1,0],[0,1],[-1,0]],draw:(x,y,s)=>{ctx.fillRect(x+s/2-3,y,6,s);ctx.fillRect(x,y+s/2-3,s,6)}},
  end:{dirs:[[0,1]],draw:(x,y,s)=>{ctx.fillRect(x+s/2-3,y+s/2,6,s/2)}},
};

let grid,cols,rows,cellSize,moves;

function newGame(){
  cols=parseInt(document.getElementById('gridSize').value);
  rows=cols;
  cellSize=Math.min(55,Math.floor(420/cols));
  canvas.width=cols*cellSize;canvas.height=rows*cellSize;
  moves=0;
  generatePuzzle();
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('size').textContent=cols;
  render();updateInfo();
}

function generatePuzzle(){
  grid=Array.from({length:rows},()=>Array.from({length:cols},()=>({type:'empty',rot:0})));
  // create a random path
  const path=[];
  let cur={x:0,y:Math.floor(Math.random()*rows)};
  path.push({...cur});
  while(cur.x<cols-1){
    const moves=[];
    if(cur.x<cols-1)moves.push({x:1,y:0});
    if(cur.y>0&&!path.some(p=>p.x===cur.x&&p.y===cur.y-1))moves.push({x:0,y:-1});
    if(cur.y<rows-1&&!path.some(p=>p.x===cur.x&&p.y===cur.y+1))moves.push({x:0,y:1});
    const m=moves[Math.floor(Math.random()*moves.length)];
    cur={x:cur.x+m.x,y:cur.y+m.y};
    if(!path.some(p=>p.x===cur.x&&p.y===cur.y))path.push({...cur});
  }
  // assign pipe types
  for(let i=0;i<path.length;i++){
    const p=path[i];
    const prev=i>0?path[i-1]:null;
    const next=i<path.length-1?path[i+1]:null;
    const dirs=[];
    if(prev)dirs.push({x:prev.x-p.x,y:prev.y-p.y});
    if(next)dirs.push({x:next.x-p.x,y:next.y-p.y});
    grid[p.y][p.x].isPath=true;
    if(dirs.length===1)grid[p.y][p.x].type='end';
    else{
      const sum=dirs.reduce((a,d)=>({x:a.x+d.x,y:a.y+d.y}),{x:0,y:0});
      if(sum.x===0&&sum.y===0)grid[p.y][p.x].type='straight';
      else grid[p.y][p.x].type='corner';
    }
    grid[p.y][p.x].rot=Math.floor(Math.random()*4);
  }
  // add random pipes
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    if(grid[r][c].type==='empty'&&Math.random()<0.25){
      const types=['straight','corner','tee','cross'];
      grid[r][c].type=types[Math.floor(Math.random()*types.length)];
      grid[r][c].rot=Math.floor(Math.random()*4);
    }
  }
}

function getRotatedDirs(type,rot){
  const base=PIPE_SHAPES[type];
  if(!base)return[];
  return base.dirs.map(d=>{
    let{x,y}=d;
    for(let i=0;i<rot%4;i++){const t=x;x=-y;y=t}
    return{x,y};
  });
}

function checkWin(){
  // BFS from leftmost path cells
  const visited=Array.from({length:rows},()=>Array(cols).fill(false));
  const starts=[];
  for(let r=0;r<rows;r++){if(grid[r][0].type!=='empty')starts.push({x:0,y:r})}
  const queue=[...starts];
  starts.forEach(s=>visited[s.y][s.x]=true);
  while(queue.length){
    const cur=queue.shift();
    const cell=grid[cur.y][cur.x];
    const dirs=getRotatedDirs(cell.type,cell.rot);
    for(const d of dirs){
      const nx=cur.x+d.x,ny=cur.y+d.y;
      if(nx<0||nx>=cols||ny<0||ny>=rows||visited[ny][nx])continue;
      const neighbor=grid[ny][nx];
      if(neighbor.type==='empty')continue;
      const nDirs=getRotatedDirs(neighbor.type,neighbor.rot);
      if(nDirs.some(nd=>nd.x===-d.x&&nd.y===-d.y)){
        visited[ny][nx]=true;queue.push({x:nx,y:ny});
      }
    }
  }
  // check if any rightmost cell is connected
  for(let r=0;r<rows;r++){
    if(visited[r][cols-1]&&grid[r][cols-1].type!=='empty'){
      document.getElementById('olMsg').textContent=`步数: ${moves}`;
      document.getElementById('overlay').classList.add('show');
      return;
    }
  }
}

function render(){
  ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const x=c*cellSize,y=r*cellSize;
      const cell=grid[r][c];
      // background
      ctx.fillStyle=(r+c)%2===0?'#12121e':'#16162a';
      ctx.fillRect(x,y,cellSize,cellSize);
      // pipe
      if(cell.type!=='empty'){
        ctx.fillStyle=cell.isPath?'#5bf':'#3a3a5a';
        ctx.save();ctx.translate(x+cellSize/2,y+cellSize/2);ctx.rotate(cell.rot*Math.PI/2);
        ctx.translate(-cellSize/2,-cellSize/2);
        PIPE_SHAPES[cell.type].draw(0,0,cellSize);
        // center
        ctx.fillRect(cellSize/2-4,cellSize/2-4,8,8);
        ctx.restore();
      }
    }
  }
}

canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const c=Math.floor((e.clientX-rect.left)/cellSize);
  const r=Math.floor((e.clientY-rect.top)/cellSize);
  if(r>=0&&r<rows&&c>=0&&c<cols&&grid[r][c].type!=='empty'){
    grid[r][c].rot=(grid[r][c].rot+1)%4;
    moves++;render();updateInfo();
  }
});

function updateInfo(){document.getElementById('moves').textContent=moves}

newGame();
</script>
</body>
</html>

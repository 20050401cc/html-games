<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 Simon 记忆</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#ffd700;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:12px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
#board{display:grid;grid-template-columns:repeat(2,140px);grid-template-rows:repeat(2,140px);gap:10px}
.btn{border-radius:16px;cursor:pointer;transition:all 0.15s;border:3px solid #2a2a3e;display:flex;align-items:center;justify-content:center;font-size:36px;opacity:0.6}
.btn:hover{opacity:0.8}
.btn.active{opacity:1;transform:scale(1.05)}
.btn.green{background:#2ecc71;box-shadow:0 0 20px rgba(46,204,113,0.3)}
.btn.green.active{background:#5dff99;box-shadow:0 0 40px rgba(46,204,113,0.6)}
.btn.red{background:#e74c3c;box-shadow:0 0 20px rgba(231,76,60,0.3)}
.btn.red.active{background:#ff7070;box-shadow:0 0 40px rgba(231,76,60,0.6)}
.btn.yellow{background:#f1c40f;box-shadow:0 0 20px rgba(241,196,15,0.3)}
.btn.yellow.active{background:#ffe44d;box-shadow:0 0 40px rgba(241,196,15,0.6)}
.btn.blue{background:#3498db;box-shadow:0 0 20px rgba(52,152,219,0.3)}
.btn.blue.active{background:#6bbfff;box-shadow:0 0 40px rgba(52,152,219,0.6)}
#status{margin-top:12px;font-size:16px;min-height:24px;color:#888}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:8px 20px;background:#1a1a2e;color:#ffd700;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:13px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h2{font-size:32px;margin-bottom:8px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;background:#ffd700;color:#111;border:none;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<h1>🎵 Simon 记忆</h1>
<div id="info">
  <div>分数: <span class="val" id="score">0</span></div>
  <div>连击: <span class="val" id="streak">0</span></div>
  <div>最高: <span class="val" id="best">0</span></div>
</div>
<div id="board">
  <div class="btn green" data-idx="0" onclick="playerInput(0)">🟢</div>
  <div class="btn red" data-idx="1" onclick="playerInput(1)">🔴</div>
  <div class="btn yellow" data-idx="2" onclick="playerInput(2)">🟡</div>
  <div class="btn blue" data-idx="3" onclick="playerInput(3)">🔵</div>
</div>
<div id="status">按开始游戏</div>
<div id="controls">
  <button onclick="startGame()">开始游戏</button>
  <button onclick="toggleSound()">🔊 音效</button>
  <select id="speed" onchange="updateSpeed()">
    <option value="600">慢速</option>
    <option value="400" selected>正常</option>
    <option value="250">快速</option>
  </select>
</div>
<div id="overlay">
  <h2 id="olTitle">💀 游戏结束</h2>
  <p id="olMsg"></p>
  <button onclick="startGame()">再来一次</button>
</div>
<script>
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let audioCtx,soundOn=true;
const FREQS=[330,262,392,523];
function initAudio(){if(!audioCtx)audioCtx=new AudioCtx()}
function playTone(idx,dur=200){
  if(!audioCtx||!soundOn)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.type='sine';o.frequency.setValueAtTime(FREQS[idx],audioCtx.currentTime);
  g.gain.setValueAtTime(0.15,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur/1000);
  o.start();o.stop(audioCtx.currentTime+dur/1000);
}
function toggleSound(){soundOn=!soundOn}

let sequence,playerIdx,playing,inputEnabled,score,streak,best,speed;
best=parseInt(localStorage.getItem('simon_best')||'0');
document.getElementById('best').textContent=best;
speed=400;

function updateSpeed(){speed=parseInt(document.getElementById('speed').value)}

function startGame(){
  initAudio();
  sequence=[];playerIdx=0;score=0;streak=0;playing=true;
  document.getElementById('overlay').classList.remove('show');
  nextRound();
}

function nextRound(){
  playerIdx=0;
  sequence.push(Math.floor(Math.random()*4));
  document.getElementById('status').textContent=`观察... (${sequence.length}步)`;
  inputEnabled=false;
  playSequence(0);
}

function playSequence(idx){
  if(idx>=sequence.length){
    inputEnabled=true;
    document.getElementById('status').textContent='你的回合！';
    return;
  }
  const btn=document.querySelectorAll('.btn')[sequence[idx]];
  btn.classList.add('active');
  playTone(sequence[idx]);
  setTimeout(()=>{
    btn.classList.remove('active');
    setTimeout(()=>playSequence(idx+1),100);
  },speed);
}

function playerInput(idx){
  if(!inputEnabled||!playing)return;
  const btn=document.querySelectorAll('.btn')[idx];
  btn.classList.add('active');
  playTone(idx,150);
  setTimeout(()=>btn.classList.remove('active'),200);
  if(idx===sequence[playerIdx]){
    playerIdx++;
    if(playerIdx>=sequence.length){
      score+=sequence.length*10;
      streak++;
      document.getElementById('status').textContent='✅ 正确！';
      inputEnabled=false;
      setTimeout(nextRound,800);
    }
  }else{
    playing=false;
    if(score>best){best=score;localStorage.setItem('simon_best',best);document.getElementById('best').textContent=best}
    document.getElementById('olMsg').textContent=`分数: ${score} | 连击: ${streak} | 最长序列: ${sequence.length-1}`;
    document.getElementById('overlay').classList.add('show');
    // flash error
    document.querySelectorAll('.btn').forEach(b=>{b.classList.add('active');b.style.opacity='0.3'});
    setTimeout(()=>document.querySelectorAll('.btn').forEach(b=>{b.classList.remove('active');b.style.opacity=''}),500);
  }
  updateInfo();
}

function updateInfo(){
  document.getElementById('score').textContent=score;
  document.getElementById('streak').textContent=streak;
}
</script>
</body>
</html>

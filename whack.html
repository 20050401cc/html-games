<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔨 打地鼠</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a0e;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#e0d8c0}
h1{font-size:28px;color:#ffd700;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
#board{display:grid;grid-template-columns:repeat(3,100px);grid-template-rows:repeat(3,100px);gap:12px;padding:16px;background:#2a2a1a;border-radius:12px;border:2px solid #3a3a2a}
.hole{background:#1a1a0e;border-radius:50%;cursor:pointer;position:relative;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;transition:all .1s}
.hole::before{content:'';position:absolute;bottom:0;left:10%;right:10%;height:60%;background:#0e0e08;border-radius:0 0 50% 50%}
.mole{font-size:36px;position:relative;z-index:1;transform:translateY(60px);transition:transform 0.15s ease-out;pointer-events:none}
.hole.active .mole{transform:translateY(10px)}
.hole.hit{transform:scale(0.95)}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#2a2a1a;color:#ffd700;border:1px solid #3a3a2a;border-radius:6px;cursor:pointer;font-size:12px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#overlay.show{display:flex}
#overlay h2{font-size:32px;margin-bottom:8px}
#overlay p{color:#aaa;margin-bottom:16px}
#overlay button{padding:10px 30px;background:#ffd700;color:#111;border:none;border-radius:8px;font-size:16px;cursor:pointer}
#timer{font-size:20px;color:#f88;margin-bottom:8px}
</style>
</head>
<body>
<h1>🔨 打地鼠</h1>
<div id="info">
  <div>分数: <span class="val" id="score">0</span></div>
  <div>连击: <span class="val" id="combo">0</span></div>
  <div>最高: <span class="val" id="best">0</span></div>
</div>
<div id="timer">⏱️ 30s</div>
<div id="board"></div>
<div id="controls">
  <button onclick="startGame()">开始游戏</button>
  <button onclick="toggleSound()">🔊 音效</button>
</div>
<div id="overlay">
  <h2 id="olTitle">⏰ 时间到！</h2>
  <p id="olMsg"></p>
  <button onclick="startGame()">再来一次</button>
</div>
<script>
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let audioCtx,soundOn=true;
function initAudio(){if(!audioCtx)audioCtx=new AudioCtx()}
function playHit(){if(!audioCtx||!soundOn)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='square';o.frequency.setValueAtTime(600,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(100,audioCtx.currentTime+0.1);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.15);o.start();o.stop(audioCtx.currentTime+0.15)}
function toggleSound(){soundOn=!soundOn}

let holes,moleTimer,gameTimer,score,combo,maxCombo,playing,timeLeft;
let best=parseInt(localStorage.getItem('whack_best')||'0');
document.getElementById('best').textContent=best;

function startGame(){
  initAudio();
  score=0;combo=0;maxCombo=0;playing=true;timeLeft=30;
  document.getElementById('overlay').classList.remove('show');
  // create holes
  const board=document.getElementById('board');
  board.innerHTML='';
  holes=[];
  for(let i=0;i<9;i++){
    const hole=document.createElement('div');
    hole.className='hole';
    hole.innerHTML='<div class="mole">🐹</div>';
    hole.addEventListener('click',()=>whack(i));
    board.appendChild(hole);
    holes.push({el:hole,active:false,cooldown:0});
  }
  // start timers
  clearInterval(moleTimer);clearInterval(gameTimer);
  moleTimer=setInterval(spawnMole,800);
  gameTimer=setInterval(()=>{
    timeLeft--;
    document.getElementById('timer').textContent=`⏱️ ${timeLeft}s`;
    if(timeLeft<=0){playing=false;clearInterval(moleTimer);clearInterval(gameTimer);endGame()}
  },1000);
}

function spawnMole(){
  if(!playing)return;
  const idx=Math.floor(Math.random()*9);
  if(holes[idx].active)return;
  holes[idx].active=true;
  holes[idx].el.classList.add('active');
  const types=['🐹','🐹','🐹','🐹','🐹','🐹','🐹','💎','💀'];
  const type=types[Math.floor(Math.random()*types.length)];
  holes[idx].el.querySelector('.mole').textContent=type;
  holes[idx].type=type;
  const duration=type==='💎'?600:type==='💀'?1200:1000;
  setTimeout(()=>{
    if(holes[idx].active){
      holes[idx].active=false;
      holes[idx].el.classList.remove('active');
      if(type!=='💀')combo=0;
    }
  },duration);
}

function whack(idx){
  if(!playing)return;
  const hole=holes[idx];
  if(!hole.active)return;
  hole.active=false;
  hole.el.classList.remove('active');
  hole.el.classList.add('hit');
  setTimeout(()=>hole.el.classList.remove('hit'),100);
  playHit();
  const type=hole.type;
  if(type==='💀'){
    score=Math.max(0,score-10);combo=0;
  }else if(type==='💎'){
    score+=20;combo++;
  }else{
    score+=5+combo;combo++;
  }
  maxCombo=Math.max(maxCombo,combo);
  updateInfo();
}

function endGame(){
  if(score>best){best=score;localStorage.setItem('whack_best',best);document.getElementById('best').textContent=best}
  document.getElementById('olMsg').textContent=`分数: ${score} | 最大连击: ${maxCombo}`;
  document.getElementById('overlay').classList.add('show');
}

function updateInfo(){
  document.getElementById('score').textContent=score;
  document.getElementById('combo').textContent=combo;
}

startGame();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌊 水波纹</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#d0d0e0}
h1{font-size:28px;color:#5bf;margin-bottom:6px}
#info{display:flex;gap:16px;margin-bottom:8px;font-size:13px}
#info .val{color:#ffd700;font-weight:bold}
canvas{border:2px solid #2a3a4a;border-radius:8px;box-shadow:0 0 30px rgba(90,130,255,0.1);cursor:pointer}
#controls{margin-top:10px;display:flex;gap:8px}
#controls button{padding:6px 16px;background:#1a1a2e;color:#5bf;border:1px solid #2a2a3e;border-radius:6px;cursor:pointer;font-size:12px}
#msg{margin-top:8px;font-size:12px;color:#888}
</style>
</head>
<body>
<h1>🌊 水波纹</h1>
<div id="info">
  <div>波纹: <span class="val" id="count">0</span></div>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <button onclick="clearWaves()">清空</button>
  <button onclick="toggleRain()">🌧️ 雨滴</button>
  <button onclick="changeColor()">🎨 换色</button>
</div>
<div id="msg">点击产生水波纹 · 观看美丽的波纹交互</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=500,H=500;
canvas.width=W;canvas.height=H;

let waves,rainOn,colorIdx,count;
const WAVECOLORS=['#5bf','#f5a','#5f5','#ff5','#f55','#a5f'];

function init(){
  waves=[];rainOn=false;colorIdx=0;count=0;
  render();
}

function addWave(x,y){
  waves.push({x,y,r:0,maxR:200+Math.random()*100,speed:1.5+Math.random(),alpha:1,color:WAVECOLORS[colorIdx]});
  count++;document.getElementById('count').textContent=count;
}

function clearWaves(){waves=[];count=0;document.getElementById('count').textContent='0'}
function toggleRain(){rainOn=!rainOn}
function changeColor(){colorIdx=(colorIdx+1)%WAVECOLORS.length}

function update(){
  for(let i=waves.length-1;i>=0;i--){
    const w=waves[i];
    w.r+=w.speed;
    w.alpha=1-w.r/w.maxR;
    if(w.r>=w.maxR)waves.splice(i,1);
  }
  if(rainOn&&Math.random()<0.05){
    addWave(Math.random()*W,Math.random()*H);
  }
}

function render(){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
  // draw waves
  for(const w of waves){
    if(w.alpha<=0)continue;
    // multiple concentric rings
    for(let ring=0;ring<3;ring++){
      const r=w.r-ring*15;
      if(r<0)continue;
      const alpha=w.alpha*(1-ring*0.3);
      ctx.strokeStyle=w.color;
      ctx.globalAlpha=alpha*0.6;
      ctx.lineWidth=2-ring*0.5;
      ctx.beginPath();ctx.arc(w.x,w.y,r,0,Math.PI*2);ctx.stroke();
    }
    // glow
    ctx.globalAlpha=w.alpha*0.15;
    ctx.fillStyle=w.color;
    ctx.beginPath();ctx.arc(w.x,w.y,w.r*0.5,0,Math.PI*2);ctx.fill();
  }
  // interaction between waves
  ctx.globalAlpha=0.05;
  for(let i=0;i<waves.length;i++){
    for(let j=i+1;j<waves.length;j++){
      const w1=waves[i],w2=waves[j];
      const dx=w2.x-w1.x,dy=w2.y-w1.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<w1.r+w2.r&&dist>0){
        const mx=(w1.x+w2.x)/2,my=(w1.y+w2.y)/2;
        ctx.fillStyle='#fff';
        ctx.beginPath();ctx.arc(mx,my,3,0,Math.PI*2);ctx.fill();
      }
    }
  }
  ctx.globalAlpha=1;
  // center text
  if(waves.length===0){
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='16px sans-serif';ctx.textAlign='center';
    ctx.fillText('点击水面产生波纹',W/2,H/2);ctx.textAlign='left';
  }
}

canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const x=(e.clientX-rect.left)*(W/rect.width);
  const y=(e.clientY-rect.top)*(H/rect.height);
  addWave(x,y);
});

canvas.addEventListener('mousemove',e=>{
  if(e.buttons===1){
    const rect=canvas.getBoundingClientRect();
    const x=(e.clientX-rect.left)*(W/rect.width);
    const y=(e.clientY-rect.top)*(H/rect.height);
    if(Math.random()<0.3)addWave(x,y);
  }
});

function loop(){update();render();requestAnimationFrame(loop)}

init();
loop();
</script>
</body>
</html>
